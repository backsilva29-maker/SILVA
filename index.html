<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>🏗️ Torre L'iris - Gestão Inteligente</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
    --bg: #0d0f14;
    --surface: #13161e;
    --surface2: #1a1e2a;
    --border: #252a38;
    --accent: #e8a020;
    --accent2: #3b82f6;
    --accent3: #10b981;
    --accent4: #f43f5e;
    --text: #e8eaf0;
    --text2: #8892a4;
    --text3: #4a5468;
    --gantt-h: 44px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { 
    background: var(--bg); 
    color: var(--text); 
    font-family: 'Inter', sans-serif; 
    font-size: 13px; 
    min-height: 100vh; 
    overflow-x: hidden; 
}

/* ===== LOGIN ===== */
.login-modal { 
    position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
    background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); 
    display: flex; justify-content: center; align-items: center; 
    z-index: 1000; 
}
.login-content { 
    background: var(--surface); border: 1px solid var(--border); 
    border-radius: 48px; padding: 40px; width: 90%; max-width: 380px; 
    text-align: center; 
}
.login-input { 
    width: 100%; padding: 16px; margin: 15px 0; 
    background: var(--bg); border: 1px solid var(--border); 
    border-radius: 40px; color: var(--text); font-size: 16px; 
}
.login-btn { 
    width: 100%; padding: 16px; margin: 8px 0; border: none; 
    border-radius: 40px; font-size: 16px; font-weight: 600; cursor: pointer; 
}
.btn-admin { background: var(--accent); color: #000; }
.btn-client { background: var(--accent2); color: white; }

/* ===== TOPBAR ===== */
.topbar { 
    display: flex; align-items: center; justify-content: space-between; 
    padding: 0 24px; height: 56px; background: var(--surface); 
    border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; 
}
.logo { 
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: 17px; 
    display: flex; align-items: center; gap: 10px; 
}
.logo-badge { 
    width: 28px; height: 28px; background: var(--accent); border-radius: 6px; 
    display: flex; align-items: center; justify-content: center; 
    font-size: 13px; color: #000; font-weight: 800; 
}
.btn { 
    padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; 
    font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500; 
    transition: all .15s; display: inline-flex; align-items: center; gap: 6px; 
}
.btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text2); }
.btn-ghost:hover { border-color: var(--text2); color: var(--text); }
.btn-primary { background: var(--accent); color: #000; font-weight: 600; }
.btn-primary:hover { background: #f5ae30; }
.btn-danger { background: var(--accent4); color: white; }
.btn-success { background: var(--accent3); color: white; }

/* ===== LAYOUT ===== */
.layout { display: flex; height: calc(100vh - 56px); }
.sidebar { 
    width: 240px; min-width: 240px; background: var(--surface); 
    border-right: 1px solid var(--border); padding: 16px 0; overflow-y: auto; 
}
.sidebar-section { margin-bottom: 24px; }
.sidebar-label { 
    font-family: 'IBM Plex Mono', monospace; font-size: 9px; 
    letter-spacing: 1.5px; color: var(--text3); text-transform: uppercase; 
    padding: 0 16px; margin-bottom: 6px; 
}
.sidebar-item { 
    display: flex; align-items: center; gap: 10px; padding: 10px 16px; 
    color: var(--text2); cursor: pointer; border-left: 2px solid transparent; 
    transition: all 0.2s; 
}
.sidebar-item:hover { background: var(--surface2); color: var(--text); transform: translateX(4px); }
.sidebar-item.active { 
    color: var(--accent); border-left-color: var(--accent); 
    background: rgba(232,160,32,.06); 
}

/* ===== MAIN ===== */
.main { flex: 1; overflow: auto; padding: 20px 24px; }
.page-header { 
    display: flex; align-items: center; justify-content: space-between; 
    margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border); 
}
.page-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 22px; }
.page-sub { color: var(--text2); font-size: 12px; margin-top: 4px; }

/* ===== SAVE BAR ===== */
.save-bar { 
    background: var(--surface2); border: 1px solid var(--border); 
    border-radius: 10px; padding: 12px 16px; margin-bottom: 20px; 
    display: flex; align-items: center; justify-content: space-between; 
}
.save-status { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text2); }
.save-indicator { width: 8px; height: 8px; border-radius: 50%; background: var(--text3); }
.save-indicator.saved { background: var(--accent3); }
.save-indicator.pending { background: var(--accent); animation: pulse 1s infinite; }

/* ===== CLIENT DATA CARD ===== */
.client-data-card { 
    background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%); 
    border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 20px; 
}
.client-data-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; }
.client-data-item { display: flex; flex-direction: column; gap: 6px; }
.client-data-label { 
    font-size: 10px; color: var(--text3); text-transform: uppercase; 
    font-family: 'IBM Plex Mono', monospace; 
}
.client-data-value { font-size: 14px; color: var(--text); font-weight: 500; }
.client-data-input { 
    background: var(--bg); border: 1px solid var(--border); border-radius: 6px; 
    padding: 8px 12px; color: var(--text); font-size: 13px; width: 100%; 
}
.client-data-input:focus { outline: none; border-color: var(--accent); }

/* ===== GANTT ===== */
.gantt-wrap { 
    border: 1px solid var(--border); border-radius: 10px; overflow: hidden; 
    background: var(--surface); margin-bottom: 20px; 
}
.gantt-header { 
    display: grid; grid-template-columns: 280px 100px 100px 80px 100px 1fr; 
    background: var(--surface2); border-bottom: 1px solid var(--border); 
    font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text3); 
    text-transform: uppercase; 
}
.gh-cell { padding: 12px; border-right: 1px solid var(--border); }
.gantt-group { border-bottom: 1px solid var(--border); }
.gantt-group-header { 
    display: grid; grid-template-columns: 280px 100px 100px 80px 100px 1fr; 
    background: rgba(232,160,32,.08); cursor: pointer; padding: 12px; align-items: center; 
}
.gantt-row { 
    display: grid; grid-template-columns: 280px 100px 100px 80px 100px 1fr; 
    border-bottom: 1px solid rgba(37,42,56,.6); align-items: center; 
}
.gantt-row:hover { background: var(--surface2); }
.gc { 
    padding: 0 12px; height: var(--gantt-h); display: flex; align-items: center; 
    border-right: 1px solid var(--border); font-size: 12px; 
}
.gc-name { font-weight: 500; }
.gc-edit { 
    background: transparent; border: 1px solid var(--border); border-radius: 4px; 
    padding: 4px 8px; color: var(--text); font-size: 11px; width: 100%; 
}
.gc-edit:focus { outline: none; border-color: var(--accent); }
.dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 8px; }
.bar-area { position: relative; height: var(--gantt-h); min-width: 100%; overflow-x: auto; }
.gantt-bar { 
    position: absolute; top: 50%; transform: translateY(-50%); height: 20px; 
    border-radius: 5px; display: flex; align-items: center; overflow: hidden; 
    cursor: pointer; transition: all 0.3s; 
}
.gantt-bar:hover { transform: translateY(-50%) scale(1.02); }
.gantt-bar-fill { 
    height: 100%; border-radius: 5px 0 0 5px; opacity: .95; 
    transition: width 0.5s ease-out; 
}
.today-line { 
    position: absolute; top: 0; bottom: 0; width: 2px; background: var(--accent4); 
    opacity: .7; z-index: 5; 
}

/* ===== ANIMAÇÕES ===== */
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
@keyframes slideInLeft { 
    from { opacity: 0; transform: translateX(-20px); } 
    to { opacity: 1; transform: translateX(0); } 
}
.animated-progress { position: relative; overflow: hidden; }
.animated-progress::after {
    content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
    animation: shimmer 2s infinite;
}
@keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

/* ===== CRUD ===== */
.crud-container { display: grid; gap: 12px; }
.crud-card { 
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px; 
    padding: 16px; display: grid; grid-template-columns: 1fr 100px 100px 120px; 
    gap: 12px; align-items: center; 
}
.crud-card-header { 
    background: var(--surface2); font-weight: 600; font-size: 11px; color: var(--text3); 
    text-transform: uppercase; padding: 12px 16px; border-radius: 10px 10px 0 0; 
}
.crud-input { 
    background: var(--bg); border: 1px solid var(--border); border-radius: 6px; 
    padding: 8px 12px; color: var(--text); font-size: 12px; width: 100%; 
}
.crud-input:focus { outline: none; border-color: var(--accent); }

/* ===== FOTOS ===== */
.photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
.photo-card { 
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px; 
    overflow: hidden; transition: transform 0.2s; cursor: pointer; 
}
.photo-card:hover { transform: translateY(-4px); }
.photo-card img { width: 100%; aspect-ratio: 4/3; object-fit: cover; }
.photo-card-info { padding: 12px; }
.photo-card-ambiente { font-size: 11px; color: var(--accent); text-transform: uppercase; margin-bottom: 4px; }
.photo-card-data { font-size: 10px; color: var(--text3); }

/* ===== STATS ===== */
.stats-row { 
    display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
    gap: 16px; margin-bottom: 20px; 
}
.stat-card { 
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px; 
    padding: 16px; transition: transform 0.2s; 
}
.stat-card:hover { transform: translateY(-4px); }
.stat-label { 
    font-size: 10px; color: var(--text3); text-transform: uppercase; 
    font-family: 'IBM Plex Mono', monospace; margin-bottom: 8px; 
}
.stat-value { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 22px; }
.stat-bar-bg { height: 4px; background: var(--border); border-radius: 2px; margin-top: 10px; overflow: hidden; }
.stat-bar-fill { height: 100%; background: var(--accent3); border-radius: 2px; transition: width 0.5s ease-out; }

/* ===== MODAL ===== */
.modal { 
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
    background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 1000; 
    align-items: center; justify-content: center; 
}
.modal.open { display: flex; }
.modal-content { 
    background: var(--surface); border: 1px solid var(--border); border-radius: 24px; 
    padding: 30px; width: 90%; max-width: 500px; 
}
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.modal-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 18px; }
.modal-close { background: none; border: none; color: var(--text2); font-size: 24px; cursor: pointer; }
.modal-close:hover { color: var(--text); }

/* ===== NOTIFICATION ===== */
.notification { 
    position: fixed; bottom: 20px; right: 20px; background: var(--surface); 
    border: 1px solid var(--border); border-radius: 10px; padding: 14px 20px; 
    display: flex; align-items: center; gap: 12px; z-index: 999; 
    transform: translateY(100px); opacity: 0; transition: all 0.3s; 
}
.notification.show { transform: translateY(0); opacity: 1; }
.notification.success { border-color: var(--accent3); }

/* ===== AMBIENTES TABS ===== */
.ambientes-tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
.ambiente-tab { 
    padding: 8px 16px; background: var(--surface); border: 1px solid var(--border); 
    border-radius: 20px; cursor: pointer; font-size: 12px; color: var(--text2); 
}
.ambiente-tab.active { background: var(--accent); color: #000; border-color: var(--accent); }

/* ===== CLIENT TIMELINE ===== */
.client-timeline { 
    position: relative; padding-left: 30px; border-left: 3px solid var(--border); 
    margin: 30px 0; 
}
.client-item { 
    position: relative; padding-left: 20px; margin-bottom: 25px; 
    opacity: 0; animation: slideInLeft 0.5s ease forwards; 
    transition: all 0.3s ease; 
}
.client-item:hover { 
    transform: translateX(10px); background: var(--surface); 
    border-radius: 12px; padding: 15px; margin-left: -15px; 
}
.client-item::before { 
    content: ''; position: absolute; left: -26px; top: 5px; 
    width: 12px; height: 12px; border-radius: 50%; background: var(--border); 
    transition: all 0.3s; 
}
.client-item.done::before { background: var(--accent3); }
.client-item.active::before { background: var(--accent); animation: pulse 1.5s infinite; }
.client-item:nth-child(1) { animation-delay: 0.1s; }
.client-item:nth-child(2) { animation-delay: 0.2s; }
.client-item:nth-child(3) { animation-delay: 0.3s; }
.client-item:nth-child(4) { animation-delay: 0.4s; }
.client-item:nth-child(5) { animation-delay: 0.5s; }
.client-item:nth-child(6) { animation-delay: 0.6s; }
.client-item:nth-child(7) { animation-delay: 0.7s; }
.client-item:nth-child(8) { animation-delay: 0.8s; }
.client-status { 
    font-size: 11px; padding: 4px 8px; border-radius: 4px; 
    display: inline-block; margin-top: 5px; 
}
.status-pendente { background: rgba(74,84,104,0.1); color: var(--text2); }
.status-em-andamento { background: rgba(232,160,32,0.1); color: var(--accent); }
.status-concluido { background: rgba(16,185,129,0.1); color: var(--accent3); }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginModal" class="login-modal">
    <div class="login-content">
        <h2 style="color: var(--accent); margin-bottom: 20px; font-family:'Syne'">🏗️ Torre L'iris</h2>
        <p style="color:var(--text2); margin-bottom:20px; font-size:12px">Aptos 1702 e 1704</p>
        <input type="password" id="senhaInput" class="login-input" placeholder="Senha do administrador">
        <button class="login-btn btn-admin" onclick="verificarSenha()">Entrar como Admin</button>
        <button class="login-btn btn-client" onclick="entrarComoCliente()">Visualizar como Cliente</button>
    </div>
</div>

<!-- MODAL -->
<div id="modalGenerico" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <div class="modal-title" id="modalTitulo">Título</div>
            <button class="modal-close" onclick="fecharModal()">&times;</button>
        </div>
        <div id="modalConteudo"></div>
    </div>
</div>

<!-- NOTIFICATION -->
<div id="notification" class="notification">
    <span id="notifIcon">✅</span>
    <span id="notifMsg">Mensagem</span>
</div>

<div id="app"></div>

<script>
// ==================== CONFIG ====================
const SENHA_ADMIN = "torre2026";
let admin = false;
let modoAtual = 'cronograma';
let ambienteFotoSelecionado = 'todos';
let dadosAlterados = false;

// ==================== DADOS ====================
let dados = {
    titulo: "Torre L'iris Residence",
    endereco: "Aptos 1702 e 1704",
    dataInicio: "2024-08-01", // ← ÚNICA DATA QUE IMPORTA
    duracaoTotal: 20,
    valor: 234943.54,
    cliente: {
        nome: "Seu Aldebaner",
        email: "aldebaner@email.com",
        telefone: "(91) 99999-9999",
        observacoes: "Cliente prefere contato por WhatsApp"
    },
    obra: {
        arquiteto: "Isabela Kalume",
        area: "180 m²",
        tipo: "Reforma Completa"
    },
    grupos: [
        { 
            id: 'g1', nome: '1. Serviços Preliminares', cor: '#3b82f6', 
            inicio: 0, duracao: 2, responsavel: 'Admin', 
            tarefas: [
                { nome: 'Placa de Obra', duracao: 1, responsavel: 'Admin', progresso: 100 },
                { nome: 'Administração da Obra', duracao: 5, responsavel: 'Engenheiro', progresso: 40 }
            ] 
        },
        { 
            id: 'g2', nome: '2. Demolições', cor: '#f43f5e', 
            inicio: 2, duracao: 2, responsavel: 'Equipe A', 
            tarefas: [
                { nome: 'Demolição Alvenaria', duracao: 2, responsavel: 'Pedreiro', progresso: 0 },
                { nome: 'Remoção Entulho', duracao: 2, responsavel: 'Servente', progresso: 0 }
            ] 
        },
        { 
            id: 'g3', nome: '3. Paredes', cor: '#e8a020', 
            inicio: 4, duracao: 2, responsavel: 'Pedreiro', 
            tarefas: [
                { nome: 'Alvenaria Tijolo', duracao: 2, responsavel: 'Pedreiro', progresso: 0 }
            ] 
        }
    ],
    orcamento: [
        { id: 'o1', grupo: 'Serviços Preliminares', descricao: 'Placa de Obra', valor: 1639.05 },
        { id: 'o2', grupo: 'Serviços Preliminares', descricao: 'Administração da Obra', valor: 38139.75 }
    ],
    ambientes: ['Sala', 'Cozinha', 'Quarto 1', 'Quarto 2', 'Banheiro 1', 'Banheiro 2', 'Área Serviço', 'Varanda'],
    fotos: [
        { url: 'https://via.placeholder.com/400x300/3b82f6/ffffff?text=Sala', ambiente: 'Sala', data: '01/08/2024' },
        { url: 'https://via.placeholder.com/400x300/10b981/ffffff?text=Cozinha', ambiente: 'Cozinha', data: '01/08/2024' }
    ]
};

// ==================== FUNÇÕES DE DATA ====================
const SEMANA_PX = 40;

function getDataInicio() {
    return new Date(dados.dataInicio);
}

function fmtSemana(s) {
    const start = getDataInicio();
    if (isNaN(start.getTime())) return '??/??';
    const d = new Date(start.getTime() + s * 7 * 24 * 3600 * 1000);
    return d.toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit'});
}

function fmtSemanaCompleta(s) {
    const start = getDataInicio();
    if (isNaN(start.getTime())) return 'Data inválida';
    const d = new Date(start.getTime() + s * 7 * 24 * 3600 * 1000);
    return d.toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit', year:'numeric'});
}

function calcularPrevisao() {
    const start = getDataInicio();
    if (isNaN(start.getTime())) return 'Data não definida';
    const semanas = dados.duracaoTotal || 20;
    const end = new Date(start.getTime() + semanas * 7 * 24 * 3600 * 1000);
    return end.toLocaleDateString('pt-BR', {month:'short', year:'numeric'});
}

function getSemanaAtual() {
    const start = getDataInicio();
    if (isNaN(start.getTime())) return 0;
    return Math.round((new Date() - start) / (7 * 24 * 3600 * 1000));
}

// ==================== FUNÇÕES DE PROGRESSO ====================
function calcularProgressoGrupo(g) {
    if (!g.tarefas || g.tarefas.length === 0) return 0;
    return Math.round(g.tarefas.reduce((acc, t) => acc + (t.progresso || 0), 0) / g.tarefas.length);
}

function calcularProgressoGeral() {
    let totalTarefas = 0;
    let somaProgresso = 0;
    dados.grupos.forEach(g => {
        g.tarefas.forEach(t => {
            totalTarefas++;
            somaProgresso += t.progresso || 0;
        });
    });
    return totalTarefas > 0 ? Math.round(somaProgresso / totalTarefas) : 0;
}

// ==================== PERSISTÊNCIA ====================
function salvarDados() {
    localStorage.setItem('obraLiris_v4', JSON.stringify(dados));
    dadosAlterados = false;
    atualizarIndicadorSave();
    mostrarNotificacao('Dados salvos com sucesso!', 'success');
}

function carregarDados() {
    const salvos = localStorage.getItem('obraLiris_v4');
    if (salvos) {
        dados = JSON.parse(salvos);
    }
}

function marcarAlterado() {
    dadosAlterados = true;
    atualizarIndicadorSave();
}

function atualizarIndicadorSave() {
    const indicator = document.getElementById('saveIndicator');
    if (indicator) {
        indicator.className = 'save-indicator ' + (dadosAlterados ? 'pending' : 'saved');
    }
}

// ==================== LOGIN ====================
function verificarSenha() {
    const senha = document.getElementById('senhaInput').value;
    if (senha === SENHA_ADMIN) {
        admin = true;
        document.getElementById('loginModal').style.display = 'none';
        carregarDados();
        renderizarAdmin();
    } else {
        alert('Senha incorreta');
    }
}

function entrarComoCliente() {
    admin = false;
    document.getElementById('loginModal').style.display = 'none';
    carregarDados();
    renderizarCliente();
}

// ==================== NOTIFICAÇÕES ====================
function mostrarNotificacao(mensagem, tipo = 'success') {
    const notif = document.getElementById('notification');
    const icon = document.getElementById('notifIcon');
    const msg = document.getElementById('notifMsg');
    icon.textContent = tipo === 'success' ? '✅' : '⚠️';
    msg.textContent = mensagem;
    notif.className = 'notification show ' + tipo;
    setTimeout(() => { notif.className = 'notification'; }, 3000);
}

// ==================== MODAL ====================
function abrirModal(titulo, conteudo) {
    document.getElementById('modalTitulo').textContent = titulo;
    document.getElementById('modalConteudo').innerHTML = conteudo;
    document.getElementById('modalGenerico').classList.add('open');
}
function fecharModal() {
    document.getElementById('modalGenerico').classList.remove('open');
}

// ==================== FUNÇÃO ESPECÍFICA PARA DATA (AGORA NO CRONOGRAMA) ====================
function atualizarDataInicio(novaData) {
    dados.dataInicio = novaData;
    marcarAlterado();
    
    // Atualiza a visualização atual
    if (admin) {
        renderizarAdmin();
    } else {
        renderizarCliente();
    }
    
    mostrarNotificacao('Data de início atualizada! Cronograma recalculado.', 'success');
}

function renderizarSaveBar() {
    return `
    <div class="save-bar">
        <div class="save-status">
            <div id="saveIndicator" class="save-indicator saved"></div>
            <span>${dadosAlterados ? 'Alterações não salvas' : 'Tudo salvo'}</span>
        </div>
        <button class="btn btn-success" onclick="salvarDados()">💾 Salvar Alterações</button>
    </div>`;
}

function mudarModo(modo) {
    if (dadosAlterados) {
        if (!confirm('Você tem alterações não salvas. Deseja salvar antes de mudar?')) { return; }
        salvarDados();
    }
    modoAtual = modo;
    renderizarAdmin();
}

function renderizarConteudoAdmin() {
    switch(modoAtual) {
        case 'cronograma': return renderizarCronogramaAdmin();
        case 'dadosCliente': return renderizarDadosClienteAdmin();
        case 'orcamento': return renderizarOrcamentoAdmin();
        case 'fotos': return renderizarFotosAdmin();
        case 'ambientes': return renderizarAmbientesAdmin();
        default: return renderizarCronogramaAdmin();
    }
}

function renderizarCronogramaAdmin() {
    return `
    <div class="page-header">

            <div class="page-sub">${dados.endereco} · Previsão: ${calcularPrevisao()}</div>
        </div>
        <div style="display:flex; gap:10px">
            <div style="display:flex; align-items:center; gap:5px; background:var(--surface); padding:5px 10px; border-radius:8px">
                <span style="color:var(--accent)">📅 Data de Início:</span>
                <input type="date" value="${dados.dataInicio}" onchange="atualizarDataInicio(this.value)" style="background:var(--bg); border:1px solid var(--border); color:var(--text); padding:5px; border-radius:4px">
            </div>
            <button class="btn btn-ghost" onclick="exportarCronograma()">📥 Exportar</button>

    <div class="gantt-wrap">

            <div class="gh-cell">Início</div>

function renderizarGantt() {
    const body = document.getElementById('ganttBody');
    if (!body) return;
    body.innerHTML = '';
    
    dados.grupos.forEach((g, gIndex) => {
        const progressoGrupo = calcularProgressoGrupo(g);
        const semanaAtual = getSemanaAtual();
        
        const grupoDiv = document.createElement('div');
        grupoDiv.className = 'gantt-group';
        
        // Grupo
        const grupoHeader = document.createElement('div');
        grupoHeader.className = 'gantt-group-header';
        grupoHeader.innerHTML = `
            <div class="gc">
                <div class="dot" style="background:${g.cor}"></div>
                <input class="gc-edit" value="${g.nome}" onchange="dados.grupos[${gIndex}].nome=this.value; marcarAlterado(); renderizarGantt();">
            </div>
            <div class="gc">${fmtSemana(g.inicio)}</div>
            <div class="gc">${fmtSemana(g.inicio + g.duracao)}</div>
            <div class="gc"><input class="gc-edit" type="number" value="${g.duracao}" onchange="dados.grupos[${gIndex}].duracao=parseInt(this.value); marcarAlterado(); renderizarGantt();"></div>
            <div class="gc"><input class="gc-edit" value="${g.responsavel}" onchange="dados.grupos[${gIndex}].responsavel=this.value; marcarAlterado();"></div>
            <div class="gc">
                <div class="bar-area">
                    <div class="today-line" style="left:${semanaAtual * SEMANA_PX}px"></div>
                    <div class="gantt-bar" style="left:${g.inicio * SEMANA_PX}px; width:${g.duracao * SEMANA_PX}px; background:${g.cor}33; border:1px solid ${g.cor}">
                        <div class="gantt-bar-fill" style="width:${progressoGrupo}%; background:${g.cor}"></div>
                    </div>
                </div>
            </div>
        `;
        grupoDiv.appendChild(grupoHeader);
        
        // Tarefas
        g.tarefas.forEach((t, tIndex) => {
            const tarefaRow = document.createElement('div');
            tarefaRow.className = 'gantt-row';
            tarefaRow.innerHTML = `
                <div class="gc" style="padding-left:36px">
                    <input class="gc-edit" value="${t.nome}" onchange="dados.grupos[${gIndex}].tarefas[${tIndex}].nome=this.value; marcarAlterado();">
                </div>
                <div class="gc">${fmtSemana(g.inicio)}</div>
                <div class="gc">${fmtSemana(g.inicio + t.duracao)}</div>
                <div class="gc"><input class="gc-edit" type="number" value="${t.duracao}" onchange="dados.grupos[${gIndex}].tarefas[${tIndex}].duracao=parseInt(this.value); marcarAlterado(); renderizarGantt();"></div>
                <div class="gc">
                    <input type="range" min="0" max="100" value="${t.progresso}" style="width:80px; accent-color:${g.cor}" onchange="dados.grupos[${gIndex}].tarefas[${tIndex}].progresso=parseInt(this.value); marcarAlterado(); renderizarGantt();">
                    <span style="margin-left:5px">${t.progresso}%</span>
                </div>
                <div class="gc">
                    <div class="bar-area">
                        <div class="today-line" style="left:${semanaAtual * SEMANA_PX}px"></div>
                        <div class="gantt-bar" style="left:${g.inicio * SEMANA_PX}px; width:${t.duracao * SEMANA_PX}px; background:${g.cor}22; border:1px solid ${g.cor}55">
                            <div class="gantt-bar-fill" style="width:${t.progresso}%; background:${g.cor}"></div>
                        </div>
                    </div>
                </div>
            `;
            grupoDiv.appendChild(tarefaRow);
        });
        
        // Botão adicionar tarefa
        const addRow = document.createElement('div');
        addRow.className = 'gantt-row';
        addRow.innerHTML = `
            <div class="gc" style="padding-left:12px">
                <button class="btn btn-primary" onclick="adicionarTarefa(${gIndex})">+ Adicionar Tarefa</button>
                <button class="btn btn-danger" onclick="excluirGrupo(${gIndex})">🗑️ Grupo</button>
            </div>
            <div class="gc"></div><div class="gc"></div><div class="gc"></div><div class="gc"></div><div class="gc"></div>
        `;
        grupoDiv.appendChild(addRow);
        
        body.appendChild(grupoDiv);
    });
}

function adicionarGrupo() {
    dados.grupos.push({
        id: 'g' + (dados.grupos.length + 1),
        nome: 'Novo Grupo',
        cor: '#' + Math.floor(Math.random()*16777215).toString(16),
        inicio: dados.grupos.length * 2,
        duracao: 2,
        responsavel: 'Equipe',
        tarefas: []
    });
    marcarAlterado();
    renderizarGantt();
}

function adicionarTarefa(gIndex) {
    dados.grupos[gIndex].tarefas.push({
        nome: 'Nova Tarefa',
        duracao: 2,
        responsavel: 'Equipe',
        progresso: 0
    });
    marcarAlterado();
    renderizarGantt();
}

function excluirGrupo(gIndex) {
    if (confirm('Excluir este grupo?')) {
        dados.grupos.splice(gIndex, 1);
        marcarAlterado();
        renderizarGantt();
        mostrarNotificacao('Grupo excluído!');
    }
}

function exportarCronograma() {
    const ws = XLSX.utils.json_to_sheet(dados.grupos);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Cronograma');
    XLSX.writeFile(wb, 'cronograma-torre-liris.xlsx');
    mostrarNotificacao('Cronograma exportado!');
}

    <div class="page-header">

            <div class="page-sub">${dados.fotos.length} fotos</div>

            <img src="${foto.url}" alt="${foto.ambiente}">

                <div class="photo-card-data">${foto.data}</div>

            </div>
        </div>
        `).join('')}
    </div>`;
}

function adicionarFoto() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.onchange = function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                abrirModal('Adicionar Foto', `
                    <div style="display:grid; gap:12px">
                        <img src="${e.target.result}" style="width:100%; border-radius:10px">
                        <select id="fotoAmbiente" class="crud-input">
                            ${dados.ambientes.map(amb => `<option value="${amb}">${amb}</option>`).join('')}
                        </select>
                        <button class="btn btn-primary" onclick="confirmarFoto('${e.target.result}')">Salvar</button>
                    </div>
                `);
            };
            reader.readAsDataURL(file);
        }
    };
    input.click();
}

function confirmarFoto(url) {
    const ambiente = document.getElementById('fotoAmbiente').value;
    dados.fotos.push({
        url: url,
        ambiente: ambiente,
        data: new Date().toLocaleDateString('pt-BR')
    });
    marcarAlterado();
    fecharModal();
    renderizarFotosAdmin();
    mostrarNotificacao('Foto adicionada!');
}

function excluirFoto(index) {
    if (confirm('Excluir esta foto?')) {
        dados.fotos.splice(index, 1);
        marcarAlterado();
        renderizarFotosAdmin();
        mostrarNotificacao('Foto excluída!');
    }
}
