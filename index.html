<style>
:root {
--bg: #0d0f14; --surface: #13161e; --surface2: #1a1e2a;
--border: #252a38; --accent: #e8a020; --accent2: #3b82f6;
--accent3: #10b981; --accent4: #f43f5e; --text: #e8eaf0;
--text2: #8892a4; --text3: #4a5468; --gantt-h: 44px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 13px; min-height: 100vh; overflow-x: hidden; }

/* LOGIN */
.login-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); display: flex; justify-content: center; align-items: center; z-index: 1000; animation: fadeIn 0.3s ease; }
.login-content { background: var(--surface); border: 1px solid var(--border); border-radius: 48px; padding: 40px; width: 90%; max-width: 380px; text-align: center; animation: slideUp 0.4s ease; }
.login-input { width: 100%; padding: 16px; margin: 15px 0; background: var(--bg); border: 1px solid var(--border); border-radius: 40px; color: var(--text); font-size: 16px; }
.login-btn { width: 100%; padding: 16px; margin: 8px 0; border: none; border-radius: 40px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.btn-admin { background: var(--accent); color: #000; }
.btn-admin:hover { background: #f5ae30; transform: scale(1.02); }
.btn-client { background: var(--accent2); color: white; }
.btn-client:hover { background: #4a90f6; transform: scale(1.02); }

/* TOPBAR */
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 56px; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
.logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 17px; display: flex; align-items: center; gap: 10px; }
.logo-badge { width: 28px; height: 28px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 13px; color: #000; font-weight: 800; }
.btn { padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500; transition: all .15s; display: inline-flex; align-items: center; gap: 6px; }
.btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text2); }
.btn-ghost:hover { border-color: var(--text2); color: var(--text); transform: translateY(-1px); }
.btn-primary { background: var(--accent); color: #000; font-weight: 600; }
.btn-primary:hover { background: #f5ae30; transform: translateY(-1px); }
.btn-danger { background: var(--accent4); color: white; }
.btn-danger:hover { background: #f65a7a; }
.btn-success { background: var(--accent3); color: white; }
.btn-success:hover { background: #1dd796; }

/* LAYOUT */
.layout { display: flex; height: calc(100vh - 56px); }
.sidebar { width: 240px; min-width: 240px; background: var(--surface); border-right: 1px solid var(--border); padding: 16px 0; overflow-y: auto; }
.sidebar-section { margin-bottom: 24px; }
.sidebar-label { font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 1.5px; color: var(--text3); text-transform: uppercase; padding: 0 16px; margin-bottom: 6px; }
.sidebar-item { display: flex; align-items: center; gap: 10px; padding: 10px 16px; color: var(--text2); cursor: pointer; border-left: 2px solid transparent; transition: all 0.2s; }
.sidebar-item:hover { background: var(--surface2); color: var(--text); transform: translateX(4px); }
.sidebar-item.active { color: var(--accent); border-left-color: var(--accent); background: rgba(232,160,32,.06); }

/* MAIN */
.main { flex: 1; overflow: auto; padding: 20px 24px; animation: fadeIn 0.4s ease; }
.page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
.page-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 22px; }
.page-sub { color: var(--text2); font-size: 12px; margin-top: 4px; }

/* SAVE BAR */
.save-bar { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; animation: slideDown 0.3s ease; }
.save-status { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text2); }
.save-indicator { width: 8px; height: 8px; border-radius: 50%; background: var(--text3); transition: background 0.3s; }
.save-indicator.saved { background: var(--accent3); }
.save-indicator.pending { background: var(--accent); animation: pulse 1s infinite; }

/* DADOS DO CLIENTE CARD */
.client-data-card { background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 20px; animation: slideUp 0.4s ease; }
.client-data-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; }
.client-data-item { display: flex; flex-direction: column; gap: 6px; }
.client-data-label { font-size: 10px; color: var(--text3); text-transform: uppercase; font-family: 'IBM Plex Mono', monospace; }
.client-data-value { font-size: 14px; color: var(--text); font-weight: 500; }
.client-data-input { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; color: var(--text); font-size: 13px; width: 100%; }
.client-data-input:focus { outline: none; border-color: var(--accent); }

/* GANTT */
.gantt-wrap { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; background: var(--surface); margin-bottom: 20px; }
.gantt-header { display: grid; grid-template-columns: 280px 100px 100px 80px 100px 1fr; background: var(--surface2); border-bottom: 1px solid var(--border); font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text3); text-transform: uppercase; }
.gh-cell { padding: 12px; border-right: 1px solid var(--border); }
.gantt-group { border-bottom: 1px solid var(--border); }
.gantt-group-header { display: grid; grid-template-columns: 280px 100px 100px 80px 100px 1fr; background: rgba(232,160,32,.08); cursor: pointer; padding: 12px; align-items: center; transition: background 0.2s; }
.gantt-group-header:hover { background: rgba(232,160,32,.12); }
.gantt-row { display: grid; grid-template-columns: 280px 100px 100px 80px 100px 1fr; border-bottom: 1px solid rgba(37,42,56,.6); align-items: center; transition: background 0.2s; }
.gantt-row:hover { background: var(--surface2); }
.gantt-subtask { background: rgba(59,130,246,.05); }
.gc { padding: 0 12px; height: var(--gantt-h); display: flex; align-items: center; border-right: 1px solid var(--border); font-size: 12px; }
.gc-name { font-weight: 500; }
.gc-edit { background: transparent; border: 1px solid var(--border); border-radius: 4px; padding: 4px 8px; color: var(--text); font-size: 11px; width: 100%; transition: border-color 0.2s; }
.gc-edit:focus { outline: none; border-color: var(--accent); }
.dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 8px; }
.bar-area { position: relative; height: var(--gantt-h); min-width: 100%; overflow-x: auto; }
.gantt-bar { position: absolute; top: 50%; transform: translateY(-50%); height: 20px; border-radius: 5px; display: flex; align-items: center; overflow: hidden; cursor: pointer; transition: all 0.3s; }
.gantt-bar:hover { transform: translateY(-50%) scale(1.02); }
.gantt-bar-fill { height: 100%; border-radius: 5px 0 0 5px; opacity: .95; transition: width 0.5s ease-out; }
.gantt-bar-fill.animated { animation: growBar 1s ease-out forwards; }
.today-line { position: absolute; top: 0; bottom: 0; width: 2px; background: var(--accent4); opacity: .7; z-index: 5; }

/* ANIMATED PROGRESS - CLIENT VIEW */
.animated-progress { position: relative; overflow: hidden; }
.animated-progress::after {
    content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
    animation: shimmer 2s infinite;
}
.progress-pulse { animation: pulse 2s infinite; }

/* CRUD */
.crud-container { display: grid; gap: 12px; }
.crud-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; display: grid; grid-template-columns: 1fr 100px 100px 120px; gap: 12px; align-items: center; animation: slideUp 0.3s ease; }
.crud-card-header { background: var(--surface2); font-weight: 600; font-size: 11px; color: var(--text3); text-transform: uppercase; padding: 12px 16px; border-radius: 10px 10px 0 0; }
.crud-input { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; color: var(--text); font-size: 12px; width: 100%; transition: border-color 0.2s; }
.crud-input:focus { outline: none; border-color: var(--accent); }
.crud-actions { display: flex; gap: 6px; }

/* PHOTOS */
.photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
.photo-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; transition: transform 0.2s; }
.photo-card:hover { transform: translateY(-4px); }
.photo-card img { width: 100%; aspect-ratio: 4/3; object-fit: cover; }
.photo-card-info { padding: 12px; }
.photo-card-ambiente { font-size: 11px; color: var(--accent); text-transform: uppercase; margin-bottom: 4px; }
.photo-card-data { font-size: 10px; color: var(--text3); }

/* STATS */
.stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 20px; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; transition: transform 0.2s; animation: slideUp 0.4s ease; }
.stat-card:hover { transform: translateY(-4px); }
.stat-label { font-size: 10px; color: var(--text3); text-transform: uppercase; font-family: 'IBM Plex Mono', monospace; margin-bottom: 8px; }
.stat-value { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 22px; }
.stat-bar-bg { height: 4px; background: var(--border); border-radius: 2px; margin-top: 10px; overflow: hidden; }
.stat-bar-fill { height: 100%; background: var(--accent3); border-radius: 2px; transition: width 0.5s ease-out; }

/* MODAL */
.modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 1000; align-items: center; justify-content: center; }
.modal.open { display: flex; animation: fadeIn 0.3s ease; }
.modal-content { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 30px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; animation: slideUp 0.4s ease; }
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.modal-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 18px; }
.modal-close { background: none; border: none; color: var(--text2); font-size: 24px; cursor: pointer; transition: color 0.2s; }
.modal-close:hover { color: var(--text); }

/* NOTIFICATION */
.notification { position: fixed; bottom: 20px; right: 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 20px; display: flex; align-items: center; gap: 12px; z-index: 999; transform: translateY(100px); opacity: 0; transition: all 0.3s; }
.notification.show { transform: translateY(0); opacity: 1; }
.notification.success { border-color: var(--accent3); }
.notification.error { border-color: var(--accent4); }

/* AMBIENTES TABS */
.ambientes-tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
.ambiente-tab { padding: 8px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; cursor: pointer; font-size: 12px; color: var(--text2); transition: all 0.2s; }
.ambiente-tab:hover { transform: translateY(-2px); }
.ambiente-tab.active { background: var(--accent); color: #000; border-color: var(--accent); }

/* CLIENT TIMELINE ANIMATED */
.client-timeline { position: relative; padding-left: 20px; border-left: 2px solid var(--border); margin: 20px 0; }
.client-timeline::before {
    content: ''; position: absolute; left: -2px; top: 0; width: 2px; height: 0;
    background: linear-gradient(to bottom, var(--accent3), var(--accent));
    animation: growLine 1.5s ease-out forwards;
}
.client-item { position: relative; padding-left: 20px; margin-bottom: 25px; opacity: 0; animation: slideInLeft 0.4s ease forwards; }
.client-item::before { content: ''; position: absolute; left: -26px; top: 5px; width: 10px; height: 10px; border-radius: 50%; background: var(--border); transition: all 0.3s; }
.client-item.done::before { background: var(--accent3); box-shadow: 0 0 10px var(--accent3); }
.client-item.active::before { background: var(--accent); box-shadow: 0 0 15px var(--accent); animation: pulse 1.5s infinite; }
.client-item:nth-child(1) { animation-delay: 0.1s; }
.client-item:nth-child(2) { animation-delay: 0.2s; }
.client-item:nth-child(3) { animation-delay: 0.3s; }
.client-item:nth-child(4) { animation-delay: 0.4s; }
.client-item:nth-child(5) { animation-delay: 0.5s; }
.client-item:nth-child(6) { animation-delay: 0.6s; }
.client-item:nth-child(7) { animation-delay: 0.7s; }
.client-item:nth-child(8) { animation-delay: 0.8s; }
.client-status { font-size: 11px; padding: 4px 8px; border-radius: 4px; display: inline-block; margin-top: 5px; }
.status-pendente { background: rgba(136,146,164,0.1); color: var(--text2); }
.status-em-andamento { background: rgba(232,160,32,0.1); color: var(--accent); }
.status-concluido { background: rgba(16,185,129,0.1); color: var(--accent3); }

/* ANIMATIONS */
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes slideInLeft { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
@keyframes growBar { from { width: 0; } to { width: var(--target-width); } }
@keyframes growLine { from { height: 0; } to { height: 100%; } }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
@keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

/* RESPONSIVE */
@media (max-width: 768px) {
    .sidebar { display: none; }
    .gantt-header, .gantt-row { grid-template-columns: 150px 1fr; }
    .gh-cell:nth-child(n+2), .gc:nth-child(n+2) { display: none; }

}
</style>

// ==================== PERSISTÊNCIA ====================
function salvarDados() {
    localStorage.setItem('obraLiris_v3', JSON.stringify(dados));
    dadosAlterados = false;
    atualizarIndicadorSave();
    mostrarNotificacao('Dados salvos com sucesso!', 'success');
}

function carregarDados() {
    const salvos = localStorage.getItem('obraLiris_v3');
    if (salvos) {
        dados = JSON.parse(salvos);
    }
}

function marcarAlterado() {
    dadosAlterados = true;
    atualizarIndicadorSave();
}

function atualizarIndicadorSave() {
    const indicator = document.getElementById('saveIndicator');
    if (indicator) {
        indicator.className = 'save-indicator ' + (dadosAlterados ? 'pending' : 'saved');
    }
}

// ==================== LOGIN ====================
function verificarSenha() {
    const senha = document.getElementById('senhaInput').value;
    if (senha === SENHA_ADMIN) {
        admin = true;
        document.getElementById('loginModal').style.display = 'none';
        carregarDados();
        renderizarAdmin();
    } else {
        alert('Senha incorreta');
    }
}

function entrarComoCliente() {
    admin = false;
    document.getElementById('loginModal').style.display = 'none';
    carregarDados();
    renderizarCliente();
}

// ==================== DATAS ====================
const SEMANA_PX = 40;
function fmtSemana(s) {
    const start = new Date(dados.dataInicio);
    const d = new Date(start.getTime() + s * 7 * 24 * 3600 * 1000);
    return d.toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit'});
}
function fmtMesAno() {
    const d = new Date(dados.dataInicio);
    return d.toLocaleDateString('pt-BR', {month:'long', year:'numeric'});
}
const semanaAtual = Math.round((new Date() - new Date(dados.dataInicio)) / (7*24*3600*1000));

// ==================== NOTIFICAÇÕES ====================
function mostrarNotificacao(mensagem, tipo = 'success') {
    const notif = document.getElementById('notification');
    const icon = document.getElementById('notifIcon');
    const msg = document.getElementById('notifMsg');
    icon.textContent = tipo === 'success' ? '✅' : '⚠️';
    msg.textContent = mensagem;
    notif.className = 'notification show ' + tipo;
    setTimeout(() => { notif.className = 'notification'; }, 3000);
}

function abrirModal(titulo, conteudo) {
    document.getElementById('modalTitulo').textContent = titulo;
    document.getElementById('modalConteudo').innerHTML = conteudo;

}
function fecharModal() {
    document.getElementById('modalGenerico').classList.remove('open');
}

function renderizarGantt() {
    const body = document.getElementById('ganttBody');
    if (!body) return;
    body.innerHTML = '';
    dados.grupos.forEach((g, gIndex) => {
        const grupoDiv = document.createElement('div');
        grupoDiv.className = 'gantt-group';
        const grupoHeader = document.createElement('div');
        grupoHeader.className = 'gantt-group-header';
        grupoHeader.innerHTML = `
            <div class="gc gc-name">
                <div class="dot" style="background:${g.cor}"></div>
                <input class="gc-edit" value="${g.nome}" onchange="editarGrupoNome(${gIndex}, this.value)" style="background:transparent; border:none; color:var(--text); font-weight:600">
            </div>
            <div class="gc">${fmtSemana(g.inicio)}</div>
            <div class="gc">${fmtSemana(g.inicio + g.duracao)}</div>
            <div class="gc"><input type="number" class="gc-edit" value="${g.duracao}" onchange="editarGrupoDuracao(${gIndex}, this.value)" style="width:50px"></div>
            <div class="gc"><input class="gc-edit" value="${g.responsavel}" onchange="editarGrupoResp(${gIndex}, this.value)"></div>
            <div class="gc">
                <div class="bar-area">
                    <div class="today-line" style="left:${semanaAtual * SEMANA_PX}px"></div>
                    <div class="gantt-bar" style="left:${g.inicio * SEMANA_PX}px; width:${g.duracao * SEMANA_PX}px; background:${g.cor}33; border:1px solid ${g.cor}">
                        <div class="gantt-bar-fill" style="width:50%; background:${g.cor}"></div>
                    </div>
                </div>
            </div>
        `;
        grupoDiv.appendChild(grupoHeader);
        g.tarefas.forEach((t, tIndex) => {
            const tarefaRow = document.createElement('div');
            tarefaRow.className = 'gantt-row';
            tarefaRow.innerHTML = `
                <div class="gc" style="padding-left:36px">
                    <input class="gc-edit" value="${t.nome}" onchange="editarTarefaNome(${gIndex}, ${tIndex}, this.value)">
                </div>
                <div class="gc">${fmtSemana(g.inicio)}</div>
                <div class="gc">${fmtSemana(g.inicio + t.duracao)}</div>
                <div class="gc"><input type="number" class="gc-edit" value="${t.duracao}" onchange="editarTarefaDuracao(${gIndex}, ${tIndex}, this.value)" style="width:50px"></div>
                <div class="gc">
                    <input type="range" min="0" max="100" value="${t.progresso}" style="width:80px; accent-color:${g.cor}" onchange="editarTarefaProgresso(${gIndex}, ${tIndex}, this.value)">
                    <span style="margin-left:5px; width:30px">${t.progresso}%</span>
                </div>
                <div class="gc">
                    <div class="bar-area">
                        <div class="gantt-bar">
                            <div class="gantt-bar-fill" style="width:${t.progresso}%; background:${g.cor}"></div>
                        </div>
                    </div>
                </div>
            `;
            grupoDiv.appendChild(tarefaRow);
            const addSubtaskRow = document.createElement('div');
            addSubtaskRow.className = 'gantt-row gantt-subtask';
            addSubtaskRow.innerHTML = `
                <div class="gc" style="padding-left:56px">
                    <button class="btn btn-ghost" style="padding:4px 8px" onclick="adicionarSubtask(${gIndex}, ${tIndex})">+ Sub-tarefa</button>
                    <button class="btn btn-danger" style="padding:4px 8px; margin-left:8px" onclick="excluirTarefa(${gIndex}, ${tIndex})">🗑️ Tarefa</button>
                </div>
                <div class="gc"></div><div class="gc"></div><div class="gc"></div><div class="gc"></div><div class="gc"></div>
            `;
            grupoDiv.appendChild(addSubtaskRow);
        });
        const addTaskRow = document.createElement('div');
        addTaskRow.className = 'gantt-row';
        addTaskRow.innerHTML = `
            <div class="gc" style="padding-left:12px">
                <button class="btn btn-primary" style="padding:6px 12px" onclick="adicionarTarefa(${gIndex})">+ Adicionar Tarefa</button>
                <button class="btn btn-danger" style="padding:6px 12px; margin-left:8px" onclick="excluirGrupo(${gIndex})">🗑️ Grupo</button>
            </div>
            <div class="gc"></div><div class="gc"></div><div class="gc"></div><div class="gc"></div><div class="gc"></div>
        `;
        grupoDiv.appendChild(addTaskRow);
        body.appendChild(grupoDiv);
    });
}

// ==================== FUNÇÕES CRONOGRAMA ====================
function editarGrupoNome(index, valor) { dados.grupos[index].nome = valor; marcarAlterado(); }
function editarGrupoDuracao(index, valor) { dados.grupos[index].duracao = parseInt(valor); marcarAlterado(); renderizarGantt(); }
function editarGrupoResp(index, valor) { dados.grupos[index].responsavel = valor; marcarAlterado(); }
function editarTarefaNome(gIndex, tIndex, valor) { dados.grupos[gIndex].tarefas[tIndex].nome = valor; marcarAlterado(); }
function editarTarefaDuracao(gIndex, tIndex, valor) { dados.grupos[gIndex].tarefas[tIndex].duracao = parseInt(valor); marcarAlterado(); renderizarGantt(); }
function editarTarefaProgresso(gIndex, tIndex, valor) { dados.grupos[gIndex].tarefas[tIndex].progresso = parseInt(valor); marcarAlterado(); }
function adicionarGrupo() {
    dados.grupos.push({ id: 'g' + (dados.grupos.length + 1), nome: 'Novo Grupo', cor: '#' + Math.floor(Math.random()*16777215).toString(16), inicio: dados.grupos.length * 2, duracao: 2, responsavel: 'Equipe', tarefas: [] });
    marcarAlterado(); renderizarGantt();
}
function adicionarTarefa(gIndex) {
    dados.grupos[gIndex].tarefas.push({ id: 't' + Date.now(), nome: 'Nova Tarefa', duracao: 2, responsavel: 'Equipe', progresso: 0, subtasks: [] });
    marcarAlterado(); renderizarGantt();
}
function excluirTarefa(gIndex, tIndex) {
    if (confirm('Excluir esta tarefa?')) {
        dados.grupos[gIndex].tarefas.splice(tIndex, 1);
        marcarAlterado(); renderizarGantt();
        mostrarNotificacao('Tarefa excluída!', 'success');
    }
}
function excluirGrupo(gIndex) {
    if (confirm('Excluir este grupo?')) {
        dados.grupos.splice(gIndex, 1);
        marcarAlterado(); renderizarGantt();
        mostrarNotificacao('Grupo excluído!', 'success');
    }
}
function adicionarSubtask(gIndex, tIndex) {
    dados.grupos[gIndex].tarefas[tIndex].subtasks.push({ nome: 'Nova Sub-tarefa', duracao: 1, progresso: 0 });
    marcarAlterado(); renderizarGantt();
}
function exportarCronograma() {
    const ws = XLSX.utils.json_to_sheet(dados.grupos);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Cronograma');
    XLSX.writeFile(wb, 'cronograma-torre-liris.xlsx');
    mostrarNotificacao('Cronograma exportado!');
}

function renderizarFotosAdmin() {
    const ambientes = ['todos', ...dados.ambientes];
    return `
    <div class="page-header">

            <div class="page-title">📸 Fotos da Obra</div>

    </div>

        ${dados.fotos.filter(f => ambienteFotoSelecionado === 'todos' || f.ambiente === ambienteFotoSelecionado).map((foto, index) => `

            </div>
        </div>
        `).join('')}
    </div>`;
}
function filtrarFotos(ambiente) { ambienteFotoSelecionado = ambiente; renderizarFotosAdmin(); }
function adicionarFoto() {
    const input = document.createElement('input');
    input.type = 'file'; input.accept = 'image/*';
    input.onchange = function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                abrirModal('Adicionar Foto', `
                    <div style="display:grid; gap:12px">
                        <img src="${e.target.result}" style="width:100%; border-radius:10px">
                        <label style="font-size:12px; color:var(--text2)">Ambiente</label>
                        <select id="fotoAmbiente" class="crud-input">${dados.ambientes.map(amb => `<option value="${amb}">${amb}</option>`).join('')}</select>
                        <button class="btn btn-primary" onclick="confirmarFoto('${e.target.result}')">Salvar Foto</button>
                    </div>
                `);
            };
            reader.readAsDataURL(file);
        }
    };
    input.click();
}
function confirmarFoto(url) {
    const ambiente = document.getElementById('fotoAmbiente').value;
    dados.fotos.push({ id: 'f' + Date.now(), url: url, ambiente: ambiente, data: new Date().toLocaleDateString('pt-BR') });
    marcarAlterado(); fecharModal(); renderizarFotosAdmin();
    mostrarNotificacao('Foto adicionada!');
}
function excluirFoto(index) {
    if (confirm('Excluir esta foto?')) {
        dados.fotos.splice(index, 1);
        marcarAlterado(); renderizarFotosAdmin();
        mostrarNotificacao('Foto excluída!', 'success');
    }
}

// ==================== AMBIENTES (CORRIGIDO) ====================
function renderizarAmbientesAdmin() {
    return `
    <div class="page-header">
        <div class="page-title">🏠 Ambientes</div>
        <button class="btn btn-primary" onclick="adicionarAmbiente()">+ Adicionar Ambiente</button>
    </div>
    <div class="crud-container">
        ${dados.ambientes.map((amb, index) => `
        <div class="crud-card">
            <input class="crud-input" value="${amb}" onchange="editarAmbiente(${index}, this.value)">
            <div></div><div></div>
            <div class="crud-actions"><button class="btn btn-danger" onclick="excluirAmbiente(${index})">🗑️</button></div>
        </div>
        `).join('')}
    </div>`;
}
function adicionarAmbiente() {
    dados.ambientes.push('Novo Ambiente');
    marcarAlterado();
    renderizarAmbientesAdmin(); // CORREÇÃO: Atualiza imediatamente
    mostrarNotificacao('Ambiente criado!', 'success');
}
function editarAmbiente(index, valor) { dados.ambientes[index] = valor; marcarAlterado(); }
function excluirAmbiente(index) {
    if (confirm('Excluir este ambiente?')) {
        dados.ambientes.splice(index, 1);
        marcarAlterado();
        renderizarAmbientesAdmin(); // CORREÇÃO: Atualiza imediatamente
        mostrarNotificacao('Ambiente excluído!', 'success');
    }
}

// ==================== RENDERIZAÇÃO CLIENTE (COM ANIMAÇÕES) ====================
function renderizarCliente() {
    const app = document.getElementById('app');
    app.innerHTML = `
    <div class="topbar">
        <div class="logo"><div class="logo-badge">C</div> ${dados.titulo} - Cliente</div>
        <button class="btn btn-ghost" onclick="location.reload()">🔄 Sair</button>
    </div>
    <div class="main">
        ${renderizarDadosClienteView()}
        ${renderizarStatsCliente()}
        ${renderizarCronogramaAnimadoCliente()}
        ${renderizarFotosCliente()}
    </div>`;
}

function renderizarDadosClienteView() {
    return `
    <div class="client-data-card">
        <div class="client-data-grid">
            <div class="client-data-item">
                <div class="client-data-label">Cliente</div>
                <div class="client-data-value" style="font-size:16px; color:var(--accent)">👤 ${dados.cliente.nome}</div>
            </div>
            <div class="client-data-item">
                <div class="client-data-label">Contato</div>
                <div class="client-data-value">📞 ${dados.cliente.telefone}</div>
            </div>
            <div class="client-data-item">
                <div class="client-data-label">Arquiteto</div>
                <div class="client-data-value">📐 ${dados.obra.arquiteto}</div>
            </div>
            <div class="client-data-item">
                <div class="client-data-label">Obra</div>
                <div class="client-data-value">🏠 ${dados.obra.area} · ${dados.obra.tipo}</div>
            </div>
        </div>
    </div>`;
}

function renderizarStatsCliente() {
    let totalT = 0, totalP = 0;
    dados.grupos.forEach(g => g.tarefas.forEach(t => { totalT++; totalP += t.progresso; }));
    const media = totalT ? Math.round(totalP/totalT) : 0;
    return `
    <div class="stats-row">
        <div class="stat-card">
            <div class="stat-label">Progresso Geral</div>
            <div class="stat-value" style="color: var(--accent3)">${media}%</div>
            <div class="stat-bar-bg"><div class="stat-bar-fill animated-progress" style="width:${media}%"></div></div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Previsão</div>
            <div class="stat-value">Jun/2026</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Etapas</div>
            <div class="stat-value">${dados.grupos.length} Grupos</div>
        </div>
    </div>`;
}

function renderizarCronogramaAnimadoCliente() {
    return `
    <div class="page-header">
        <div class="page-title">📅 Cronograma da Obra</div>
    </div>
    <div class="client-timeline">
        ${dados.grupos.map((g, index) => {
            const progressoMedio = g.tarefas.reduce((acc, t) => acc + t.progresso, 0) / g.tarefas.length;
            const status = progressoMedio >= 100 ? 'Concluído' : (progressoMedio > 0 ? 'Em andamento' : 'Pendente');
            const statusClass = progressoMedio >= 100 ? 'concluido' : (progressoMedio > 0 ? 'em-andamento' : 'pendente');
            return `
            <div class="client-item ${statusClass}" style="animation-delay: ${index * 0.15}s">
                <div style="font-weight:600; color:var(--text); display:flex; justify-content:space-between; align-items:center">
                    <span>${g.nome}</span>
                    <span style="color:${g.cor}; font-weight:700">${Math.round(progressoMedio)}%</span>
                </div>
                <div style="font-size:11px; color:var(--text2); margin-top:4px">
                    ${g.tarefas.map(t => t.nome).join(' • ')}
                </div>
                <div class="client-status status-${statusClass}">${status}</div>
                <div class="stat-bar-bg" style="margin-top:8px">
                    <div class="stat-bar-fill animated-progress progress-pulse" style="width:${progressoMedio}%; background:${g.cor}"></div>
                </div>
            </div>`;
        }).join('')}
    </div>`;
}

function renderizarFotosCliente() {
    return `
    <div class="page-header">
        <div class="page-title">📸 Galeria da Obra</div>
    </div>
    <div class="ambientes-tabs">
        ${dados.ambientes.map(amb => `<div class="ambiente-tab">${amb}</div>`).join('')}
    </div>
    <div class="photo-grid">
        ${dados.fotos.slice(0, 8).map((foto, index) => `
        <div class="photo-card" style="animation: slideUp 0.4s ease ${index * 0.1}s forwards; opacity:0">
            <img src="${foto.url}" alt="${foto.ambiente}">
            <div class="photo-card-info">
                <div class="photo-card-ambiente">${foto.ambiente}</div>
                <div class="photo-card-data">${foto.data}</div>
            </div>
        </div>
        `).join('')}
    </div>`;
}

// ==================== INICIALIZAÇÃO ====================
carregarDados();
</script>
</body>
</html>
