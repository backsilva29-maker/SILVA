<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🏗️ Torre L'iris — Gestão Inteligente</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#0d0f14;--surface:#13161e;--surface2:#1a1e2a;--border:#252a38;
  --accent:#e8a020;--accent2:#3b82f6;--accent3:#10b981;--accent4:#f43f5e;
  --text:#e8eaf0;--text2:#8892a4;--text3:#4a5468;--gantt-h:44px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:13px;min-height:100vh;overflow-x:hidden;}

/* ── LOGIN ── */
.login-modal{position:fixed;inset:0;background:rgba(0,0,0,.88);backdrop-filter:blur(12px);display:flex;justify-content:center;align-items:center;z-index:1000;}
.login-content{background:var(--surface);border:1px solid var(--border);border-radius:48px;padding:44px;width:90%;max-width:380px;text-align:center;}
.login-input{width:100%;padding:16px;margin:12px 0;background:var(--bg);border:1px solid var(--border);border-radius:40px;color:var(--text);font-size:16px;outline:none;transition:border-color .2s;}
.login-input:focus{border-color:var(--accent);}
.login-btn{width:100%;padding:16px;margin:6px 0;border:none;border-radius:40px;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;}
.login-btn:hover{transform:translateY(-2px);filter:brightness(1.1);}
.btn-admin{background:var(--accent);color:#000;}
.btn-client{background:var(--accent2);color:#fff;}
.login-sep{display:flex;align-items:center;gap:10px;color:var(--text3);font-size:11px;margin:4px 0;}
.login-sep::before,.login-sep::after{content:'';flex:1;height:1px;background:var(--border);}

/* ── TOPBAR / SIDEBAR / LAYOUT ── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:56px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:17px;display:flex;align-items:center;gap:10px;}
.logo-badge{width:28px;height:28px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;color:#000;font-weight:800;}
.btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-family:'Inter',sans-serif;font-size:12px;font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:6px;}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text2);}
.btn-ghost:hover{border-color:var(--text2);color:var(--text);}
.btn-primary{background:var(--accent);color:#000;font-weight:600;}
.btn-primary:hover{background:#f5ae30;}
.btn-danger{background:var(--accent4);color:#fff;}
.btn-success{background:var(--accent3);color:#fff;}
.layout{display:flex;height:calc(100vh - 56px);}
.sidebar{width:240px;min-width:240px;background:var(--surface);border-right:1px solid var(--border);padding:16px 0;overflow-y:auto;}
.sidebar-section{margin-bottom:24px;}
.sidebar-label{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:1.5px;color:var(--text3);text-transform:uppercase;padding:0 16px;margin-bottom:6px;}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 16px;color:var(--text2);cursor:pointer;border-left:2px solid transparent;transition:all .2s;}
.sidebar-item:hover{background:var(--surface2);color:var(--text);transform:translateX(4px);}
.sidebar-item.active{color:var(--accent);border-left-color:var(--accent);background:rgba(232,160,32,.06);}
.main{flex:1;overflow:auto;padding:20px 24px;}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border);}
.page-title{font-family:'Syne',sans-serif;font-weight:700;font-size:22px;}
.page-sub{color:var(--text2);font-size:12px;margin-top:4px;}

/* ── SYNC BAR ── */
.sync-bar{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.sync-status{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2);}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--text3);flex-shrink:0;}
.sync-dot.online{background:var(--accent3);}
.sync-dot.syncing{background:var(--accent);animation:pulse 1s infinite;}
.sync-dot.offline{background:var(--accent4);}
.sync-dot.error{background:var(--accent4);}

/* ── FORMS ── */
.client-data-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:16px;}
.client-data-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;}
.client-data-label{font-size:10px;color:var(--text3);text-transform:uppercase;font-family:'IBM Plex Mono',monospace;display:block;margin-bottom:4px;}
.client-data-input{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-size:13px;width:100%;outline:none;transition:border-color .2s;}
.client-data-input:focus{border-color:var(--accent);}
.data-picker-box{background:var(--bg);border:1px solid var(--accent);border-radius:12px;padding:16px 20px;display:flex;align-items:flex-end;gap:6px;flex-wrap:wrap;margin-top:4px;}
.data-part{display:flex;flex-direction:column;gap:5px;align-items:center;}
.data-part label{font-size:9px;color:var(--text3);text-transform:uppercase;font-family:'IBM Plex Mono',monospace;letter-spacing:1px;}
.data-part input{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 8px;color:var(--text);font-size:22px;font-weight:700;font-family:'Syne',sans-serif;text-align:center;outline:none;}
.data-part input:focus{border-color:var(--accent);}
.data-sep{font-size:24px;color:var(--text3);padding-bottom:10px;}
.data-preview{margin-left:12px;padding-bottom:10px;font-size:12px;color:var(--accent);display:flex;flex-direction:column;gap:3px;}
.crud-input{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-size:12px;width:100%;outline:none;}
.crud-input:focus{border-color:var(--accent);}
.crud-textarea{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-size:13px;width:100%;outline:none;resize:vertical;min-height:80px;font-family:'Inter',sans-serif;}
.crud-textarea:focus{border-color:var(--accent);}
.crud-select{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-size:13px;width:100%;outline:none;}
.crud-select:focus{border-color:var(--accent);}
.crud-container{display:grid;gap:12px;}
.crud-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;display:grid;grid-template-columns:1fr auto auto;gap:12px;align-items:center;}
.btn-crud{height:22px;padding:0 7px;border-radius:4px;border:none;cursor:pointer;font-size:10px;font-weight:600;font-family:'Inter',sans-serif;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;}
.btn-crud-del{background:rgba(244,63,94,.2);color:#fb7185;border:1px solid rgba(244,63,94,.3);}
.btn-crud-edit{background:rgba(59,130,246,.2);color:#60a5fa;border:1px solid rgba(59,130,246,.3);}

/* ── GANTT ── */
.gantt-wrap{border:1px solid var(--border);border-radius:10px;overflow:hidden;background:var(--surface);margin-bottom:20px;}
.gantt-header{display:grid;grid-template-columns:280px 100px 100px 80px 100px 1fr;background:var(--surface2);border-bottom:1px solid var(--border);font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text3);text-transform:uppercase;}
.gh-cell{padding:12px;border-right:1px solid var(--border);}
.gantt-group{border-bottom:1px solid var(--border);}
.gantt-group-header{display:grid;grid-template-columns:280px 100px 100px 80px 100px 1fr;background:rgba(232,160,32,.06);cursor:pointer;padding:0;align-items:center;}
.gantt-row{display:grid;grid-template-columns:280px 100px 100px 80px 100px 1fr;border-bottom:1px solid rgba(37,42,56,.6);align-items:center;}
.gantt-row:hover{background:var(--surface2);}
.gc{padding:0 12px;height:var(--gantt-h);display:flex;align-items:center;border-right:1px solid var(--border);font-size:12px;}
.gc-edit{background:transparent;border:1px solid var(--border);border-radius:4px;padding:4px 8px;color:var(--text);font-size:11px;width:100%;outline:none;}
.gc-edit:focus{border-color:var(--accent);}
.dot{width:8px;height:8px;border-radius:50%;margin-right:8px;flex-shrink:0;}
.bar-area{position:relative;height:var(--gantt-h);min-width:100%;overflow-x:auto;}
.gantt-bar{position:absolute;top:50%;transform:translateY(-50%);height:20px;border-radius:5px;overflow:hidden;}
.gantt-bar-fill{height:100%;border-radius:5px 0 0 5px;transition:width .5s ease-out;}
.today-line{position:absolute;top:0;bottom:0;width:2px;background:var(--accent4);opacity:.7;z-index:5;}

/* ── FOTOS ── */
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;}
.photo-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:transform .2s;cursor:pointer;}
.photo-card:hover{transform:translateY(-4px);}
.photo-card img{width:100%;aspect-ratio:4/3;object-fit:cover;}
.photo-card-info{padding:12px;}
.photo-card-ambiente{font-size:11px;color:var(--accent);text-transform:uppercase;margin-bottom:4px;}
.photo-card-data{font-size:10px;color:var(--text3);}
.upload-zone{border:2px dashed var(--border);border-radius:12px;padding:32px;text-align:center;cursor:pointer;transition:all .2s;}
.upload-zone:hover,.upload-zone.drag{border-color:var(--accent);background:rgba(232,160,32,.04);}

/* ── DIÁRIO ── */
.diario-item{background:var(--surface2);border-radius:10px;padding:14px 16px;margin-bottom:12px;border-left:3px solid var(--border);position:relative;}
.diario-item.info{border-left-color:var(--accent2);}
.diario-item.progresso{border-left-color:var(--accent3);}
.diario-item.importante{border-left-color:var(--accent4);}
.diario-meta{display:flex;gap:12px;font-size:10px;color:var(--text3);font-family:'IBM Plex Mono',monospace;margin-bottom:6px;flex-wrap:wrap;}
.diario-texto{font-size:13px;color:var(--text2);line-height:1.6;}
.diario-del{position:absolute;top:10px;right:10px;background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:13px;opacity:0;transition:opacity .2s;}
.diario-item:hover .diario-del{opacity:1;}

/* ── MODAL ── */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(10px);z-index:1000;align-items:center;justify-content:center;padding:20px;}
.modal.open{display:flex;}
.modal-content{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:30px;width:90%;max-width:500px;max-height:90vh;overflow-y:auto;}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.modal-title{font-family:'Syne',sans-serif;font-weight:700;font-size:18px;}
.modal-close{background:none;border:none;color:var(--text2);font-size:24px;cursor:pointer;}

/* ── NOTIFICAÇÃO ── */
.notification{position:fixed;bottom:20px;right:20px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 20px;display:flex;align-items:center;gap:12px;z-index:9999;transform:translateY(100px);opacity:0;transition:all .3s;max-width:320px;}
.notification.show{transform:translateY(0);opacity:1;}
.notification.success{border-color:var(--accent3);}
.notification.error{border-color:var(--accent4);}

/* ══════════════════════════════════════
   ÁREA DO CLIENTE — ANIMAÇÕES ESPECIAIS
══════════════════════════════════════ */

/* Personagens SVG inline por estágio */
.etapa-card{background:var(--surface);border-radius:20px;padding:0;overflow:hidden;position:relative;margin-bottom:14px;border:1px solid var(--border);transition:border-color .3s;}
.etapa-card.ativa{border-color:rgba(232,160,32,.4);}
.etapa-card.concluida{border-color:rgba(16,185,129,.35);}
.etapa-strip{height:4px;width:100%;}
.etapa-body{padding:18px 20px 18px 20px;}
.etapa-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.etapa-nome{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;}
.etapa-pct{font-family:'Syne',sans-serif;font-weight:800;font-size:26px;}
.etapa-personagem{font-size:36px;line-height:1;flex-shrink:0;width:50px;text-align:center;}
.etapa-barra-wrap{position:relative;height:14px;background:var(--surface2);border-radius:7px;overflow:visible;margin:10px 0;}
.etapa-barra-fill{height:100%;border-radius:7px;transition:width 1.4s cubic-bezier(.4,0,.2,1);}
/* Corredor na barra */
.etapa-runner{position:absolute;top:50%;transform:translate(-50%,-70%);font-size:22px;transition:left 1.4s cubic-bezier(.4,0,.2,1);z-index:10;pointer-events:none;}
/* Linha de chegada */
.finish-line{position:absolute;right:0;top:-8px;bottom:-8px;width:3px;background:repeating-linear-gradient(180deg,#fff 0,#fff 4px,transparent 4px,transparent 8px);opacity:.25;border-radius:2px;}
/* Fogos de artifício */
.fireworks-wrap{position:absolute;inset:0;pointer-events:none;overflow:hidden;border-radius:20px;}
.firework{position:absolute;width:6px;height:6px;border-radius:50%;animation:firework-burst 1.2s ease-out forwards;}
@keyframes firework-burst{
  0%{transform:translate(0,0) scale(1);opacity:1;}
  100%{transform:var(--tx,0) var(--ty,-80px) scale(0);opacity:0;}
}
/* Partículas confetti */
.confetti{position:absolute;width:8px;height:8px;animation:confetti-fall 2s ease-in forwards;}
@keyframes confetti-fall{
  0%{transform:translateY(-20px) rotate(0);opacity:1;}
  100%{transform:translateY(120px) rotate(720deg);opacity:0;}
}
/* Troféu pulsante */
.trophy-pulse{animation:trophy-pop .5s cubic-bezier(.36,.07,.19,.97) both;}
@keyframes trophy-pop{0%{transform:scale(0) rotate(-20deg);}60%{transform:scale(1.3) rotate(5deg);}100%{transform:scale(1) rotate(0);}}
/* Spinner de carregamento */
@keyframes spin{to{transform:rotate(360deg);}}
/* Demais */
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
@keyframes fadeSlideDown{from{opacity:0;transform:translateY(-14px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeSlideUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
@keyframes bobbing{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}
@keyframes walkCycle{0%,100%{transform:translateY(0) scaleX(1);}25%{transform:translateY(-2px) scaleX(1);}75%{transform:translateY(-2px) scaleX(1);}50%{transform:translateY(0) scaleX(1);}}
@keyframes runCycle{0%,100%{transform:translateY(0);}50%{transform:translateY(-4px);}}
@keyframes celebrate{0%{transform:rotate(0);}25%{transform:rotate(-15deg);}75%{transform:rotate(15deg);}100%{transform:rotate(0);}}
@keyframes shimmer{0%{background-position:-200% 0;}100%{background-position:200% 0;}}

/* Tarefas sub-cards */
.tarefa-sub{display:flex;align-items:center;gap:8px;background:var(--surface2);border-radius:8px;padding:5px 10px;font-size:11px;color:var(--text2);margin:3px 0;}
.tarefa-ico{font-size:13px;flex-shrink:0;}

/* GALERIA CLIENTE */
.galeria-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;}
.galeria-item{border-radius:12px;overflow:hidden;border:1px solid var(--border);cursor:pointer;transition:transform .2s;position:relative;aspect-ratio:4/3;}
.galeria-item:hover{transform:scale(1.04);}
.galeria-item img{width:100%;height:100%;object-fit:cover;}
.galeria-label{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.7));padding:8px;font-size:10px;color:#fff;}

/* LIGHTBOX */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:2000;align-items:center;justify-content:center;padding:20px;}
.lightbox.open{display:flex;}
.lightbox img{max-width:90vw;max-height:85vh;border-radius:12px;object-fit:contain;}
.lightbox-close{position:absolute;top:16px;right:20px;font-size:32px;color:#fff;cursor:pointer;background:none;border:none;}

@media(max-width:768px){
  .sidebar{display:none;}
  .gantt-header,.gantt-row{grid-template-columns:150px 1fr;}
  .gh-cell:nth-child(n+2),.gc:nth-child(n+2){display:none;}
  .crud-card{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginModal" class="login-modal">
  <div class="login-content">
    <div style="width:60px;height:60px;background:linear-gradient(135deg,var(--accent),#f5c060);border-radius:18px;margin:0 auto 18px;display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:0 8px 28px rgba(232,160,32,.35);animation:bobbing 2s ease-in-out infinite">🏗️</div>
    <h2 style="font-family:'Syne',sans-serif;font-size:22px;margin-bottom:4px">Torre L'iris</h2>

</div>

    </div>

  </div>
</div>

<!-- LIGHTBOX FOTOS -->
<div id="lightbox" class="lightbox" onclick="fecharLightbox()">

  <img id="lightboxImg" src="" alt="">
</div>

<!-- NOTIFICAÇÃO -->
<div id="notification" class="notification">
  <span id="notifIcon">✅</span>
  <span id="notifMsg"></span>
</div>

<div id="app"></div>

<script>

// ══════════════════════════════════════════════
// UTILITÁRIOS
// ══════════════════════════════════════════════
const SEMANA_PX = 40;
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function getDataInicio(){ const p=dados.dataInicio.split('-'); return new Date(+p[0],+p[1]-1,+p[2]); }
function fmtData(d){ return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'}); }
function fmtSemana(s){ const d=new Date(getDataInicio().getTime()+s*7*24*3600*1000); return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'}); }
function calcularPrevisao(){ const e=new Date(getDataInicio().getTime()+(dados.duracaoTotal||20)*7*24*3600*1000); return e.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'}); }
function getSemanaAtual(){ return Math.round((new Date()-getDataInicio())/(7*24*3600*1000)); }
function getPartes(){ const p=dados.dataInicio.split('-'); return {ano:p[0],mes:p[1],dia:p[2]}; }
function isoHoje(){ const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function fmtDataBR(iso){ if(!iso)return''; const p=iso.split('-'); return `${p[2]}/${p[1]}/${p[0]}`; }
function calcularProgressoGrupo(g){ if(!g.tarefas||!g.tarefas.length)return 0; return Math.round(g.tarefas.reduce((a,t)=>a+(t.progresso||0),0)/g.tarefas.length); }
function calcularProgressoGeral(){ let t=0,s=0; dados.grupos.forEach(g=>g.tarefas.forEach(tf=>{t++;s+=tf.progresso||0;})); return t>0?Math.round(s/t):0; }

// PERSONAGEM POR PROGRESSO — coração da inovação
// ══════════════════════════════════════════════
function getPersonagem(pct, cor) {
  if(pct===0)    return {emoji:'😴', label:'Aguardando', anim:'', tip:'Não iniciado'};
  if(pct<=15)    return {emoji:'🧱', label:'Iniciando',  anim:'animation:walkCycle 1.2s ease-in-out infinite', tip:'Começando!'};
  if(pct<=35)    return {emoji:'⛏️', label:'Escavando',  anim:'animation:walkCycle .9s ease-in-out infinite', tip:'Em execução'};
  if(pct<=55)    return {emoji:'🔨', label:'Construindo',anim:'animation:runCycle .7s ease-in-out infinite', tip:'Avançando!'};
  if(pct<=75)    return {emoji:'👷', label:'Acelerando', anim:'animation:runCycle .5s ease-in-out infinite', tip:'Quase lá!'};
  if(pct<=95)    return {emoji:'🏃', label:'Sprint!',    anim:'animation:runCycle .35s ease-in-out infinite', tip:'Reta final!'};
  return          {emoji:'🏆', label:'Concluído!',  anim:'animation:celebrate .4s ease-in-out infinite', tip:'Parabéns!'};
}

// Gera fogos CSS aleatórios
function gerarFogos(cor){
  let html='';
  const cores=['#FFD700','#FF6B6B','#4ECDC4','#45B7D1','#96CEB4','#FFEAA7','#DDA0DD','#98D8C8'];
  for(let i=0;i<18;i++){
    const c=cores[i%cores.length];
    const angle=(i/18)*Math.PI*2;
    const dist=40+Math.random()*50;
    const tx=`translateX(${Math.cos(angle)*dist}px)`;
    const ty=`translateY(${Math.sin(angle)*dist-60}px)`;
    const delay=Math.random()*0.8;
    const size=4+Math.random()*6;
    html+=`<div class="firework" style="
      left:${40+Math.random()*20}%;top:${30+Math.random()*30}%;
      width:${size}px;height:${size}px;
      background:${c};box-shadow:0 0 6px ${c};
      --tx:${tx};--ty:${ty};
      animation-delay:${delay}s;animation-duration:${0.8+Math.random()*0.6}s;
      animation-iteration-count:infinite;"></div>`;
  }
  // Confetti
  for(let i=0;i<12;i++){
    const c=cores[i%cores.length];
    const shapes=['◆','★','●','■'];
    html+=`<div class="confetti" style="
      left:${Math.random()*100}%;top:-10px;
      color:${c};font-size:${8+Math.random()*8}px;
      animation-delay:${Math.random()*2}s;animation-duration:${1.5+Math.random()}s;
      animation-iteration-count:infinite;">${shapes[i%4]}</div>`;
  }
  return html;
}

// ══════════════════════════════════════════════
function setSyncStatus(st,msg){
  syncStatus=st;
  const dot=document.getElementById('syncDot');
  const txt=document.getElementById('syncTxt');
  if(dot) dot.className='sync-dot '+st;
  if(txt){ const msgs={online:'Sincronizado ✓',syncing:'Sincronizando...',offline:'Cache local',error:'Erro de sync'}; txt.textContent=msg||msgs[st]||st; }
}

async function carregarDoServidor(){
  setSyncStatus('syncing','Carregando...');
  try{
    const remoto=await sb.get();
    if(remoto&&remoto.grupos){
      dados=remoto;
      if(!dados.fotos) dados.fotos=[];
      if(!dados.diario) dados.diario=[];
      try{ localStorage.setItem('torre_liris_v6',JSON.stringify(dados)); }catch(e){}
      setSyncStatus('online');
      return true;
    }
  }catch(e){}
  // Cache local
  try{
    const cache=localStorage.getItem('torre_liris_v6');
    if(cache){
      const p=JSON.parse(cache);
      if(p&&p.grupos){
        dados=p;
        if(!dados.fotos) dados.fotos=[];
        if(!dados.diario) dados.diario=[];
        setSyncStatus('offline','Cache local');
        return true;
      }
    }
  }catch(e){}
  setSyncStatus('offline','Dados padrão');
  return false;
}

async function salvarNoServidor(){
  setSyncStatus('syncing');
  try{ localStorage.setItem('torre_liris_v6',JSON.stringify(dados)); }catch(e){}
  try{
    const ok=await sb.set(dados);
    if(ok){ setSyncStatus('online'); mostrarNotificacao('Salvo e sincronizado! ☁️','success'); return; }
  }catch(e){}
  setSyncStatus('offline','Salvo localmente');
  mostrarNotificacao('Salvo localmente (verificar conexão)','error');
}

function agendarSync(){
  if(syncTimer) clearTimeout(syncTimer);
  syncTimer=setTimeout(()=>salvarNoServidor(),1500);
}

function iniciarPolling(){
  if(pollingInterval) clearInterval(pollingInterval);
  pollingInterval=setInterval(async()=>{
    if(document.hidden) return;
    try{
      const remoto=await sb.get();
      if(remoto&&remoto.grupos){
        const local=localStorage.getItem('torre_liris_v6')||'{}';
        if(JSON.stringify(remoto)!==local){
          dados=remoto;
          if(!dados.fotos) dados.fotos=[];
          if(!dados.diario) dados.diario=[];
          try{ localStorage.setItem('torre_liris_v6',JSON.stringify(dados)); }catch(e){}
          setSyncStatus('online','Atualizado ↻');
          if(!adminMode) renderizarCliente();
          setTimeout(()=>setSyncStatus('online'),3000);
        }
      }
    }catch(e){}
  },15000);
}

        <div class="gc" style="gap:6px">

          <span style="min-width:32px;font-size:11px">${t.progresso}%</span>

function salvarTarefa(gi,ti){
  const nome=document.getElementById('mt-nome').value.trim();

  const obj={nome,inicio:parseInt(document.getElementById('mt-inicio').value)||0,duracao:parseInt(document.getElementById('mt-dur').value)||2,responsavel:document.getElementById('mt-resp').value||'Equipe',progresso:parseInt(document.getElementById('mt-prog').value)||0};
  if(ti===null) dados.grupos[gi].tarefas.push(obj);
  else Object.assign(dados.grupos[gi].tarefas[ti],obj);
  agendarSync();fecharModal();renderizarGantt();mostrarNotificacao(ti===null?'Tarefa adicionada!':'Tarefa atualizada!','success');

function excluirTarefa(gi,ti){if(confirm('Excluir tarefa?')){dados.grupos[gi].tarefas.splice(ti,1);agendarSync();renderizarGantt();mostrarNotificacao('Excluída!','success');}}

function exportarCronograma(){
  const linhas=[];
  dados.grupos.forEach(g=>{
    linhas.push({Grupo:g.nome,Tarefa:'',Inicio:fmtSemana(g.inicio),Fim:fmtSemana(g.inicio+g.duracao),Duracao:g.duracao,Progresso:calcularProgressoGrupo(g)+'%'});
    g.tarefas.forEach(t=>linhas.push({Grupo:g.nome,Tarefa:t.nome,Inicio:fmtSemana(t.inicio),Fim:fmtSemana(t.inicio+t.duracao),Duracao:t.duracao,Progresso:t.progresso+'%'}));
  });
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(linhas),'Cronograma');
  XLSX.writeFile(wb,'cronograma-torre-liris.xlsx');
  mostrarNotificacao('Exportado!','success');
}

function adicionarFoto(){

         ondragover="event.preventDefault();this.classList.add('drag')"

function handleFotos(files){
  _fotosBuffer=[];
  const prev=document.getElementById('previewArea');
  const meta=document.getElementById('metaArea');
  if(!files.length)return;
  prev.innerHTML='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px"></div>';
  const grid=prev.querySelector('div');
  let loaded=0;
  Array.from(files).forEach(file=>{
    const reader=new FileReader();
    reader.onload=e=>{
      _fotosBuffer.push({src:e.target.result,name:file.name});
      const el=document.createElement('div');
      el.style.cssText='border-radius:6px;overflow:hidden;border:1px solid var(--border)';
      el.innerHTML=`<img src="${e.target.result}" style="width:100%;height:72px;object-fit:cover">`;
      grid.appendChild(el);
      if(++loaded===files.length) meta.style.display='block';
    };
    reader.readAsDataURL(file);
  });
}
function confirmarFotos(){
  if(!_fotosBuffer.length){mostrarNotificacao('Selecione ao menos uma foto.','error');return;}
  const amb=document.getElementById('fotoAmb').value;
  const data=fmtData(new Date());
  _fotosBuffer.forEach(f=>dados.fotos.push({id:uid(),url:f.src,ambiente:amb,data}));
  _fotosBuffer=[];
  agendarSync();fecharModal();renderizarAdmin();mostrarNotificacao(`Fotos salvas!`,'success');
}

  const totalT=dados.grupos.reduce((s,g)=>s+g.tarefas.length,0);
  const conc=dados.grupos.reduce((s,g)=>s+g.tarefas.filter(t=>t.progresso>=100).length,0);
  const semA=getSemanaAtual();
  const emGeral=prog>=100?'🏆':prog>=75?'🚀':prog>=50?'⚡':prog>=25?'🔨':'🌅';
  const msgGeral=prog>=100?'Obra concluída! Parabéns!':prog>=75?'Reta final, quase lá!':prog>=50?'Passamos da metade!':prog>=25?'Avançando muito bem!':'A obra está começando!';
  const diario=(dados.diario||[]).slice(-5).reverse();

  // Monta HTML das etapas com personagens animados
  const etapasHTML=dados.grupos.map((g,i)=>{
    const pg=calcularProgressoGrupo(g);
    const pers=getPersonagem(pg,g.cor);
    const concluida=pg>=100;
    const ativa=pg>0&&pg<100;
    const runnerPct=Math.max(2,Math.min(pg,97));

    const subTarefas=g.tarefas.map(t=>{
      const tI=t.progresso>=100?'✅':t.progresso>0?'🔄':'⏳';
      return `<div class="tarefa-sub"><span class="tarefa-ico">${tI}</span>${t.nome}<span style="margin-left:auto;color:${g.cor};font-weight:600">${t.progresso}%</span></div>`;
    }).join('');

    return `
    <div class="etapa-card ${concluida?'concluida':ativa?'ativa':''}" style="animation:fadeSlideUp ${.5+i*.07}s ease forwards;opacity:0;animation-delay:${.2+i*.06}s">
      <div class="etapa-strip" style="background:linear-gradient(90deg,${g.cor},${g.cor}88)"></div>
      ${concluida?`<div class="fireworks-wrap">${gerarFogos(g.cor)}</div>`:''}
      <div class="etapa-body">
        <div class="etapa-header">
          <div>
            <div class="etapa-nome">${g.nome}</div>
            <div style="font-size:11px;color:var(--text3);margin-top:2px">${fmtSemana(g.inicio)} → ${fmtSemana(g.inicio+g.duracao)} · ${g.duracao} sem · 👤 ${g.responsavel}</div>
          </div>
          <div style="display:flex;align-items:center;gap:10px">
            <div class="etapa-pct" style="color:${concluida?'var(--accent3)':ativa?g.cor:'var(--text3)'}">${pg}%</div>
            <div class="etapa-personagem" style="${pers.anim}" title="${pers.tip}">${pers.emoji}</div>
          </div>
        </div>
        <!-- BARRA COM CORREDOR -->
        <div class="etapa-barra-wrap" id="bw-${i}">
          <div class="finish-line"></div>
          <div class="etapa-barra-fill" id="bf-${i}" style="width:0%;background:linear-gradient(90deg,${g.cor}cc,${g.cor})"></div>
          <div class="etapa-runner" id="br-${i}" style="left:2%">${pg>=100?'🏆':pers.emoji}</div>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text3);font-family:'IBM Plex Mono',monospace;margin-top:3px">
          <span>0%</span><span style="color:${g.cor};font-weight:600">${pers.label}</span><span>100% 🏁</span>
        </div>
        ${g.tarefas.length>0?`
        <details style="margin-top:12px">
          <summary style="font-size:11px;color:var(--text2);cursor:pointer;user-select:none;list-style:none;display:flex;align-items:center;gap:6px">
            <span style="font-size:10px">▶</span> Ver ${g.tarefas.length} tarefa${g.tarefas.length>1?'s':''}
          </summary>
          <div style="margin-top:8px">${subTarefas}</div>
        </details>`:''}
      </div>
    </div>`;
  }).join('');

  // Galeria de fotos por ambiente
  const ambientesComFotos=[...new Set(dados.fotos.map(f=>f.ambiente))];
  const galeriaHTML=dados.fotos.length>0?`
  <div style="animation:fadeSlideUp 1s ease forwards;opacity:0;animation-delay:.8s">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
      <div style="width:4px;height:28px;background:var(--accent2);border-radius:2px"></div>
      <div><div style="font-family:'Syne',sans-serif;font-weight:700;font-size:18px">📸 Galeria da Obra</div>
      <div style="font-size:12px;color:var(--text2)">${dados.fotos.length} foto(s) · ${ambientesComFotos.length} ambiente(s)</div></div>
    </div>
    ${ambientesComFotos.map(amb=>{
      const fotos=dados.fotos.filter(f=>f.ambiente===amb);
      return `
      <div style="margin-bottom:20px">
        <div style="font-size:12px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">🏠 ${amb}</div>
        <div class="galeria-grid">
          ${fotos.map(f=>`
          <div class="galeria-item" onclick="abrirLightbox('${f.url}')">
            <img src="${f.url}" alt="${f.ambiente}">
            <div class="galeria-label">${f.data}</div>
          </div>`).join('')}
        </div>
      </div>`;
    }).join('')}
  </div>`:'';

  document.getElementById('app').innerHTML=`
  <!-- TOPBAR CLIENTE -->
  <div style="background:rgba(13,15,20,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 20px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100">
    <div style="display:flex;align-items:center;gap:12px">
      <div style="width:36px;height:36px;background:linear-gradient(135deg,var(--accent),#f5c060);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;animation:bobbing 2s ease-in-out infinite">🏠</div>
      <div>
        <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:15px">${dados.titulo}</div>
        <div style="font-size:10px;color:var(--text3)">${dados.endereco}</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <div style="display:flex;align-items:center;gap:5px">
        <div id="syncDot" class="sync-dot ${syncStatus}"></div>
        <span id="syncTxt" style="font-size:10px;color:var(--text3)">${syncStatus==='online'?'Online':'...'}</span>
      </div>
      <button class="btn btn-ghost" style="font-size:11px" onclick="location.reload()">Sair</button>
    </div>
  </div>

  <div style="max-width:820px;margin:0 auto;padding:24px 16px;display:flex;flex-direction:column;gap:20px">

    <!-- HERO BOAS-VINDAS -->
    <div style="background:linear-gradient(135deg,rgba(232,160,32,.14),rgba(59,130,246,.08),rgba(16,185,129,.06));border:1px solid rgba(232,160,32,.28);border-radius:24px;padding:28px;position:relative;overflow:hidden;animation:fadeSlideDown .5s ease forwards;opacity:0">
      <div style="position:absolute;top:-30px;right:-30px;font-size:120px;opacity:.04;transform:rotate(-15deg);pointer-events:none">🏗️</div>
      <div style="font-size:36px;margin-bottom:8px;animation:bobbing 2.5s ease-in-out infinite">${emGeral}</div>
      <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:24px;margin-bottom:4px">Olá, ${dados.cliente.nome.split(' ')[0]}!</div>
      <div style="font-size:14px;color:var(--text2);margin-bottom:18px">${msgGeral}</div>
      <div style="display:flex;gap:24px;flex-wrap:wrap">
        <div><div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1.2px">Arquiteta</div><div style="font-size:13px;font-weight:600;margin-top:2px">${dados.obra.arquiteto}</div></div>
        <div><div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1.2px">Início</div><div style="font-size:13px;font-weight:600;color:var(--accent3);margin-top:2px">${fmtData(getDataInicio())}</div></div>
        <div><div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1.2px">Término Prev.</div><div style="font-size:13px;font-weight:600;color:var(--accent);margin-top:2px">${calcularPrevisao()}</div></div>
        <div><div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1.2px">Área</div><div style="font-size:13px;font-weight:600;margin-top:2px">${dados.obra.area}</div></div>
      </div>
    </div>

    <!-- BARRA GERAL COM OPERÁRIO -->
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:24px;animation:fadeSlideDown .6s ease forwards;opacity:0;animation-delay:.1s;position:relative;overflow:hidden">
      ${prog>=100?`<div class="fireworks-wrap">${gerarFogos('#e8a020')}</div>`:''}
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:17px">🏁 Progresso Geral</div>
        <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:32px;color:${prog>=100?'var(--accent3)':'var(--accent)'}">${prog}%</div>
      </div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:14px">${conc} de ${totalT} etapas concluídas · Semana ${Math.max(0,semA)} de ${dados.duracaoTotal}</div>
      <div style="position:relative;height:52px;background:var(--surface2);border-radius:26px;overflow:visible;border:1px solid var(--border);margin-bottom:8px">
        <div id="barra-geral" style="position:absolute;inset:0;width:0%;background:linear-gradient(90deg,var(--accent3),var(--accent),#f5c060);border-radius:26px;transition:width 1.6s cubic-bezier(.4,0,.2,1);box-shadow:0 0 24px rgba(232,160,32,.25)"></div>
        <div id="op-geral" style="position:absolute;top:50%;transform:translate(-50%,-65%);left:2%;transition:left 1.6s cubic-bezier(.4,0,.2,1);font-size:30px;z-index:10">${prog>=100?'🎉':'🦺'}</div>
        <div style="position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:18px;z-index:2">🏁</div>
        <div style="position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent,transparent 24.9%,rgba(255,255,255,.04) 25%);border-radius:26px;pointer-events:none"></div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text3);font-family:'IBM Plex Mono',monospace">
        <span>LARGADA</span><span>25%</span><span>50%</span><span>75%</span><span>CHEGADA 🏆</span>
      </div>
    </div>

    <!-- CARDS STATS -->
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px;animation:fadeSlideDown .7s ease forwards;opacity:0;animation-delay:.15s">
      <div style="background:var(--surface);border:1px solid rgba(16,185,129,.3);border-radius:16px;padding:16px;text-align:center">
        <div style="font-size:28px;margin-bottom:6px">✅</div>
        <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:28px;color:var(--accent3)">${conc}</div>
        <div style="font-size:11px;color:var(--text2)">Concluídas</div>
      </div>
      <div style="background:var(--surface);border:1px solid rgba(244,63,94,.3);border-radius:16px;padding:16px;text-align:center">
        <div style="font-size:28px;margin-bottom:6px">⏳</div>
        <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:28px;color:#fb7185">${totalT-conc}</div>
        <div style="font-size:11px;color:var(--text2)">Pendentes</div>
      </div>
    </div>

    <!-- DIÁRIO -->
    ${diario.length>0?`
    <div style="animation:fadeSlideUp .8s ease forwards;opacity:0;animation-delay:.2s">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
        <div style="width:4px;height:28px;background:var(--accent4);border-radius:2px"></div>
        <div><div style="font-family:'Syne',sans-serif;font-weight:700;font-size:18px">📝 Últimas Atualizações</div>
        <div style="font-size:12px;color:var(--text2)">Registros da equipe</div></div>
      </div>
      ${diario.map(e=>`
      <div class="diario-item ${e.tipo||'info'}">
        <div class="diario-meta">
          <span>📅 ${fmtDataBR(e.data)}</span>
          <span>${e.tipo==='importante'?'🔴 Importante':e.tipo==='progresso'?'🟢 Progresso':'🔵 Info'}</span>
          ${e.etapa?`<span>🏗️ ${e.etapa}</span>`:''}
        </div>
        <div class="diario-texto">${e.texto}</div>
      </div>`).join('')}
    </div>`:''}

    <!-- ETAPAS COM PERSONAGENS -->
    <div style="animation:fadeSlideUp .85s ease forwards;opacity:0;animation-delay:.25s">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
        <div style="width:4px;height:28px;background:var(--accent);border-radius:2px"></div>
        <div><div style="font-family:'Syne',sans-serif;font-weight:700;font-size:18px">🏗️ Etapas da Obra</div>
        <div style="font-size:12px;color:var(--text2)">Acompanhe cada equipe em tempo real</div></div>
      </div>
    </div>
    ${etapasHTML}

    <!-- GALERIA -->
    ${galeriaHTML}

    <!-- RODAPÉ -->
    <div style="text-align:center;padding:16px 0 8px;font-size:11px;color:var(--text3);animation:fadeSlideUp 1.1s ease forwards;opacity:0;animation-delay:.9s">
      ${dados.titulo} · ${dados.obra.tipo} · ${dados.obra.area}<br>
      <span style="color:var(--text3);opacity:.6">☁️ Atualizado em tempo real · ${new Date().toLocaleDateString('pt-BR')}</span>
    </div>
  </div>`;

  // Anima barras após render
  setTimeout(()=>{
    // Barra geral
    const bg=document.getElementById('barra-geral');
    const op=document.getElementById('op-geral');
    if(bg) bg.style.width=prog+'%';
    if(op) op.style.left='calc('+Math.max(2,Math.min(prog,96))+'% - 16px)';
    // Barras individuais
    dados.grupos.forEach((_,i)=>{
      const pg=calcularProgressoGrupo(dados.grupos[i]);
      const bf=document.getElementById('bf-'+i);
      const br=document.getElementById('br-'+i);
      if(bf) bf.style.width=pg+'%';
      if(br) br.style.left='calc('+Math.max(2,Math.min(pg,95))+'% - 12px)';
    });
  },400);
}
</script>
</body>
</html>
