<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>🏗️ Obra Torre L'iris - Gestão Inteligente</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Biblioteca para ler Excel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --bg: #0d0f14;
            --surface: #13161e;
            --surface2: #1a1e2a;
            --border: #252a38;
            --accent: #e8a020;
            --accent2: #3b82f6;
            --accent3: #10b981;
            --accent4: #f43f5e;
            --text: #e8eaf0;
            --text2: #8892a4;
            --text3: #4a5468;
            --gantt-h: 44px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* MODAL DE LOGIN */
        .login-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000;
        }
        .login-content {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 48px;
            padding: 40px;
            width: 90%; max-width: 380px;
            text-align: center;
        }
        .login-input {
            width: 100%; padding: 16px; margin: 15px 0;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 40px;
            color: var(--text);
            font-size: 16px;
        }
        .login-btn {
            width: 100%; padding: 16px; margin: 8px 0;
            border: none; border-radius: 40px; font-size: 16px;
            font-weight: 600; cursor: pointer;
        }
        .btn-admin { background: var(--accent); color: #000; }
        .btn-client { background: var(--accent2); color: white; }

        /* TOP BAR */
        .topbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 24px; height: 56px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 100;
        }
        .logo {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 17px;
            display: flex; align-items: center; gap: 10px;
        }
        .logo-badge {
            width: 28px; height: 28px;
            background: var(--accent);
            border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; color: #000; font-weight: 800;
        }
        .btn {
            padding: 6px 14px; border-radius: 7px; border: none;
            cursor: pointer; font-family: 'Inter', sans-serif;
            font-size: 12px; font-weight: 500;
            transition: all .15s;
        }
        .btn-ghost {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text2);
        }
        .btn-ghost:hover { border-color: var(--text2); color: var(--text); }
        .btn-primary {
            background: var(--accent);
            color: #000;
            font-weight: 600;
        }
        .btn-primary:hover { background: #f5ae30; }

        /* LAYOUT */
        .layout { display: flex; height: calc(100vh - 56px); }

        /* SIDEBAR */
        .sidebar {
            width: 220px; min-width: 220px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            padding: 16px 0;
            display: flex; flex-direction: column;
        }
        .sidebar-section { margin-bottom: 24px; }
        .sidebar-label {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 9px; letter-spacing: 1.5px;
            color: var(--text3); text-transform: uppercase;
            padding: 0 16px; margin-bottom: 6px;
        }
        .sidebar-item {
            display: flex; align-items: center; gap: 10px;
            padding: 8px 16px; color: var(--text2);
            cursor: pointer; border-left: 2px solid transparent;
        }
        .sidebar-item:hover { background: var(--surface2); color: var(--text); }
        .sidebar-item.active {
            color: var(--accent);
            border-left-color: var(--accent);
            background: rgba(232,160,32,.06);
        }

        /* MAIN */
        .main { flex: 1; overflow: auto; }

        /* PAGE HEADER */
        .page-header {
            padding: 20px 24px 0;
            display: flex; align-items: flex-start; justify-content: space-between;
        }
        .page-title {
            font-family: 'Syne', sans-serif;
            font-weight: 700; font-size: 22px;
        }
        .page-sub { color: var(--text2); font-size: 12px; margin-top: 2px; }

        /* TABS */
        .tabs {
            display: flex; gap: 2px;
            padding: 16px 24px 0;
            border-bottom: 1px solid var(--border);
        }
        .tab {
            padding: 8px 16px; border-radius: 7px 7px 0 0;
            cursor: pointer; font-size: 12px;
            color: var(--text2);
            border-bottom: 2px solid transparent;
        }
        .tab:hover { color: var(--text); }
        .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

        /* TOOLBAR */
        .toolbar {
            display: flex; align-items: center; gap: 10px;
            padding: 12px 24px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
        }
        .search-box {
            display: flex; align-items: center; gap: 8px;
            background: var(--bg); border: 1px solid var(--border);
            border-radius: 7px; padding: 6px 12px;
            flex: 1; max-width: 280px;
        }
        .search-box input {
            background: none; border: none; outline: none;
            color: var(--text); font-size: 12px; width: 100%;
        }
        .search-box input::placeholder { color: var(--text3); }

        /* UPLOAD ZONE */
        .upload-zone {
            margin: 16px 24px;
            border: 1.5px dashed var(--border);
            border-radius: 10px;
            padding: 18px 24px;
            display: flex; align-items: center; gap: 16px;
            background: var(--surface);
            cursor: pointer;
            transition: all .15s;
        }
        .upload-zone:hover { 
            border-color: var(--accent); 
            background: rgba(232,160,32,.04); 
        }
        .upload-icon { font-size: 28px; }
        .upload-text strong { display: block; font-size: 13px; color: var(--text); margin-bottom: 3px; }
        .upload-text span { font-size: 11px; color: var(--text3); }

        /* SMART NOTICE */
        .smart-notice {
            margin: 0 24px 12px;
            background: rgba(59,130,246,.08);
            border: 1px solid rgba(59,130,246,.25);
            border-radius: 8px;
            padding: 10px 14px;
            display: flex; align-items: center; gap: 10px;
            font-size: 12px; color: #93c5fd;
        }

        /* GANTT */
        .gantt-wrap {
            margin: 0 24px 24px;
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
            background: var(--surface);
        }
        .gantt-header {
            display: grid;
            grid-template-columns: 260px 80px 80px 80px 80px 1fr;
            background: var(--surface2);
            border-bottom: 1px solid var(--border);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 10px; color: var(--text3);
            text-transform: uppercase;
        }
        .gh-cell {
            padding: 10px 12px;
            border-right: 1px solid var(--border);
        }
        .gantt-group-header {
            display: grid;
            grid-template-columns: 260px 80px 80px 80px 80px 1fr;
            background: rgba(232,160,32,.05);
            cursor: pointer;
        }
        .gantt-row {
            display: grid;
            grid-template-columns: 260px 80px 80px 80px 80px 1fr;
            border-bottom: 1px solid rgba(37,42,56,.6);
        }
        .gantt-row:hover { background: var(--surface2); }
        .gc { 
            padding: 0 12px; height: var(--gantt-h);
            display: flex; align-items: center;
            border-right: 1px solid var(--border);
            font-size: 12px;
        }
        .dot { width: 7px; height: 7px; border-radius: 50%; margin-right: 8px; }
        .dot-green { background: var(--accent3); }
        .dot-blue { background: var(--accent2); }
        .dot-yellow { background: var(--accent); }

        .bar-area {
            position: relative;
            height: var(--gantt-h);
            min-width: 100%;
        }
        .gantt-bar {
            position: absolute; top: 50%; transform: translateY(-50%);
            height: 18px; border-radius: 4px;
            display: flex; align-items: center;
            overflow: hidden; cursor: pointer;
        }
        .gantt-bar-fill {
            height: 100%; border-radius: 4px 0 0 4px;
            opacity: .95;
        }
        .today-line {
            position: absolute; top: 0; bottom: 0;
            width: 1.5px; background: var(--accent);
            opacity: .5; z-index: 5;
        }

        /* CRUD Admin */
        .admin-crud {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px;
            margin: 20px 24px;
        }
        .crud-tabs {
            display: flex; gap: 10px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        .crud-tab {
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            background: var(--surface2);
            color: var(--text2);
        }
        .crud-tab.active { background: var(--accent); color: #000; }
        .crud-item {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .crud-input {
            width: 100%; padding: 8px 12px;
            background: var(--bg); border: 1px solid var(--border);
            border-radius: 6px; color: var(--text);
            margin: 5px 0;
        }

        /* IMPORT MODAL */
        .import-modal {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            z-index: 1000;
            align-items: center; justify-content: center;
        }
        .import-modal.open { display: flex; }
        .import-content {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 48px;
            padding: 40px;
            width: 90%; max-width: 500px;
        }
        .import-drop {
            border: 2px dashed var(--border);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            margin: 20px 0;
            cursor: pointer;
        }
        .import-drop:hover { border-color: var(--accent); }
        .import-preview {
            max-height: 200px;
            overflow-y: auto;
            margin: 20px 0;
            padding: 10px;
            background: var(--bg);
            border-radius: 10px;
        }
        .preview-item {
            padding: 8px;
            border-bottom: 1px solid var(--border);
            font-size: 12px;
        }

        /* STATS */
        .stats-row {
            display: flex; gap: 12px;
            padding: 0 24px 24px;
        }
        .stat-card {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 16px;
        }
        .stat-label {
            font-size: 10px; color: var(--text3);
            text-transform: uppercase;
            font-family: 'IBM Plex Mono', monospace;
        }
        .stat-value {
            font-family: 'Syne', sans-serif;
            font-weight: 700; font-size: 22px;
        }
        .stat-bar-bg {
            height: 4px; background: var(--border);
            border-radius: 2px; margin-top: 10px;
            overflow: hidden;
        }
        .stat-bar-fill {
            height: 100%; background: var(--accent3);
            border-radius: 2px;
        }

        /* LOADING */
        .loading {
            display: inline-block;
            width: 20px; height: 20px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <!-- LOGIN MODAL -->
    <div id="loginModal" class="login-modal">
        <div class="login-content">
            <h2 style="color: var(--accent); margin-bottom: 20px;">🏗️ Obra Torre L'iris</h2>
            <input type="password" id="senhaInput" class="login-input" placeholder="Senha do administrador">
            <button class="login-btn btn-admin" onclick="verificarSenha()">Entrar como Admin</button>
            <button class="login-btn btn-client" onclick="entrarComoCliente()">Entrar como Cliente</button>
        </div>
    </div>

    <!-- IMPORT MODAL -->
    <div id="importModal" class="import-modal">
        <div class="import-content">
            <h3 style="margin-bottom: 20px;">📤 Importar Planilha</h3>
            <p style="color: var(--text2); margin-bottom: 20px; font-size: 12px;">
                A IA vai analisar sua planilha e preencher automaticamente as tarefas no cronograma.
            </p>
            
            <div class="import-drop" id="dropZone" onclick="document.getElementById('fileInput').click()">
                <div style="font-size: 40px; margin-bottom: 10px;">📂</div>
                <p><strong>Clique para selecionar</strong> ou arraste um arquivo</p>
                <p style="color: var(--text3); font-size: 11px; margin-top: 8px;">
                    Formatos aceitos: .xlsx, .xls, .csv
                </p>
                <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" style="display: none;" onchange="processarArquivo(this.files[0])">
            </div>

            <div id="importPreview" class="import-preview" style="display: none;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                    <strong>Pré-visualização</strong>
                    <span id="loadingImport" class="loading" style="display: none;"></span>
                </div>
                <div id="previewList"></div>
            </div>

            <div style="display: flex; gap: 10px; justify-content: flex-end;">
                <button class="btn btn-ghost" onclick="fecharImportModal()">Cancelar</button>
                <button class="btn btn-primary" id="confirmImportBtn" onclick="confirmarImportacao()" disabled>Confirmar Importação</button>
            </div>
        </div>
    </div>

    <!-- CONTEÚDO PRINCIPAL -->
    <div id="conteudo"></div>

    <script>
        // CONFIGURAÇÕES
        const SENHA_ADMIN = "torre2026";
        let admin = false;
        let modoAtual = 'cronograma';
        let dadosImportados = null;

        // DADOS DA OBRA
        let dados = {
            titulo: "Torre L'iris Residence",
            endereco: "Av. Conselheiro Furtado, 1044",
            proprietario: "Seu Aldebaner",
            arquiteto: "Isabela Kalume",
            dataInicio: "2024-08-01",
            valor: 234943.54,
            
            grupos: [
                {
                    id: 'g1', name: '1. Serviços Preliminares', color: '#3b82f6',
                    start: 0, dur: 4,
                    tasks: [
                        { name: 'Mobilização', dur: 2, resp: 'Admin' },
                        { name: 'Placa de obra', dur: 1, resp: 'Admin' }
                    ]
                },
                {
                    id: 'g2', name: '2. Demolições', color: '#f43f5e',
                    start: 3, dur: 4,
                    tasks: [
                        { name: 'Demolição alvenaria', dur: 2, resp: 'Equipe A' },
                        { name: 'Remoção entulho', dur: 2, resp: 'Equipe A' }
                    ]
                },
                {
                    id: 'g3', name: '3. Banheiros', color: '#e8a020',
                    start: 6, dur: 8,
                    tasks: [
                        { name: 'BHO Andrey', dur: 3, resp: 'Equipe B' },
                        { name: 'BHO Delbanor', dur: 3, resp: 'Equipe B' },
                        { name: 'BHO Isabel', dur: 3, resp: 'Equipe B' },
                        { name: 'BHO Maria', dur: 3, resp: 'Equipe B' },
                        { name: 'BHO Vitor', dur: 3, resp: 'Equipe B' }
                    ]
                }
            ],
            
            ambientes: [],
            orcamento: [],
            materiais: [],
            fotos: []
        };

        // FUNÇÕES DE PERSISTÊNCIA
        function salvarDados() {
            localStorage.setItem('dadosObra', JSON.stringify(dados));
        }

        function carregarDados() {
            let salvos = localStorage.getItem('dadosObra');
            if (salvos) dados = JSON.parse(salvos);
        }

        // LOGIN
        function verificarSenha() {
            let senha = document.getElementById('senhaInput').value;
            if (senha === SENHA_ADMIN) {
                admin = true;
                document.getElementById('loginModal').style.display = 'none';
                carregarDados();
                renderizarAdmin();
            } else alert('Senha incorreta');
        }

        function entrarComoCliente() {
            admin = false;
            document.getElementById('loginModal').style.display = 'none';
            carregarDados();
            renderizarCliente();
        }

        // FUNÇÕES DE DATA
        const START_DATE = new Date(2024, 7, 1);
        const TODAY = new Date();
        const WEEK_W = 52;

        function weekOf(d) {
            return Math.round((d - START_DATE) / (7 * 24 * 3600 * 1000));
        }
        const todayWeek = weekOf(TODAY);

        function fmt(w) {
            let d = new Date(START_DATE.getTime() + w * 7 * 24 * 3600 * 1000);
            return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });
        }

        // ============================================
        // FUNÇÕES DE IMPORTAÇÃO COM IA
        // ============================================
        function abrirImportacao() {
            document.getElementById('importModal').classList.add('open');
            document.getElementById('importPreview').style.display = 'none';
            document.getElementById('confirmImportBtn').disabled = true;
            dadosImportados = null;
        }

        function fecharImportModal() {
            document.getElementById('importModal').classList.remove('open');
        }

        function processarArquivo(arquivo) {
            if (!arquivo) return;

            let reader = new FileReader();
            let loading = document.getElementById('loadingImport');
            loading.style.display = 'inline-block';
            document.getElementById('importPreview').style.display = 'block';
            document.getElementById('previewList').innerHTML = '';

            reader.onload = function(e) {
                try {
                    let data = new Uint8Array(e.target.result);
                    let workbook = XLSX.read(data, { type: 'array' });
                    let primeiraPlanilha = workbook.SheetNames[0];
                    let sheet = workbook.Sheets[primeiraPlanilha];
                    let linhas = XLSX.utils.sheet_to_json(sheet, { header: 1 });

                    // Analisar as linhas e extrair tarefas
                    let novasTarefas = [];
                    let gruposEncontrados = new Set();

                    for (let i = 1; i < Math.min(linhas.length, 20); i++) {
                        let linha = linhas[i];
                        if (!linha || linha.length < 2) continue;

                        let nome = linha[0] || '';
                        let responsavel = linha[1] || 'Equipe';
                        let duracao = parseInt(linha[2]) || 2;
                        let grupo = linha[3] || 'Geral';

                        if (nome && nome.toString().trim() !== '') {
                            novasTarefas.push({
                                nome: nome.toString().trim(),
                                resp: responsavel.toString().trim(),
                                dur: duracao,
                                grupo: grupo.toString().trim()
                            });
                            gruposEncontrados.add(grupo.toString().trim());
                        }
                    }

                    // Pré-visualização
                    let preview = document.getElementById('previewList');
                    preview.innerHTML = `
                        <div class="preview-item">
                            <strong>${novasTarefas.length} tarefas encontradas</strong>
                        </div>
                        <div class="preview-item">
                            <strong>Grupos detectados:</strong> ${Array.from(gruposEncontrados).join(', ')}
                        </div>
                        ${novasTarefas.slice(0, 5).map(t => `
                            <div class="preview-item">
                                ${t.nome} - ${t.resp} - ${t.dur} semanas - ${t.grupo}
                            </div>
                        `).join('')}
                        ${novasTarefas.length > 5 ? '<div class="preview-item">... e mais ' + (novasTarefas.length-5) + ' tarefas</div>' : ''}
                    `;

                    dadosImportados = novasTarefas;
                    document.getElementById('confirmImportBtn').disabled = false;
                    loading.style.display = 'none';

                } catch (error) {
                    alert('Erro ao processar arquivo: ' + error.message);
                    loading.style.display = 'none';
                }
            };

            reader.readAsArrayBuffer(arquivo);
        }

        function confirmarImportacao() {
            if (!dadosImportados || dadosImportados.length === 0) return;

            // Agrupar tarefas por grupo
            let gruposMap = new Map();

            dadosImportados.forEach(tarefa => {
                if (!gruposMap.has(tarefa.grupo)) {
                    gruposMap.set(tarefa.grupo, {
                        name: tarefa.grupo,
                        tasks: [],
                        start: dados.grupos.length * 4, // posição aproximada
                        dur: 0
                    });
                }
                
                let grupo = gruposMap.get(tarefa.grupo);
                grupo.tasks.push({
                    name: tarefa.nome,
                    dur: tarefa.dur,
                    resp: tarefa.resp
                });
                grupo.dur += tarefa.dur;
            });

            // Adicionar novos grupos
            gruposMap.forEach((grupo, nome) => {
                dados.grupos.push({
                    id: 'g' + (dados.grupos.length + 1),
                    name: nome,
                    color: '#' + Math.floor(Math.random()*16777215).toString(16),
                    start: dados.grupos.reduce((acc, g) => Math.max(acc, g.start + g.dur), 0),
                    dur: grupo.dur,
                    tasks: grupo.tasks
                });
            });

            salvarDados();
            fecharImportModal();
            
            // Mostrar notificação de sucesso
            let notice = document.createElement('div');
            notice.className = 'smart-notice';
            notice.innerHTML = `
                <span style="font-size:16px">✅</span>
                <div>
                    <strong style="color: var(--accent3)">Importação concluída!</strong>
                    Foram adicionados ${dadosImportados.length} tarefas em ${gruposMap.size} novos grupos.
                    <span style="color:var(--text3);cursor:pointer;margin-left:8px" onclick="this.parentElement.parentElement.remove()">× fechar</span>
                </div>
            `;
            document.querySelector('.main').insertBefore(notice, document.querySelector('.main').children[2]);

            renderizarAdmin();
        }

        // ============================================
        // RENDERIZAR CLIENTE
        // ============================================
        function renderizarCliente() {
            let html = `
            <div class="topbar">
                <div class="logo">
                    <div class="logo-badge">R</div>
                    ${dados.titulo}
                </div>
                <div style="display:flex; align-items:center; gap:20px">
                    <span style="color: var(--text2)">👤 Visualizando como Cliente</span>
                </div>
            </div>
            <div class="layout">
                <div class="sidebar">
                    <div class="sidebar-section">
                        <div class="sidebar-label">Módulos</div>
                        <div class="sidebar-item active" onclick="mudarAbaCliente('cronograma')"><span class="sidebar-icon">📅</span> Cronograma</div>

        function renderizarCronogramaCliente() {

        // ============================================
        // RENDERIZAR ADMIN
        // ============================================
        function renderizarAdmin() {

            </div>
            <div class="layout">

        function renderizarConteudoAdmin() {
            if (modoAtual === 'cronograma') {
                return `
                <div class="page-header">
                    <div class="page-title">Cronograma Inteligente</div>
                    <div style="display:flex; gap:8px">
                        <button class="btn btn-ghost" onclick="exportarCronograma()">📥 Exportar</button>
                        <button class="btn btn-primary" onclick="adicionarGrupo()">+ Novo Grupo</button>

                </div>
                <div class="toolbar">
                    <div class="search-box">

                    <button class="btn btn-ghost" onclick="adicionarTarefa()">+ Adicionar Tarefa</button>
                </div>
                <div class="gantt-wrap">
                    <div class="gantt-header">
                        <div class="gh-cell">Tarefa</div>
                        <div class="gh-cell">Início</div>
                        <div class="gh-cell">Fim</div>

            else if (modoAtual === 'orcamento') {
                return renderizarOrcamentoAdmin();
            }
            else if (modoAtual === 'materiais') {
                return renderizarMateriaisAdmin();

            else if (modoAtual === 'fotos') {
                return renderizarFotosAdmin();

        function renderizarAmbientesAdmin() {
            return `
            <div class="page-header">
                <div class="page-title">🏠 Gerenciar Ambientes</div>
                <button class="btn btn-primary" onclick="adicionarAmbiente()">+ Novo Ambiente</button>
            </div>
            <div class="admin-crud">
                ${dados.ambientes.map((amb, i) => `
                <div class="crud-item">
                    <input class="crud-input" value="${amb.nome || ''}" placeholder="Nome do ambiente" onchange="atualizarAmbiente(${i}, 'nome', this.value)">
                    <input class="crud-input" value="${amb.area || ''}" placeholder="Área (m²)" onchange="atualizarAmbiente(${i}, 'area', this.value)">
                    <button class="btn btn-ghost" onclick="excluirAmbiente(${i})">🗑️ Excluir</button>
                </div>
                `).join('')}
            </div>`;
        }

        function renderizarOrcamentoAdmin() {
            let total = dados.orcamento.reduce((acc, item) => acc + (item.valor || 0), 0);
            return `
            <div class="page-header">
                <div class="page-title">💰 Orçamento</div>
                <div style="display:flex; gap:10px; align-items:center">
                    <span style="color:var(--accent3); font-size:18px; font-weight:700">R$ ${total.toFixed(2)}</span>
                    <button class="btn btn-primary" onclick="adicionarItemOrcamento()">+ Adicionar</button>
                </div>
            </div>
            <div class="admin-crud">
                ${dados.orcamento.map((item, i) => `
                <div class="crud-item">
                    <input class="crud-input" value="${item.descricao || ''}" placeholder="Descrição" onchange="atualizarOrcamento(${i}, 'descricao', this.value)">
                    <input class="crud-input" type="number" value="${item.valor || 0}" placeholder="Valor (R$)" onchange="atualizarOrcamento(${i}, 'valor', this.value)">
                    <button class="btn btn-ghost" onclick="excluirOrcamento(${i})">🗑️ Excluir</button>
                </div>
                `).join('')}
            </div>`;
        }

        function renderizarMateriaisAdmin() {
            return `
            <div class="page-header">
                <div class="page-title">📦 Materiais</div>
                <button class="btn btn-primary" onclick="adicionarMaterial()">+ Adicionar</button>
            </div>
            <div class="admin-crud">
                ${dados.materiais.map((mat, i) => `
                <div class="crud-item">
                    <input class="crud-input" value="${mat.nome || ''}" placeholder="Nome do material" onchange="atualizarMaterial(${i}, 'nome', this.value)">
                    <input class="crud-input" value="${mat.fornecedor || ''}" placeholder="Fornecedor" onchange="atualizarMaterial(${i}, 'fornecedor', this.value)">
                    <input class="crud-input" value="${mat.status || 'pendente'}" placeholder="Status" onchange="atualizarMaterial(${i}, 'status', this.value)">
                    <button class="btn btn-ghost" onclick="excluirMaterial(${i})">🗑️ Excluir</button>
                </div>
                `).join('')}
            </div>`;
        }

        function renderizarFotosAdmin() {
            return `
            <div class="page-header">
                <div class="page-title">📸 Fotos da Obra</div>
                <button class="btn btn-primary" onclick="adicionarFoto()">+ Adicionar Foto</button>
            </div>
            <div class="admin-crud" style="display:grid; grid-template-columns:repeat(4,1fr); gap:15px;">
                ${dados.fotos.map((foto, i) => `
                <div style="position:relative;">
                    <img src="${foto.url}" style="width:100%; aspect-ratio:1; object-fit:cover; border-radius:10px; border:1px solid var(--border);">
                    <button class="btn btn-ghost" style="position:absolute; top:5px; right:5px; background:rgba(0,0,0,0.5);" onclick="excluirFoto(${i})">🗑️</button>
                    <div style="font-size:10px; color:var(--text2); margin-top:4px;">${foto.data || ''}</div>
                </div>
                `).join('')}
            </div>`;
        }

        // ============================================
        // FUNÇÕES DO GRÁFICO GANTT
        // ============================================
        function renderizarGantt() {
            let body = document.getElementById('ganttBody');
            if (!body) return;
            
            body.innerHTML = '';
            dados.grupos.forEach(g => {
                let grpDiv = document.createElement('div');
                grpDiv.className = 'gantt-group';

                // Linha do grupo
                let grpRow = document.createElement('div');
                grpRow.className = 'gantt-group-header gantt-row';
                
                let endWeek = g.start + g.dur;
                
                grpRow.appendChild(makeCell(
                    `<div class="dot" style="background:${g.color}"></div><strong>${g.name}</strong>`, true
                ));
                grpRow.appendChild(makeCell(fmt(g.start)));
                grpRow.appendChild(makeCell(fmt(endWeek)));
                grpRow.appendChild(makeCell(`${g.dur} sem.`));
                grpRow.appendChild(makeCell(g.responsavel || 'Admin'));
                grpRow.appendChild(makeBarCell(g, { name:g.name, start:g.start, dur:g.dur }));
                
                grpDiv.appendChild(grpRow);

                // Tarefas
                g.tasks.forEach(t => {
                    let tRow = document.createElement('div');
                    tRow.className = 'gantt-row';
                    
                    tRow.appendChild(makeCell(`<div class="dot" style="background:${g.color}80"></div>${t.name}`, true, true));
                    tRow.appendChild(makeCell(fmt(t.start || g.start)));
                    tRow.appendChild(makeCell(fmt((t.start || g.start) + t.dur)));
                    tRow.appendChild(makeCell(`${t.dur} sem.`));
                    tRow.appendChild(makeCell(t.resp || 'Equipe'));
                    tRow.appendChild(makeBarCell(g, t));
                    
                    grpDiv.appendChild(tRow);
                });

                body.appendChild(grpDiv);
            });
        }

        function makeCell(content, isName, indent) {
            let c = document.createElement('div');
            c.className = 'gc' + (isName ? ' gc-name' : '') + (indent ? ' indent' : '');
            if (typeof content === 'string') c.innerHTML = content;
            else c.appendChild(content);
            return c;
        }

        function makeBarCell(g, item) {
            let area = document.createElement('div');
            area.className = 'bar-area';
            area.style.width = (52 * 20) + 'px'; // 20 semanas de visualização

            let tl = document.createElement('div');
            tl.className = 'today-line';
            tl.style.left = (todayWeek * WEEK_W) + 'px';
            area.appendChild(tl);

            let bar = document.createElement('div');
            bar.className = 'gantt-bar';
            let start = item.start || g.start;
            bar.style.left = (start * WEEK_W) + 'px';
            bar.style.width = (item.dur * WEEK_W) + 'px';
            bar.style.background = g.color + '22';
            bar.style.border = '1px solid ' + g.color + '55';

            let fill = document.createElement('div');
            fill.className = 'gantt-bar-fill';
            fill.style.width = (item.progresso || 0) + '%';
            fill.style.background = g.color;
            bar.appendChild(fill);

            area.appendChild(bar);

            let cell = document.createElement('div');
            cell.className = 'gc';
            cell.style.padding = '0'; 
            cell.style.overflow = 'hidden';
            cell.style.alignItems = 'flex-start';
            cell.appendChild(area);
            return cell;
        }

        // ============================================
        // FUNÇÕES DE CRUD
        // ============================================
        function mudarAbaCliente(aba) {
            modoAtual = aba;
            renderizarCliente();
        }

        function mudarAbaAdmin(aba) {
            modoAtual = aba;
            renderizarAdmin();
        }

        function adicionarGrupo() {
            dados.grupos.push({
                id: 'g' + (dados.grupos.length + 1),
                name: 'Novo Grupo',
                color: '#' + Math.floor(Math.random()*16777215).toString(16),
                start: dados.grupos.reduce((acc, g) => Math.max(acc, g.start + g.dur), 0),
                dur: 4,
                tasks: []
            });
            salvarDados();
            renderizarAdmin();
        }

        function adicionarTarefa() {
            if (dados.grupos.length > 0) {
                dados.grupos[0].tasks.push({
                    name: 'Nova Tarefa',
                    dur: 2,
                    resp: 'Equipe'
                });
                salvarDados();
                renderizarAdmin();
            }
        }

        function adicionarAmbiente() {
            dados.ambientes.push({ nome: 'Novo Ambiente', area: '0' });
            salvarDados();
            renderizarAdmin();
        }

        function atualizarAmbiente(idx, campo, valor) {
            dados.ambientes[idx][campo] = valor;
            salvarDados();
        }

        function excluirAmbiente(idx) {
            dados.ambientes.splice(idx, 1);
            salvarDados();
            renderizarAdmin();
        }

        function adicionarItemOrcamento() {
            dados.orcamento.push({ descricao: 'Novo Item', valor: 0 });
            salvarDados();
            renderizarAdmin();
        }

        function atualizarOrcamento(idx, campo, valor) {
            dados.orcamento[idx][campo] = campo === 'valor' ? parseFloat(valor) || 0 : valor;
            salvarDados();
        }

        function excluirOrcamento(idx) {
            dados.orcamento.splice(idx, 1);
            salvarDados();
            renderizarAdmin();
        }

        function adicionarMaterial() {
            dados.materiais.push({ nome: 'Novo Material', fornecedor: '', status: 'pendente' });
            salvarDados();
            renderizarAdmin();
        }

        function atualizarMaterial(idx, campo, valor) {
            dados.materiais[idx][campo] = valor;
            salvarDados();
        }

        function excluirMaterial(idx) {
            dados.materiais.splice(idx, 1);
            salvarDados();
            renderizarAdmin();
        }

        function adicionarFoto() {
            let input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.multiple = true;
            input.onchange = function(e) {
                for (let file of e.target.files) {
                    let reader = new FileReader();
                    reader.onload = function(e) {
                        dados.fotos.push({ 
                            url: e.target.result, 
                            nome: file.name,
                            data: new Date().toLocaleDateString('pt-BR')
                        });
                        salvarDados();
                        renderizarAdmin();
                    };
                    reader.readAsDataURL(file);
                }
            };
            input.click();
        }

        function excluirFoto(idx) {
            dados.fotos.splice(idx, 1);
            salvarDados();
            renderizarAdmin();
        }

        function exportarCronograma() {
            alert('Funcionalidade de exportação em desenvolvimento');
        }

        function filtrarTarefas() {
            // Implementar filtro se necessário
        }

        // INICIALIZAÇÃO
        carregarDados();
    </script>
