<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>🏗️ Sistema Inteligente - Torre L'iris</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        body { background: #f1f5f9; padding: 16px; padding-bottom: 90px; }
        
        .header {
            background: linear-gradient(145deg, #0f172a, #1e293b);
            color: white; padding: 24px; border-radius: 32px; margin-bottom: 20px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
            position: relative;
        }
        
        .imagem-ap {
            width: 70px; height: 70px; border-radius: 20px; background: rgba(255,255,255,0.1);
            position: absolute; right: 20px; top: 20px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            border: 2px dashed rgba(255,255,255,0.2); overflow: hidden;
        }
        
        .input-transparent {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 30px;
            padding: 10px 18px;
            color: white;
            font-size: 15px;
            width: 100%;
            margin: 6px 0;
        }
        
        .tabs {
            display: flex; background: white; padding: 6px; border-radius: 40px; margin-bottom: 24px;
            gap: 4px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            flex-wrap: wrap;
        }
        
        .tab {
            flex: 1; text-align: center; padding: 14px 0; font-size: 14px; font-weight: 600;
            border-radius: 34px; color: #64748b; cursor: pointer;
            min-width: 90px;
        }
        .tab.active { background: #0f172a; color: white; }
        
        .card {
            background: white; border-radius: 28px; padding: 24px; margin-bottom: 24px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #e2e8f0;
        }
        
        .card-title {
            font-size: 20px; font-weight: 700; color: #0f172a; margin-bottom: 20px;
            border-bottom: 2px solid #e2e8f0; padding-bottom: 16px;
        }
        
        .dashboard-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px;
        }
        .dashboard-card {
            background: linear-gradient(145deg, #f8fafc, #f1f5f9);
            padding: 20px; border-radius: 24px; border: 1px solid #e2e8f0;
        }
        .dashboard-valor { font-size: 28px; font-weight: 800; color: #0f172a; }
        .dashboard-label { font-size: 13px; color: #64748b; margin-top: 4px; }
        
        .progresso-container {
            width: 100%; height: 10px; background: #e2e8f0; border-radius: 30px; margin: 12px 0; overflow: hidden;
        }
        .progresso-bar {
            height: 100%; background: linear-gradient(90deg, #3b82f6, #8b5cf6); border-radius: 30px;
            transition: width 0.3s;
        }
        
        .ambiente-item {
            background: #f8fafc; border-radius: 24px; padding: 20px; margin-bottom: 16px;
            border: 1px solid #e2e8f0;
        }
        .ambiente-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .ambiente-nome { font-weight: 700; font-size: 16px; }
        .ambiente-area { background: #e2e8f0; padding: 4px 12px; border-radius: 30px; font-size: 12px; }
        
        .subtarefa-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 16px; background: white; border-radius: 20px; margin: 8px 0;
            border: 1px solid #e2e8f0;
        }
        
        .funcionario-card {
            background: #f8fafc; border-radius: 24px; padding: 20px; margin: 20px 0;
            border: 1px solid #e2e8f0;
        }
        .ponto-grid {
            display: flex; gap: 10px; flex-wrap: wrap; margin: 15px 0;
        }
        .ponto-dia {
            background: white; padding: 12px; border-radius: 16px; text-align: center; min-width: 90px;
            border: 1px solid #e2e8f0;
        }
        
        .tabela-container {
            overflow-x: auto; border-radius: 20px; border: 1px solid #e2e8f0; margin: 20px 0;
        }
        .tabela {
            width: 100%; border-collapse: collapse; font-size: 14px; min-width: 1200px;
        }
        .tabela th {
            background: #f8fafc; color: #1e293b; font-weight: 600; padding: 16px 12px;
            border-bottom: 2px solid #cbd5e1;
        }
        .tabela td {
            padding: 14px 12px; border-bottom: 1px solid #e2e8f0;
        }
        
        .input-tabela {
            width: 100%; padding: 8px 12px; border: 1px solid #cbd5e1; border-radius: 16px;
            font-size: 13px;
        }
        
        .btn {
            padding: 10px 20px; border: none; border-radius: 30px; font-weight: 600;
            font-size: 13px; cursor: pointer;
        }
        .btn-primary { background: #0f172a; color: white; }
        .btn-success { background: #10b981; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-sm { padding: 6px 12px; font-size: 12px; }
        
        .fixed-buttons {
            position: fixed; bottom: 0; left: 0; right: 0; padding: 16px;
            background: white; border-top: 1px solid #e2e8f0; display: flex; gap: 8px;
            background: rgba(255,255,255,0.95);
            flex-wrap: wrap;
        }
        
        .fixed-btn {
            flex: 1; padding: 16px; border: none; border-radius: 30px; font-weight: 700;
            font-size: 14px; cursor: pointer; min-width: 100px;
        }
        .btn-edit { background: #0f172a; color: white; }
        .btn-add { background: #8b5cf6; color: white; }
        
        .badge {
            padding: 4px 10px; border-radius: 30px; font-size: 11px; font-weight: 600;
        }
        .badge-success { background: #d1fae5; color: #065f46; }
        .badge-warning { background: #fef3c7; color: #92400e; }
        .badge-info { background: #dbeafe; color: #1e40af; }
        
        /* MODAL DE LOGIN */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 30px;
            width: 90%;
            max-width: 350px;
            text-align: center;
        }
        .modal-input {
            width: 100%;
            padding: 15px;
            margin: 15px 0;
            border: 2px solid #e2e8f0;
            border-radius: 30px;
            font-size: 16px;
        }
        .modal-btn {
            width: 100%;
            padding: 15px;
            background: #0f172a;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .admin-badge {
            background: #10b981;
            color: white;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <!-- MODAL DE LOGIN -->
    <div id="loginModal" class="modal" style="display: flex;">
        <div class="modal-content">
            <h2 style="margin-bottom: 20px;">🔐 Acesso ao Sistema</h2>
            <p style="color: #64748b; margin-bottom: 20px;">Digite a senha de administrador</p>
            <input type="password" id="senhaInput" class="modal-input" placeholder="Senha" value="">
            <button class="modal-btn" onclick="verificarSenha()">Entrar</button>
            <button class="modal-btn" style="background: #64748b; margin-top: 10px;" onclick="entrarComoCliente()">Entrar como Cliente</button>
        </div>
    </div>

    <div class="header">
        <div class="imagem-ap" onclick="if(admin) uploadImagemAp()" id="containerImagemAp">🏢</div>
        
        <div style="display: flex; align-items: center; gap: 10px;">
            <input type="text" id="tituloObra" class="input-transparent" value="Torre L'iris Residence" style="font-size: 24px; font-weight: bold;" onchange="if(admin) dados.titulo=this.value" readonly>
            <span id="adminBadge" class="admin-badge" style="display: none;">Admin</span>
        </div>
        
        <input type="text" id="enderecoObra" class="input-transparent" value="Av. Conselheiro Furtado, 1044" onchange="if(admin) dados.endereco=this.value" readonly>
        
        <div style="display: flex; gap: 10px; margin: 10px 0;">
            <input type="text" class="input-transparent" value="Seu Aldebaner" placeholder="Proprietário" onchange="if(admin) dados.proprietario=this.value" readonly>
            <input type="text" class="input-transparent" value="Isabela Kalume" placeholder="Arquiteto" onchange="if(admin) dados.arquiteta=this.value" readonly>
        </div>
        
        <div style="margin: 15px 0;">
            <label style="font-size: 13px;">📅 Data de início:</label>
            <input type="date" id="dataInicio" class="input-transparent" value="2026-03-02" onchange="if(admin) {dados.dataInicio=this.value; renderizarConteudo()}" readonly>
        </div>
        
        <div style="display: flex; gap: 8px; flex-wrap: wrap;">
            <span style="background: rgba(255,255,255,0.15); padding: 6px 16px; border-radius: 30px;" id="periodoDisplay">📅 Mar/2026 - Jul/2026</span>
            <span style="background: rgba(255,255,255,0.15); padding: 6px 16px; border-radius: 30px;">💰 R$ <span id="totalOrcamentoHeader">234.943,54</span></span>
        </div>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="mudarAba('dashboard')">📊 Dashboard</div>
        <div class="tab" onclick="mudarAba('ambientes')">🏠 Ambientes</div>
        <div class="tab" onclick="mudarAba('orcamento')">💰 Orçamento</div>
        <div class="tab" onclick="mudarAba('materiais')">📦 Materiais</div>
        <div class="tab" onclick="mudarAba('maoobra')">👷 Mão de Obra</div>
        <div class="tab" onclick="mudarAba('fotos')">📸 Fotos</div>
    </div>

    <div id="conteudo"></div>

    <div id="botoesAdmin" style="display: none;">
        <div class="fixed-buttons">
            <button class="fixed-btn btn-edit" onclick="modoEdicao = !modoEdicao; renderizarConteudo()">✏️ Editar</button>
            <button class="fixed-btn btn-add" onclick="adicionarItem()">➕ Adicionar</button>
            <button class="fixed-btn btn-edit" onclick="exportarDados()">📥 Exportar</button>
        </div>
    </div>

    <script>
        // ============================================
        // CONTROLE DE ACESSO
        // ============================================
        let admin = false;
        const SENHA_ADMIN = "torre2026";

        function verificarSenha() {
            let senha = document.getElementById('senhaInput').value;
            if (senha === SENHA_ADMIN) {
                admin = true;
                document.getElementById('loginModal').style.display = 'none';
                document.getElementById('adminBadge').style.display = 'inline-block';
                document.getElementById('botoesAdmin').style.display = 'block';
                
                // Habilita campos para edição
                document.querySelectorAll('.input-transparent').forEach(campo => {
                    campo.removeAttribute('readonly');
                });
                
                renderizarConteudo();
            } else {
                alert('Senha incorreta!');
            }
        }

        function entrarComoCliente() {
            admin = false;
            document.getElementById('loginModal').style.display = 'none';
            document.getElementById('adminBadge').style.display = 'none';
            document.getElementById('botoesAdmin').style.display = 'none';
            
            // Mantém campos readonly
            document.querySelectorAll('.input-transparent').forEach(campo => {
                campo.setAttribute('readonly', true);
            });
            
            renderizarConteudo();
        }

        // ============================================
        // DADOS COMPLETOS
        // ============================================
        let dados = {
            titulo: "Torre L'iris Residence",
            endereco: "Av. Conselheiro Furtado, 1044",
            proprietario: "Seu Aldebaner",
            arquiteta: "Isabela Kalume",
            dataInicio: "2026-03-02",
            
            bdi: { geral: 25.5, maoObra: 32.0 },
            
            ambientes: [
                { 
                    id: 1, nome: "BHO Andrey", area: "3,66m²", 
                    tarefas: [
                        { nome: "Chapisco", concluido: false, tipo: "revestimento" },
                        { nome: "Reboco", concluido: false, tipo: "revestimento" },
                        { nome: "Revestimento", concluido: false, tipo: "revestimento" },
                        { nome: "Metais", concluido: false, tipo: "instalacao" }
                    ]
                },
                { 
                    id: 2, nome: "BHO Delbanor", area: "4,29m²",
                    tarefas: [
                        { nome: "Chapisco", concluido: false, tipo: "revestimento" },
                        { nome: "Reboco", concluido: false, tipo: "revestimento" },
                        { nome: "Revestimento", concluido: false, tipo: "revestimento" },
                        { nome: "Bancada", concluido: false, tipo: "acabamento" }
                    ]
                },
                { 
                    id: 3, nome: "BHO Isabel", area: "4,22m²",
                    tarefas: [
                        { nome: "Chapisco", concluido: false, tipo: "revestimento" },
                        { nome: "Reboco", concluido: false, tipo: "revestimento" },
                        { nome: "Revestimento", concluido: false, tipo: "revestimento" },
                        { nome: "Metais", concluido: false, tipo: "instalacao" }
                    ]
                }
            ],

            orcamento: [
                { codigo: "001", categoria: "SERVIÇOS PRELIMINARES", descricao: "Placa de obra", un: "m²", quant: 35, unitario: 46.35, total: 1639.05 },
                { codigo: "002", categoria: "SERVIÇOS PRELIMINARES", descricao: "Administração", un: "meses", quant: 5, unitario: 7627.95, total: 38139.75 }
            ],

            materiais: [
                { codigo: "MAT001", descricao: "Cimento CP-II", un: "sc", quant: 450, unitario: 32.50, total: 14625.00,
                  fornecedor: "Cemex", contato: "(11) 1234-5678", dataCompra: "15/02/2026", dataPrevista: "20/02/2026",
                  status: "entregue", notaFiscal: "NF-12345" }
            ],

            maoObra: {
                funcionarios: [
                    {
                        id: 1, nome: "João Silva", funcao: "Pedreiro", valorHora: 25.00,
                        ponto: [
                            { data: "02/03/2026", presente: true, horas: 8 },
                            { data: "03/03/2026", presente: true, horas: 8 }
                        ],
                        pagamentos: [
                            { data: "05/03/2026", valor: 400.00, status: "pago" }
                        ]
                    }
                ]
            },

            fotos: []
        };

        // ============================================
        // FUNÇÕES
        // ============================================
        let abaAtual = 'dashboard';
        let modoEdicao = false;

        function mudarAba(aba) {
            abaAtual = aba;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            renderizarConteudo();
        }

        function calcularProgressoAmbiente(ambiente) {
            let total = ambiente.tarefas.length;
            let concluidas = ambiente.tarefas.filter(t => t.concluido).length;
            return total > 0 ? Math.round((concluidas / total) * 100) : 0;
        }

        function calcularProgressoPorTipo(tipo) {
            let totalTarefas = 0;
            let tarefasConcluidas = 0;
            
            dados.ambientes.forEach(amb => {
                amb.tarefas.forEach(tarefa => {
                    if (tarefa.tipo === tipo) {
                        totalTarefas++;
                        if (tarefa.concluido) tarefasConcluidas++;
                    }
                });
            });
            
            return totalTarefas > 0 ? Math.round((tarefasConcluidas / totalTarefas) * 100) : 0;
        }

        function renderizarConteudo() {
            let html = '';
            
            let progressoRevestimento = calcularProgressoPorTipo('revestimento');
            let progressoPintura = calcularProgressoPorTipo('pintura');
            let progressoInstalacao = calcularProgressoPorTipo('instalacao');
            
            if (abaAtual === 'dashboard') {
                html = `
                <div class="card">
                    <div class="card-title">📊 DASHBOARD</div>
                    
                    <h3 style="margin: 20px 0 10px;">📈 Progresso por Tipo</h3>
                    
                    <div style="margin: 15px 0;">
                        <div style="display: flex; justify-content: space-between;">
                            <span>🧱 Revestimento</span>
                            <span><strong>${progressoRevestimento}%</strong></span>
                        </div>
                        <div class="progresso-container">
                            <div class="progresso-bar" style="width: ${progressoRevestimento}%;"></div>
                        </div>
                    </div>
                    
                    <div style="margin: 15px 0;">
                        <div style="display: flex; justify-content: space-between;">
                            <span>🎨 Pintura</span>
                            <span><strong>${progressoPintura}%</strong></span>
                        </div>
                        <div class="progresso-container">
                            <div class="progresso-bar" style="width: ${progressoPintura}%;"></div>
                        </div>
                    </div>
                    
                    <div style="margin: 15px 0;">
                        <div style="display: flex; justify-content: space-between;">
                            <span>🔧 Instalações</span>
                            <span><strong>${progressoInstalacao}%</strong></span>
                        </div>
                        <div class="progresso-container">
                            <div class="progresso-bar" style="width: ${progressoInstalacao}%;"></div>
                        </div>
                    </div>
                </div>`;
            }
            
            else if (abaAtual === 'ambientes') {
                html = '<div class="card">';
                html += `<div class="card-title">🏠 Ambientes</div>`;
                
                dados.ambientes.forEach(amb => {
                    let progresso = calcularProgressoAmbiente(amb);
                    
                    html += `<div class="ambiente-item">
                        <div class="ambiente-header">
                            <span class="ambiente-nome">${amb.nome}</span>
                            <span class="ambiente-area">${amb.area}</span>
                        </div>
                        
                        <div class="progresso-container">
                            <div class="progresso-bar" style="width: ${progresso}%;"></div>
                        </div>`;
                    
                    amb.tarefas.forEach((tarefa, idx) => {
                        html += `<div class="subtarefa-item">
                            <span>${tarefa.nome}</span>
                            ${admin ? 
                                `<input type="checkbox" ${tarefa.concluido ? 'checked' : ''} onchange="toggleTarefa(${amb.id}, ${idx})">` :
                                `<span class="badge ${tarefa.concluido ? 'badge-success' : 'badge-warning'}">${tarefa.concluido ? '✅' : '⏳'}</span>`
                            }
                        </div>`;
                    });
                    
                    html += '</div>';
                });
                
                html += '</div>';
            }

            else if (abaAtual === 'orcamento') {
                html = `<div class="card">
                    <div class="card-title">💰 Orçamento</div>
                    <div class="tabela-container">
                        <table class="tabela">
                            <thead><tr><th>Cód</th><th>Descrição</th><th>R$ Total</th></tr></thead>
                            <tbody>`;
                
                dados.orcamento.forEach(item => {
                    html += `<tr><td>${item.codigo}</td><td>${item.descricao}</td><td>R$ ${item.total.toFixed(2)}</td></tr>`;
                });
                
                html += `</tbody></table></div></div>`;
            }

            else if (abaAtual === 'materiais') {
                html = `<div class="card">
                    <div class="card-title">📦 Materiais</div>
                    <div class="tabela-container">
                        <table class="tabela">
                            <thead><tr><th>Material</th><th>Status</th></tr></thead>
                            <tbody>`;
                
                dados.materiais.forEach(item => {
                    html += `<tr><td>${item.descricao}</td><td>${item.status}</td></tr>`;
                });
                
                html += `</tbody></table></div></div>`;
            }

            else if (abaAtual === 'maoobra') {
                html = `<div class="card">
                    <div class="card-title">👷 Mão de Obra</div>`;
                
                dados.maoObra.funcionarios.forEach(func => {
                    html += `<div class="funcionario-card"><h3>${func.nome} - ${func.funcao}</h3></div>`;
                });
                
                html += `</div>`;
            }

            else if (abaAtual === 'fotos') {
                html = `<div class="card">
                    <div class="card-title">📸 Fotos</div>
                    <p>Nenhuma foto ainda</p>
                </div>`;
            }

            document.getElementById('conteudo').innerHTML = html;
        }

        function toggleTarefa(ambienteId, tarefaIdx) {
            if (!admin) return;
            let amb = dados.ambientes.find(a => a.id === ambienteId);
            if (amb) {
                amb.tarefas[tarefaIdx].concluido = !amb.tarefas[tarefaIdx].concluido;
                renderizarConteudo();
            }
        }

        function adicionarItem() {
            if (!admin) return;
            alert('Função apenas para admin');
        }

        function exportarDados() {
            if (!admin) return;
            let blob = new Blob([JSON.stringify(dados, null, 2)], { type: 'application/json' });
            let link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'dados_obra.json';
            link.click();
        }

        function uploadImagemAp() {
            if (!admin) return;
            alert('Upload de imagem');
        }

        // Inicializar
        renderizarConteudo();
    </script>
</body>
</html>
