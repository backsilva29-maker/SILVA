<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🏗️ Torre L'iris — Gestão Inteligente</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --bg:#0d0f14; --surface:#13161e; --surface2:#1a1e2a; --border:#252a38;
  --accent:#e8a020; --accent2:#3b82f6; --accent3:#10b981; --accent4:#f43f5e;
  --text:#e8eaf0; --text2:#8892a4; --text3:#4a5468; --gantt-h:44px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:13px;min-height:100vh;overflow-x:hidden;}

/* LOGIN */
.login-modal{position:fixed;inset:0;background:rgba(0,0,0,0.85);backdrop-filter:blur(10px);display:flex;justify-content:center;align-items:center;z-index:1000;}
.login-content{background:var(--surface);border:1px solid var(--border);border-radius:48px;padding:40px;width:90%;max-width:380px;text-align:center;}
.login-input{width:100%;padding:16px;margin:15px 0;background:var(--bg);border:1px solid var(--border);border-radius:40px;color:var(--text);font-size:16px;outline:none;transition:border-color .2s;}
.login-input:focus{border-color:var(--accent);}
.login-btn{width:100%;padding:16px;margin:8px 0;border:none;border-radius:40px;font-size:16px;font-weight:600;cursor:pointer;transition:all .2s;}
.login-btn:hover{transform:translateY(-2px);filter:brightness(1.1);}
.btn-admin{background:var(--accent);color:#000;}
.btn-client{background:var(--accent2);color:white;}
.login-sep{display:flex;align-items:center;gap:10px;color:var(--text3);font-size:11px;margin:4px 0;}
.login-sep::before,.login-sep::after{content:'';flex:1;height:1px;background:var(--border);}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:56px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:17px;display:flex;align-items:center;gap:10px;}
.logo-badge{width:28px;height:28px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;color:#000;font-weight:800;}
.btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-family:'Inter',sans-serif;font-size:12px;font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:6px;}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text2);}
.btn-ghost:hover{border-color:var(--text2);color:var(--text);}
.btn-primary{background:var(--accent);color:#000;font-weight:600;}
.btn-primary:hover{background:#f5ae30;}
.btn-danger{background:var(--accent4);color:white;}
.btn-success{background:var(--accent3);color:white;}

/* LAYOUT */
.layout{display:flex;height:calc(100vh - 56px);}
.sidebar{width:240px;min-width:240px;background:var(--surface);border-right:1px solid var(--border);padding:16px 0;overflow-y:auto;}
.sidebar-section{margin-bottom:24px;}
.sidebar-label{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:1.5px;color:var(--text3);text-transform:uppercase;padding:0 16px;margin-bottom:6px;}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 16px;color:var(--text2);cursor:pointer;border-left:2px solid transparent;transition:all 0.2s;}
.sidebar-item:hover{background:var(--surface2);color:var(--text);transform:translateX(4px);}
.sidebar-item.active{color:var(--accent);border-left-color:var(--accent);background:rgba(232,160,32,.06);}
.main{flex:1;overflow:auto;padding:20px 24px;}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border);}
.page-title{font-family:'Syne',sans-serif;font-weight:700;font-size:22px;}
.page-sub{color:var(--text2);font-size:12px;margin-top:4px;}

/* SYNC BAR */
.sync-bar{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.sync-status{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2);}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--text3);flex-shrink:0;}
.sync-dot.online{background:var(--accent3);}
.sync-dot.syncing{background:var(--accent);animation:pulse 1s infinite;}
.sync-dot.offline{background:var(--accent4);}
.sync-dot.error{background:var(--accent4);}

/* DATA PICKER */
.client-data-card{background:linear-gradient(135deg,var(--surface) 0%,var(--surface2) 100%);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:20px;}
.client-data-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;}
.client-data-item{display:flex;flex-direction:column;gap:6px;}
.client-data-label{font-size:10px;color:var(--text3);text-transform:uppercase;font-family:'IBM Plex Mono',monospace;}
.client-data-input{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-size:13px;width:100%;outline:none;transition:border-color .2s;}
.client-data-input:focus{border-color:var(--accent);}
.data-picker-box{background:var(--bg);border:1px solid var(--accent);border-radius:12px;padding:16px 20px;display:flex;align-items:flex-end;gap:6px;flex-wrap:wrap;margin-top:4px;}
.data-part{display:flex;flex-direction:column;gap:5px;align-items:center;}
.data-part label{font-size:9px;color:var(--text3);text-transform:uppercase;font-family:'IBM Plex Mono',monospace;letter-spacing:1px;}
.data-part input{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 8px;color:var(--text);font-size:22px;font-weight:700;font-family:'Syne',sans-serif;text-align:center;outline:none;}
.data-part input:focus{border-color:var(--accent);}
.data-sep{font-size:24px;color:var(--text3);padding-bottom:10px;user-select:none;}
.data-preview{margin-left:12px;padding-bottom:10px;font-size:12px;color:var(--accent);display:flex;flex-direction:column;gap:3px;}

/* GANTT */
.gantt-wrap{border:1px solid var(--border);border-radius:10px;overflow:hidden;background:var(--surface);margin-bottom:20px;}
.gantt-header{display:grid;grid-template-columns:280px 100px 100px 80px 100px 1fr;background:var(--surface2);border-bottom:1px solid var(--border);font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text3);text-transform:uppercase;}
.gh-cell{padding:12px;border-right:1px solid var(--border);}
.gantt-group{border-bottom:1px solid var(--border);}
.gantt-group-header{display:grid;grid-template-columns:280px 100px 100px 80px 100px 1fr;background:rgba(232,160,32,.08);cursor:pointer;padding:12px;align-items:center;}
.gantt-row{display:grid;grid-template-columns:280px 100px 100px 80px 100px 1fr;border-bottom:1px solid rgba(37,42,56,.6);align-items:center;}
.gantt-row:hover{background:var(--surface2);}
.gc{padding:0 12px;height:var(--gantt-h);display:flex;align-items:center;border-right:1px solid var(--border);font-size:12px;}
.gc-edit{background:transparent;border:1px solid var(--border);border-radius:4px;padding:4px 8px;color:var(--text);font-size:11px;width:100%;outline:none;}
.gc-edit:focus{border-color:var(--accent);}
.dot{width:8px;height:8px;border-radius:50%;margin-right:8px;flex-shrink:0;}
.bar-area{position:relative;height:var(--gantt-h);min-width:100%;overflow-x:auto;}
.gantt-bar{position:absolute;top:50%;transform:translateY(-50%);height:20px;border-radius:5px;display:flex;align-items:center;overflow:hidden;}
.gantt-bar-fill{height:100%;border-radius:5px 0 0 5px;opacity:.95;transition:width 0.5s ease-out;}
.today-line{position:absolute;top:0;bottom:0;width:2px;background:var(--accent4);opacity:.7;z-index:5;}

/* CRUD */
.crud-container{display:grid;gap:12px;}
.crud-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;display:grid;grid-template-columns:1fr auto auto;gap:12px;align-items:center;}
.crud-input{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-size:12px;width:100%;outline:none;}
.crud-input:focus{border-color:var(--accent);}
.crud-textarea{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-size:13px;width:100%;outline:none;resize:vertical;min-height:80px;font-family:'Inter',sans-serif;}
.crud-textarea:focus{border-color:var(--accent);}
.crud-select{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-size:13px;width:100%;outline:none;}
.crud-select:focus{border-color:var(--accent);}

/* PHOTOS */
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;}
.photo-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:transform 0.2s;cursor:pointer;}
.photo-card:hover{transform:translateY(-4px);}
.photo-card img{width:100%;aspect-ratio:4/3;object-fit:cover;}
.photo-card-info{padding:12px;}
.photo-card-ambiente{font-size:11px;color:var(--accent);text-transform:uppercase;margin-bottom:4px;}
.photo-card-data{font-size:10px;color:var(--text3);}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:20px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;transition:transform 0.2s;}
.stat-card:hover{transform:translateY(-4px);}
.stat-label{font-size:10px;color:var(--text3);text-transform:uppercase;font-family:'IBM Plex Mono',monospace;margin-bottom:8px;}
.stat-value{font-family:'Syne',sans-serif;font-weight:700;font-size:22px;}

/* DIÁRIO */
.diario-item{background:var(--surface2);border-radius:10px;padding:14px 16px;margin-bottom:12px;border-left:3px solid var(--border);position:relative;}
.diario-item.info{border-left-color:var(--accent2);}
.diario-item.progresso{border-left-color:var(--accent3);}
.diario-item.importante{border-left-color:var(--accent4);}
.diario-meta{display:flex;gap:12px;font-size:10px;color:var(--text3);font-family:'IBM Plex Mono',monospace;margin-bottom:6px;flex-wrap:wrap;}
.diario-texto{font-size:13px;color:var(--text2);line-height:1.6;}
.diario-del{position:absolute;top:10px;right:10px;background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:13px;opacity:0;transition:opacity .2s;}
.diario-item:hover .diario-del{opacity:1;}

/* MODAL */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);backdrop-filter:blur(10px);z-index:1000;align-items:center;justify-content:center;padding:20px;}
.modal.open{display:flex;}
.modal-content{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:30px;width:90%;max-width:500px;max-height:90vh;overflow-y:auto;}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.modal-title{font-family:'Syne',sans-serif;font-weight:700;font-size:18px;}
.modal-close{background:none;border:none;color:var(--text2);font-size:24px;cursor:pointer;}
.modal-close:hover{color:var(--text);}

/* NOTIFICATION */
.notification{position:fixed;bottom:20px;right:20px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 20px;display:flex;align-items:center;gap:12px;z-index:9999;transform:translateY(100px);opacity:0;transition:all 0.3s;max-width:320px;}
.notification.show{transform:translateY(0);opacity:1;}
.notification.success{border-color:var(--accent3);}
.notification.error{border-color:var(--accent4);}
.notification.syncing{border-color:var(--accent);}

/* BOTÕES CRUD */
.btn-crud{height:22px;padding:0 7px;border-radius:4px;border:none;cursor:pointer;font-size:10px;font-weight:600;font-family:'Inter',sans-serif;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;}
.btn-crud-del{background:rgba(244,63,94,.2);color:#fb7185;border:1px solid rgba(244,63,94,.3);}
.btn-crud-edit{background:rgba(59,130,246,.2);color:#60a5fa;border:1px solid rgba(59,130,246,.3);}

/* ANIMAÇÕES */
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.5;}}
@keyframes slideInLeft{from{opacity:0;transform:translateX(-20px);}to{opacity:1;transform:translateX(0);}}
@keyframes shimmer{0%{transform:translateX(-100%);}100%{transform:translateX(100%);}}
@keyframes fadeSlideDown{from{opacity:0;transform:translateY(-16px);}to{opacity:1;transform:translateY(0);}}
@keyframes bobbing{0%,100%{transform:translateY(0);}50%{transform:translateY(-4px);}}
@keyframes operarioCaminha{0%{transform:scaleX(1);}50%{transform:scaleX(-1);}100%{transform:scaleX(1);}}
@keyframes spin{to{transform:rotate(360deg);}}

/* UPLOAD ZONE */
.upload-zone{border:2px dashed var(--border);border-radius:12px;padding:32px;text-align:center;cursor:pointer;transition:all .2s;}
.upload-zone:hover,.upload-zone.drag{border-color:var(--accent);background:rgba(232,160,32,.04);}

/* AVATARES CLIENTE */
@keyframes avatarWork{0%,100%{transform:translateY(0) rotate(-8deg);}50%{transform:translateY(-6px) rotate(8deg);}}
@keyframes avatarSleep{0%,100%{transform:rotate(-5deg) scale(0.95);}50%{transform:rotate(5deg) scale(1.05);}}
@keyframes avatarDone{0%{transform:scale(1) rotate(0);}20%{transform:scale(1.4) rotate(-15deg);}40%{transform:scale(1.3) rotate(15deg);}60%{transform:scale(1.4) rotate(-10deg);}80%{transform:scale(1.3) rotate(10deg);}100%{transform:scale(1.2) rotate(0);}}
@keyframes avatarFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
@keyframes zzzFloat{0%{opacity:0;transform:translate(0,0) scale(0.6);}50%{opacity:1;}100%{opacity:0;transform:translate(10px,-18px) scale(1);}}
@keyframes starBurst{0%{transform:scale(0) rotate(0);opacity:1;}100%{transform:scale(2.5) rotate(180deg);opacity:0;}}
@keyframes cardPulse{0%,100%{box-shadow:0 0 0 0 transparent;}50%{box-shadow:0 0 0 4px var(--accent)44;}}
@keyframes shimmerCard{0%{background-position:-200% 0;}100%{background-position:200% 0;}}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1;}100%{transform:translateY(100vh) rotate(720deg);opacity:0;}}
.avatar-box{position:relative;width:54px;height:54px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.avatar-emoji{font-size:36px;display:block;line-height:1;}
.avatar-working{animation:avatarWork .7s ease-in-out infinite;}
.avatar-sleeping{animation:avatarSleep 2s ease-in-out infinite;filter:grayscale(.4);}
.avatar-done{animation:avatarDone .6s ease forwards, avatarFloat 2s ease-in-out infinite 0.6s;}
.avatar-zzz{position:absolute;top:-2px;right:-4px;font-size:11px;animation:zzzFloat 1.6s ease-in-out infinite;}
.avatar-zzz2{position:absolute;top:-12px;right:2px;font-size:9px;animation:zzzFloat 1.6s ease-in-out infinite .5s;}
.avatar-star{position:absolute;top:-6px;right:-6px;font-size:14px;animation:starBurst 1s ease forwards;}
#confetti-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9998;}

/* RESPONSIVE */
@media(max-width:768px){
  .sidebar{display:none;}
  .gantt-header,.gantt-row{grid-template-columns:150px 1fr;}
  .gh-cell:nth-child(n+2),.gc:nth-child(n+2){display:none;}
  .crud-card{grid-template-columns:1fr;}
}
</style>
</head>

<!-- LOGIN -->

</div>

<!-- NOTIFICATION -->
<div id="notification" class="notification">

const SEMANA_PX = 40;
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function getDataInicio() { const p=dados.dataInicio.split('-'); return new Date(+p[0],+p[1]-1,+p[2]); }
function fmtData(d) { return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'}); }
function fmtSemana(s) { const d=new Date(getDataInicio().getTime()+s*7*24*3600*1000); return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'}); }
function calcularPrevisao() { const e=new Date(getDataInicio().getTime()+(dados.duracaoTotal||20)*7*24*3600*1000); return e.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'}); }
function getSemanaAtual() { return Math.round((new Date()-getDataInicio())/(7*24*3600*1000)); }
function getPartes() { const p=dados.dataInicio.split('-'); return {ano:p[0],mes:p[1],dia:p[2]}; }
function isoHoje() { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function fmtDataBR(iso) { if(!iso)return''; const p=iso.split('-'); return `${p[2]}/${p[1]}/${p[0]}`; }
function calcularProgressoGrupo(g) { if(!g.tarefas||!g.tarefas.length)return 0; return Math.round(g.tarefas.reduce((a,t)=>a+(t.progresso||0),0)/g.tarefas.length); }
function calcularProgressoGeral() { let t=0,s=0; dados.grupos.forEach(g=>g.tarefas.forEach(tf=>{t++;s+=tf.progresso||0;})); return t>0?Math.round(s/t):0; }

function setSyncStatus(st, msg) {
  syncStatus = st;
  const dot = document.getElementById('syncDot');
  const txt = document.getElementById('syncTxt');
  if(dot) { dot.className = 'sync-dot ' + st; }
  if(txt) {
    const msgs = { online:'Sincronizado ✓', syncing:'Sincronizando...', offline:'Sem conexão', error:'Erro de sync' };
    txt.textContent = msg || msgs[st] || st;
  }
}

async function carregarDoServidor() {
  setSyncStatus('syncing','Carregando...');
  try {
    const remoto = await sb.get();
    if(remoto && remoto.grupos) {
      dados = remoto;
      if(!dados.fotos)    dados.fotos    = [];
      if(!dados.diario)   dados.diario   = [];
      if(!dados.arquivos) dados.arquivos = [];
      localStorage.setItem('torre_liris_cache', JSON.stringify(dados)); // salva normalizado
      setSyncStatus('online');
      return true;
    }
  } catch(e) {}
  try {
    const cache = localStorage.getItem('torre_liris_cache');
    if(cache) {
      const parsed = JSON.parse(cache);
      if(parsed && parsed.grupos) {
        dados = parsed;
        if(!dados.fotos)    dados.fotos    = [];
        if(!dados.diario)   dados.diario   = [];
        if(!dados.arquivos) dados.arquivos = [];
        setSyncStatus('offline','Cache local');
        return true;
      }
    }
  } catch(e) {}
  setSyncStatus('offline','Dados padrão — crie a tabela no Supabase');
  return false;
}

async function salvarNoServidor() {
  setSyncStatus('syncing');
  localStorage.setItem('torre_liris_cache', JSON.stringify(dados));
  const ok = await sb.set(dados);
  if(ok) {
    setSyncStatus('online');
    mostrarNotificacao('Salvo e sincronizado! ☁️', 'success');
  } else {
    setSyncStatus('error','Erro — salvo localmente');
    mostrarNotificacao('Salvo localmente (sem conexão)', 'error');
  }
}

function agendarSync() {
  if(syncTimer) clearTimeout(syncTimer);
  syncTimer = setTimeout(() => salvarNoServidor(), 1500);
  setSyncStatus('syncing','Aguardando...');
}

let pollingInterval = null;
function iniciarPolling() {
  if(pollingInterval) clearInterval(pollingInterval);
  pollingInterval = setInterval(async () => {
    if(document.hidden) return;
    // Não faz polling se há sync pendente
    if(syncStatus === 'syncing') return;
    const remoto = await sb.get();
    if(remoto && remoto.grupos) {
      // Garante campos obrigatórios antes de comparar
      if(!remoto.fotos)    remoto.fotos    = [];
      if(!remoto.diario)   remoto.diario   = [];
      if(!remoto.arquivos) remoto.arquivos = [];
      const remotoStr  = JSON.stringify(remoto);
      const cacheLocal = localStorage.getItem('torre_liris_cache') || '{}';
      if(remotoStr !== cacheLocal) {
        dados = remoto;
        localStorage.setItem('torre_liris_cache', remotoStr);
        setSyncStatus('online','Atualizado de outro dispositivo ↻');
        // Re-renderiza qualquer modo ativo
        if(adminMode) renderizarAdmin();
        else          renderizarCliente();
        setTimeout(()=>setSyncStatus('online'), 3000);
      }
    }
  }, 15000);
}

// ── Drag & Drop state ──
let _dragSrcGi = null;

function renderizarGantt() {
  const body = document.getElementById('ganttBody');
  if(!body) return;
  body.innerHTML = '';
  const semA = getSemanaAtual();

  dados.grupos.forEach((g, gi) => {
    const pg = calcularProgressoGrupo(g);
    const div = document.createElement('div');
    div.className = 'gantt-group';
    div.setAttribute('draggable', 'true');
    div.dataset.gi = gi;
    div.style.transition = 'opacity .15s, transform .15s';

    // ── Drag events ──
    div.addEventListener('dragstart', e => {
      _dragSrcGi = gi;
      e.dataTransfer.effectAllowed = 'move';
      setTimeout(() => div.style.opacity = '0.4', 0);
    });
    div.addEventListener('dragend', () => {
      div.style.opacity = '1';
      div.style.transform = '';
      document.querySelectorAll('.gantt-group').forEach(el => el.style.borderTop = '');
    });
    div.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      document.querySelectorAll('.gantt-group').forEach(el => el.style.borderTop = '');
      if(_dragSrcGi !== gi) div.style.borderTop = '2px solid var(--accent)';
    });
    div.addEventListener('dragleave', () => {
      div.style.borderTop = '';
    });
    div.addEventListener('drop', e => {
      e.preventDefault();
      div.style.borderTop = '';
      if(_dragSrcGi === null || _dragSrcGi === gi) return;
      // Reordena
      const moved = dados.grupos.splice(_dragSrcGi, 1)[0];
      const newTarget = _dragSrcGi < gi ? gi - 1 : gi;
      dados.grupos.splice(newTarget, 0, moved);
      renumerarGrupos();
      agendarSync();
      renderizarGantt();

// Auto-renumera grupos que comecem com "N." ou "N. "
function renumerarGrupos() {
  dados.grupos.forEach((g, i) => {
    // Substitui prefixo numérico existente ou adiciona um novo
    g.nome = g.nome.replace(/^\d+\.\s*/, '') ;
    g.nome = `${i + 1}. ${g.nome}`;
  });
}

function excluirGrupo(gi) {
  if(confirm('Excluir grupo e todas as tarefas?')) {
    dados.grupos.splice(gi, 1);
    renumerarGrupos();
    agendarSync();
    renderizarGantt();
    mostrarNotificacao('Excluído e grupos renumerados!', 'success');
  }
}
function exportarCronograma() {
  const linhas=[];
  dados.grupos.forEach(g=>{
    linhas.push({Grupo:g.nome,Tarefa:'',Inicio:fmtSemana(g.inicio),Fim:fmtSemana(g.inicio+g.duracao),Duracao:g.duracao,Progresso:calcularProgressoGrupo(g)+'%'});
    g.tarefas.forEach(t=>linhas.push({Grupo:g.nome,Tarefa:t.nome,Inicio:fmtSemana(t.inicio),Fim:fmtSemana(t.inicio+t.duracao),Duracao:t.duracao,Progresso:t.progresso+'%'}));
  });
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(linhas),'Cronograma');
  XLSX.writeFile(wb,'cronograma-torre-liris.xlsx');
  mostrarNotificacao('Exportado!','success');
}

function adicionarFoto() {
  abrirModal('📷 Adicionar Fotos', `

         ondragover="event.preventDefault();this.classList.add('drag')"

        <select id="fotoAmb" class="crud-select">${dados.ambientes.map(a=>`<option>${a}</option>`).join('')}</select></div>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="btn btn-ghost" onclick="fecharModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="confirmarFotos()">💾 Salvar Fotos</button>
      </div>
    </div>`);
}
function handleFotos(files) {
  _fotosBuffer = [];
  const prev = document.getElementById('previewArea');
  const meta = document.getElementById('metaArea');
  if(!files.length) return;
  prev.innerHTML = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px"></div>';
  const grid = prev.querySelector('div');
  let loaded = 0;
  Array.from(files).forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      _fotosBuffer.push({ src: e.target.result, name: file.name });
      const img = document.createElement('div');
      img.style.cssText = 'border-radius:6px;overflow:hidden;border:1px solid var(--border)';
      img.innerHTML = `<img src="${e.target.result}" style="width:100%;height:80px;object-fit:cover">`;
      grid.appendChild(img);
      if(++loaded === files.length) meta.style.display = 'block';
    };
    reader.readAsDataURL(file);
  });
}
function confirmarFotos() {
  if(!_fotosBuffer.length){mostrarNotificacao('Selecione ao menos uma foto.','error');return;}
  const amb = document.getElementById('fotoAmb').value;
  const data = fmtData(new Date());
  _fotosBuffer.forEach(f => dados.fotos.push({id:uid(),url:f.src,ambiente:amb,data}));
  _fotosBuffer = [];
  agendarSync();fecharModal();renderizarAdmin();mostrarNotificacao(`${dados.fotos.length} foto(s) salva(s)!`,'success');
}

    </div>`);
}
function excluirFoto(i){if(confirm('Excluir foto?')){dados.fotos.splice(i,1);agendarSync();renderizarAdmin();mostrarNotificacao('Excluída!','success');}}

const ICONES_TIPO = {
  'pdf':'📄', 'doc':'📝', 'docx':'📝', 'xls':'📊', 'xlsx':'📊',
  'ppt':'📋', 'pptx':'📋', 'jpg':'🖼️', 'jpeg':'🖼️', 'png':'🖼️',
  'webp':'🖼️', 'gif':'🖼️', 'mp4':'🎬', 'mov':'🎬', 'zip':'📦',
  'rar':'📦', 'dwg':'📐', 'dxf':'📐', 'txt':'📃', 'csv':'📊'
};
function iconeArquivo(nome) {
  const ext = (nome.split('.').pop()||'').toLowerCase();
  return ICONES_TIPO[ext] || '📎';
}
function fmtTamanho(bytes) {
  if(!bytes) return '—';
  if(bytes < 1024) return bytes + ' B';
  if(bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/(1024*1024)).toFixed(1) + ' MB';
}

let _arquivosBuffer = [];
function handleArquivos(files) {
  _arquivosBuffer = [];
  const prev = document.getElementById('arqPreviewArea');
  const meta = document.getElementById('arqMetaArea');
  if(!files.length) return;

  prev.innerHTML = `<div style="font-size:11px;color:var(--text2);margin-bottom:8px">${files.length} arquivo(s) selecionado(s):</div>
    <div style="display:flex;flex-direction:column;gap:6px" id="arqLista"></div>`;
  const lista = prev.querySelector('#arqLista');
  let loaded = 0;

  Array.from(files).forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      _arquivosBuffer.push({ nome: file.name, data64: e.target.result, tamanho: file.size, tipo: file.type });
      const item = document.createElement('div');
      item.style.cssText = 'display:flex;align-items:center;gap:10px;background:var(--surface2);border-radius:8px;padding:8px 12px;font-size:12px';
      item.innerHTML = `<span style="font-size:18px">${iconeArquivo(file.name)}</span>
        <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${file.name}</span>
        <span style="color:var(--text3);font-family:'IBM Plex Mono',monospace;font-size:10px;flex-shrink:0">${fmtTamanho(file.size)}</span>`;
      lista.appendChild(item);
      if(++loaded === files.length) meta.style.display = 'block';
    };
    reader.readAsDataURL(file);
  });
}

// AVATARES — mapeamento por tipo de etapa
// ══════════════════════════════════════════════
// ══════════════════════════════════════════════
// AVATARES — detecção inteligente por palavras-chave
// Escaneia nome do grupo + todas as tarefas e faz votação
// ══════════════════════════════════════════════
const AVATAR_RULES = [
  { emoji:'⛏️',  label:'Demolidor',      keys:/demoli|entulho|remoç|quebra/ },
  { emoji:'⚡',  label:'Eletricista',     keys:/elétric|eletric|ilumina|tomad|quadro|disjunt|fio|cabo elét/ },
  { emoji:'🔧',  label:'Encanador',       keys:/hidrá|hidra|encanam|água|esgoto|gás|tubul|registro|sifão/ },
  { emoji:'🪨',  label:'Marmoreiro',      keys:/piso|pavim|porcela|mármo|marmore|cerâmic|azulejo|regulari/ },
  { emoji:'🎨',  label:'Gesseiro',        keys:/gesso|forro|sancas|moldur|drywall/ },
  { emoji:'🖌️', label:'Pintor',          keys:/pintur|massa|tinta|selad|lixa|primer/ },
  { emoji:'🚪',  label:'Carpinteiro',     keys:/esquadri|porta|janela|carpint|rodap|batente|dobradiç/ },
  { emoji:'❄️',  label:'Técnico Clima',   keys:/refriger|ar.cond|ar-cond|split|duto|ventil/ },
  { emoji:'🖥️', label:'Técnico TI',      keys:/rede|lógic|cabeam|internet|switch|roteador|tomada.dados/ },
  { emoji:'📐',  label:'Marmoreiro',      keys:/rodapé|soleir|peitoril/ },
  { emoji:'🧹',  label:'Limpeza',         keys:/limpe|limpez|varre|retir|lixo/ },
  { emoji:'📋',  label:'Engenheiro',      keys:/prelimin|placa|admin|projeto|ART|vistor|levant/ },
  { emoji:'🧱',  label:'Pedreiro',        keys:/parede|alvenar|tijolo|bloco|argamas|assentam/ },
  { emoji:'🏗️', label:'Pedreiro',        keys:/revestim|chapisco|reboco|emboç|impermeab/ },
];

function detectarAvatar(textos) {
  // Conta votos por regra em todos os textos fornecidos
  const votos = AVATAR_RULES.map(r => ({
    ...r,
    score: textos.filter(t => r.keys.test((t||'').toLowerCase())).length
  }));
  const melhor = votos.reduce((a,b) => b.score > a.score ? b : a);
  return melhor.score > 0 ? melhor : null;
}

function getAvatar(nomeGrupo, tarefas) {
  // 1. Tenta pelas tarefas (mais específico)
  const textosTarefas = (tarefas||[]).map(t => t.nome);
  const porTarefas = detectarAvatar(textosTarefas);
  if(porTarefas) return porTarefas.emoji;
  // 2. Fallback: pelo nome do grupo
  const porGrupo = detectarAvatar([nomeGrupo]);
  if(porGrupo) return porGrupo.emoji;
  // 3. Fallback genérico
  return '👷';
}

function getAvatarLabel(nomeGrupo, tarefas) {
  const textosTarefas = (tarefas||[]).map(t => t.nome);
  const porTarefas = detectarAvatar(textosTarefas);
  if(porTarefas) return porTarefas.label;
  const porGrupo = detectarAvatar([nomeGrupo]);
  if(porGrupo) return porGrupo.label;
  return 'Equipe';
}

// Confetti quando 100%
function dispararConfetti() {
  const existing = document.getElementById('confetti-canvas');
  if(existing) return; // já disparou
  const canvas = document.createElement('canvas');
  canvas.id = 'confetti-canvas';
  document.body.appendChild(canvas);
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const cores = ['#e8a020','#10b981','#3b82f6','#f43f5e','#a855f7','#f59e0b','#06b6d4','#84cc16'];
  const particles = Array.from({length:160}, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * -canvas.height,
    w: Math.random()*10+4, h: Math.random()*14+6,
    color: cores[Math.floor(Math.random()*cores.length)],
    speed: Math.random()*4+2,
    spin: (Math.random()-.5)*0.3,
    angle: Math.random()*360,
    wobble: Math.random()*3
  }));

  let frame = 0;
  function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      p.y += p.speed;
      p.x += Math.sin(frame * 0.02 + p.wobble) * 1.5;
      p.angle += p.spin;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.angle);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
    });
    frame++;
    if(frame < 220) requestAnimationFrame(loop);
    else { canvas.style.transition='opacity 1s'; canvas.style.opacity='0'; setTimeout(()=>canvas.remove(), 1000); }
  }
  loop();
}

    });
    if(r.status === 404 || r.status === 400) {
      mostrarNotificacao('Configure o banco — veja o console', 'error');
      console.warn('⚠️ SUPABASE: Crie a tabela executando no SQL Editor do Supabase:\n\nCREATE TABLE torre_dados (\n  id TEXT PRIMARY KEY,\n  payload TEXT,\n  updated_at TIMESTAMPTZ DEFAULT NOW()\n);\n\nALTER TABLE torre_dados ENABLE ROW LEVEL SECURITY;\nCREATE POLICY "allow_all" ON torre_dados FOR ALL USING (true) WITH CHECK (true);');
      return false;
    }
    return true;
  } catch(e) { return false; }
}

window.addEventListener('load', () => {
  criarTabelaSeNecessario();
});
</script>
