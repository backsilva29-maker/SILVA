<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Torre L'iris — Gestão Profissional</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
<style>
:root {
  --bg:#0d0f14; --surface:#13161e; --surface2:#1a1e2a; --surface3:#252a38;
  --border:#2d3344; --accent:#e8a020; --accent2:#3b82f6; --accent3:#10b981;
  --accent4:#f43f5e; --accent5:#8b5cf6; --text:#e8eaf0; --text2:#8892a4; --text3:#4a5568;
  --r-sm:6px; --r-md:10px; --r-lg:16px; --r-xl:24px;
  --shadow:0 4px 16px rgba(0,0,0,0.5); --tr:150ms ease;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:13px;line-height:1.5;min-height:100vh;}

/* ── LOGIN ── */
.login-wrap{position:fixed;inset:0;background:rgba(0,0,0,0.96);backdrop-filter:blur(16px);display:flex;align-items:center;justify-content:center;z-index:2000;}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-xl);padding:40px;width:min(90%,400px);text-align:center;animation:fadeUp .4s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.login-icon{width:60px;height:60px;background:linear-gradient(135deg,var(--accent),#f5c060);border-radius:18px;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:0 8px 24px rgba(232,160,32,.3);}
.login-box h2{font-family:'Syne',sans-serif;font-size:22px;margin-bottom:4px;}
.login-box p{color:var(--text3);font-size:12px;margin-bottom:24px;}
.login-input{width:100%;padding:12px 16px;margin-bottom:10px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r-md);color:var(--text);font-size:14px;outline:none;transition:border-color var(--tr);}
.login-input:focus{border-color:var(--accent);}
.login-err{color:var(--accent4);font-size:12px;margin-bottom:8px;display:none;}
.login-sep{display:flex;align-items:center;gap:10px;color:var(--text3);font-size:11px;margin:10px 0;}
.login-sep::before,.login-sep::after{content:'';flex:1;height:1px;background:var(--border);}
.lbtn{width:100%;padding:13px;border:none;border-radius:var(--r-md);font-size:14px;font-weight:600;cursor:pointer;transition:all var(--tr);display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:6px;}
.lbtn-admin{background:var(--accent);color:#000;}
.lbtn-client{background:var(--surface2);border:1px solid var(--border);color:var(--text2);}
.lbtn:hover{filter:brightness(1.1);transform:translateY(-1px);}

/* ── LAYOUT ── */
.topbar{height:58px;background:rgba(19,22,30,.98);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px);}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:17px;display:flex;align-items:center;gap:10px;cursor:pointer;}
.logo-badge{width:30px;height:30px;background:linear-gradient(135deg,var(--accent),#f5c060);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;}
.layout{display:grid;grid-template-columns:220px 1fr;height:calc(100vh - 58px);}
.sidebar{background:var(--surface);border-right:1px solid var(--border);padding:16px 0;overflow-y:auto;}
.sb-label{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1.5px;color:var(--text3);text-transform:uppercase;padding:0 16px;margin:0 0 6px;}
.sb-item{display:flex;align-items:center;gap:10px;padding:10px 16px;color:var(--text2);cursor:pointer;border-left:3px solid transparent;transition:all var(--tr);font-size:13px;}
.sb-item:hover,.sb-item.active{background:var(--surface2);color:var(--text);border-left-color:var(--accent);}
.sb-item.active{color:var(--accent);font-weight:500;}
.sb-info{padding:10px 16px;font-size:11px;color:var(--text3);line-height:1.6;}
.sb-info strong{color:var(--text2);display:block;}
.main{overflow-y:auto;padding:24px;background:var(--bg);}

/* ── BOTÕES ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--r-md);border:none;cursor:pointer;font-size:12px;font-weight:500;transition:all var(--tr);}
.btn:hover{filter:brightness(1.1);transform:translateY(-1px);}
.btn-primary{background:var(--accent);color:#000;}
.btn-secondary{background:var(--accent2);color:#fff;}
.btn-success{background:var(--accent3);color:#fff;}
.btn-danger{background:var(--accent4);color:#fff;}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text2);}
.btn-warn{background:var(--accent5);color:#fff;}
.btn-sm{padding:5px 10px;font-size:11px;}
.btn-xs{padding:3px 8px;font-size:10px;}

/* ── CARDS / GRID ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px;margin-bottom:20px;}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.card-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:600;}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}

/* ── MÉTRICAS ── */
.metric{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:18px;position:relative;overflow:hidden;}
.metric::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent);transform:scaleX(0);transform-origin:left;transition:transform var(--tr);}
.metric:hover::after{transform:scaleX(1);}
.metric-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;font-family:'IBM Plex Mono',monospace;}
.metric-value{font-family:'Syne',sans-serif;font-size:24px;font-weight:700;line-height:1.1;margin-bottom:4px;}
.metric-delta{font-size:11px;display:flex;align-items:center;gap:4px;}
.pos{color:var(--accent3);} .neg{color:var(--accent4);} .warn{color:var(--accent);}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:500;}
.badge-ok{background:rgba(16,185,129,.12);color:var(--accent3);border:1px solid rgba(16,185,129,.2);}
.badge-warn{background:rgba(232,160,32,.12);color:var(--accent);border:1px solid rgba(232,160,32,.2);}
.badge-danger{background:rgba(244,63,94,.12);color:var(--accent4);border:1px solid rgba(244,63,94,.2);}
.badge-info{background:rgba(59,130,246,.12);color:var(--accent2);border:1px solid rgba(59,130,246,.2);}

/* ── TABELAS ── */
.tbl-wrap{border:1px solid var(--border);border-radius:var(--r-md);overflow:hidden;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{background:var(--surface2);padding:10px 12px;text-align:left;font-family:'IBM Plex Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);border-bottom:1px solid var(--border);}
td{padding:10px 12px;border-bottom:1px solid var(--border);color:var(--text2);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--surface2);color:var(--text);}

/* ── FORMULÁRIOS ── */
.form-group{margin-bottom:14px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.form-label{display:block;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;font-family:'IBM Plex Mono',monospace;}
.form-input,.form-select,.form-textarea{width:100%;padding:9px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--text);font-size:13px;outline:none;transition:border-color var(--tr);font-family:'Inter',sans-serif;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(232,160,32,.1);}
.form-select option{background:var(--surface2);}
.form-textarea{resize:vertical;min-height:80px;}

/* ── MODAL ── */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);z-index:1000;align-items:center;justify-content:center;padding:20px;}
.modal.open{display:flex;}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-xl);padding:28px;width:min(94%,600px);max-height:92vh;overflow-y:auto;animation:fadeUp .25s ease;}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.modal-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;}
.modal-close{background:var(--surface2);border:1px solid var(--border);color:var(--text2);width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all var(--tr);}
.modal-close:hover{background:var(--surface3);color:var(--text);}
.modal-actions{display:flex;gap:8px;margin-top:16px;}

/* ── GANTT ── */
.gantt-wrap{border:1px solid var(--border);border-radius:var(--r-md);overflow:hidden;}
.gantt-head{display:grid;grid-template-columns:200px 55px 55px 55px 80px 1fr 80px;background:var(--surface2);border-bottom:1px solid var(--border);font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);font-family:'IBM Plex Mono',monospace;}
.gantt-row{display:grid;grid-template-columns:200px 55px 55px 55px 80px 1fr 80px;border-bottom:1px solid var(--border);min-height:46px;align-items:center;transition:background var(--tr);}
.gantt-row:hover{background:var(--surface2);}
.gantt-row.crit{background:rgba(244,63,94,.04);}
.gantt-row.crit .gc:first-child{border-left:3px solid var(--accent4);}
.gc{padding:8px 10px;border-right:1px solid var(--border);display:flex;align-items:center;}
.gc:last-child{border-right:none;}
.task-name{font-weight:500;color:var(--text);font-size:12px;}
.task-sub{color:var(--text3);font-size:10px;}
.bar-area{position:relative;height:34px;padding:0 6px;}
.gantt-bar{position:absolute;height:20px;border-radius:4px;top:50%;transform:translateY(-50%);overflow:hidden;cursor:pointer;transition:all var(--tr);min-width:3px;}
.gantt-bar:hover{transform:translateY(-50%) scale(1.02);z-index:10;}
.bar-fill{height:100%;transition:width .6s ease;}
.today-line{position:absolute;top:-4px;bottom:-4px;width:2px;background:var(--accent4);z-index:5;box-shadow:0 0 6px rgba(244,63,94,.5);}

/* ── PROGRESSO ── */
.prog-bar{height:6px;background:var(--surface3);border-radius:3px;overflow:hidden;margin:6px 0 3px;}
.prog-fill{height:100%;border-radius:3px;transition:width .8s ease;}
.prog-input{width:64px;padding:4px 8px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--text);font-size:12px;font-family:'IBM Plex Mono',monospace;text-align:center;outline:none;}
.prog-input:focus{border-color:var(--accent);}

/* ── GALERIA ── */
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;}
.gallery-item{border-radius:var(--r-md);overflow:hidden;border:1px solid var(--border);background:var(--surface2);position:relative;cursor:pointer;}
.gallery-item img{width:100%;height:120px;object-fit:cover;display:block;}
.gallery-item .gi-info{padding:8px;font-size:11px;}
.gallery-item .gi-info strong{color:var(--text);display:block;margin-bottom:2px;}
.gallery-item .gi-info span{color:var(--text3);}
.gallery-item .gi-del{position:absolute;top:6px;right:6px;background:rgba(244,63,94,.8);border:none;color:#fff;width:22px;height:22px;border-radius:50%;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity var(--tr);}
.gallery-item:hover .gi-del{opacity:1;}
.upload-zone{border:2px dashed var(--border);border-radius:var(--r-lg);padding:32px;text-align:center;cursor:pointer;transition:all var(--tr);}
.upload-zone:hover,.upload-zone.drag{border-color:var(--accent);background:rgba(232,160,32,.05);}
.upload-zone input{display:none;}

/* ── DIÁRIO ── */
.diary-item{padding:14px;border-left:3px solid var(--border);margin-bottom:12px;background:var(--surface2);border-radius:0 var(--r-md) var(--r-md) 0;position:relative;}
.diary-item.importante{border-left-color:var(--accent4);}
.diary-item.info{border-left-color:var(--accent2);}
.diary-item.progresso{border-left-color:var(--accent3);}
.diary-meta{font-size:10px;color:var(--text3);margin-bottom:6px;font-family:'IBM Plex Mono',monospace;display:flex;gap:12px;}
.diary-text{font-size:13px;color:var(--text2);line-height:1.6;}
.diary-del{position:absolute;top:10px;right:10px;background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:13px;opacity:0;transition:opacity var(--tr);}
.diary-item:hover .diary-del{opacity:1;}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;right:24px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-md);padding:12px 16px;font-size:13px;z-index:9999;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow);transform:translateY(80px);opacity:0;transition:all .3s ease;max-width:320px;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.ok{border-color:rgba(16,185,129,.4);}
.toast.err{border-color:rgba(244,63,94,.4);}

/* ── ALERTS ── */
.alert{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border-radius:var(--r-md);margin-bottom:14px;font-size:12px;}
.alert-warn{background:rgba(232,160,32,.08);border:1px solid rgba(232,160,32,.25);color:var(--accent);}
.alert-danger{background:rgba(244,63,94,.08);border:1px solid rgba(244,63,94,.25);color:var(--accent4);}
.alert-info{background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.25);color:var(--accent2);}

/* ── ÁREA CLIENTE ── */
.hero{background:linear-gradient(135deg,var(--surface2),var(--surface3));border:1px solid var(--border);border-radius:var(--r-xl);padding:28px;margin-bottom:20px;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;background:radial-gradient(circle,rgba(232,160,32,.12),transparent);border-radius:50%;}
.chart-wrap{height:260px;position:relative;}

/* ── PAGE HEADER ── */
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;padding-bottom:18px;border-bottom:1px solid var(--border);}
.ph-title h1{font-family:'Syne',sans-serif;font-size:22px;margin-bottom:3px;}
.ph-sub{color:var(--text2);font-size:12px;}

/* ── SLIDER ── */
.slider-wrap{display:flex;align-items:center;gap:8px;}
input[type=range]{flex:1;-webkit-appearance:none;height:4px;background:var(--surface3);border-radius:2px;outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent);cursor:pointer;}

/* ── RESPONSIVO ── */
@media(max-width:1024px){.layout{grid-template-columns:1fr}.sidebar{display:none}.grid-4{grid-template-columns:repeat(2,1fr)}}
@media(max-width:768px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr}.form-row,.form-row-3{grid-template-columns:1fr}.gantt-head,.gantt-row{grid-template-columns:160px 1fr}.gc:not(:first-child):not(:last-child){display:none}}

/* UTILS */
.mono{font-family:'IBM Plex Mono',monospace;}
.mb-3{margin-bottom:12px;} .mb-4{margin-bottom:16px;} .mt-4{margin-top:16px;}
.flex{display:flex;} .gap-2{gap:8px;} .gap-3{gap:12px;}
.items-center{align-items:center;} .justify-between{justify-content:space-between;}
.text-right{text-align:right;} .text-muted{color:var(--text3);}
.divider{height:1px;background:var(--border);margin:16px 0;}
</style>
</head>

<div id="toast" class="toast"></div>

<!-- APP -->
<div id="app"></div>

// ══════════════════════════════════════════════
// CPM
// ══════════════════════════════════════════════
function calcCPM() {
  if (S.cpmCache) return S.cpmCache;
  const ts = S.dados.tarefas.map(t => ({...t}));
  const n  = ts.length;
  const ix = {};
  ts.forEach((t,i) => { ix[t.id]=i; t.es=0;t.ef=0;t.ls=0;t.lf=0;t.folga=0;t.critico=false;t.pimap=[]; });
  ts.forEach(t => { t.preds.forEach(p => { if(ix[p.id]!==undefined) t.pimap.push({i:ix[p.id],t:p.t,lag:p.lag}); }); });

  // Kahn topological sort
  const grau = new Array(n).fill(0);
  const adj  = Array.from({length:n},()=>[]);
  ts.forEach((t,i) => t.pimap.forEach(p => { adj[p.i].push(i); grau[i]++; }));
  const q=[]; grau.forEach((g,i)=>{ if(g===0)q.push(i); });
  const ord=[]; while(q.length){ const v=q.shift(); ord.push(v); adj[v].forEach(w=>{ if(--grau[w]===0)q.push(w); }); }
  if(ord.length!==n) ts.forEach((_,i)=>ord.push(i)); // fallback

  // Forward
  ord.forEach(i => {
    const t=ts[i];
    if(!t.pimap.length){ t.es=0; t.ef=t.dur; return; }
    let mx=0;
    t.pimap.forEach(p => {
      const pr=ts[p.i]; let c=0;
      if(p.t==='SS') c=pr.es+p.lag;
      else if(p.t==='FF') c=pr.ef+p.lag-t.dur;
      else if(p.t==='SF') c=pr.es+p.lag-t.dur;
      else c=pr.ef+p.lag;
      mx=Math.max(mx,c);
    });
    t.es=Math.max(0,mx); t.ef=t.es+t.dur;
  });

  const dur = Math.max(...ts.map(t=>t.ef));

  // Backward
  [...ord].reverse().forEach(i => {
    const t=ts[i];
    const sucs=[];
    ts.forEach(t2=>t2.pimap.forEach(p=>{ if(p.i===i) sucs.push({t:t2,p}); }));
    if(!sucs.length){ t.lf=dur; t.ls=t.lf-t.dur; return; }
    let mn=dur;
    sucs.forEach(({t:s,p}) => {
      let c=0;
      if(p.t==='SS') c=s.ls-p.lag+t.dur;
      else if(p.t==='FF') c=s.lf-p.lag;
      else if(p.t==='SF') c=s.ef-p.lag+t.dur;
      else c=s.ls-p.lag;
      mn=Math.min(mn,c);
    });
    t.lf=mn; t.ls=t.lf-t.dur;
  });

  ts.forEach(t=>{ t.folga=Math.round((t.ls-t.es)*10)/10; t.critico=t.folga<=0; });
  S.cpmCache = { ts, dur, fim: addDias(S.dados.projeto.dataInicio, dur) };
  return S.cpmCache;
}

// ══════════════════════════════════════════════
// EVM
// ══════════════════════════════════════════════
function calcEVM() {
  const {ts,dur} = calcCPM();
  const hoje  = new Date();
  const ini   = parseD(S.dados.projeto.dataInicio);
  const dias  = Math.max(0, Math.floor((hoje-ini)/86400000));
  const BAC   = S.dados.projeto.orcamentoTotal;
  let EV=0, PV=0;
  ts.forEach(t => {
    const v=t.custo||0;
    if(dias>=t.es) PV+=v*Math.min(1,(dias-t.es)/t.dur);
    EV+=v*(t.prog/100);
  });
  const AC  = S.dados.financeiro.saidas.reduce((a,s)=>a+s.valor,0);
  const SV  = EV-PV, CV=EV-AC;
  const SPI = PV>0?EV/PV:1, CPI=AC>0?EV/AC:1;
  const EAC = CPI>0?BAC/CPI:BAC, ETC=EAC-AC, VAC=BAC-EAC;
  const dRest = Math.max(0,dur-dias);
  const dProj = SPI>0?dRest/SPI:dRest;
  return {BAC,EV,PV,AC,SV,CV,SPI,CPI,EAC,ETC,VAC,dias,
    pConc:(EV/BAC)*100, pPlan:(PV/BAC)*100, pGasto:(AC/BAC)*100,
    dataProj: addDias(isoHoje(), Math.round(dProj))};
}

// ══════════════════════════════════════════════
// FINANCEIRO
// ══════════════════════════════════════════════
function calcFluxo() {
  const {entradas,saidas}=S.dados.financeiro;
  const m={};
  [...entradas,...saidas].forEach(i=>{
    const k=i.data.substring(0,7);
    if(!m[k]) m[k]={e:0,s:0};
    if(i.cat&&entradas.includes(i)) m[k].e+=i.valor; else m[k].s+=i.valor;
  });
  // Detectar entrada vs saida por presença no array
  const mF={};
  entradas.forEach(i=>{ const k=i.data.substring(0,7); if(!mF[k])mF[k]={e:0,s:0}; mF[k].e+=i.valor; });
  saidas.forEach(i=>{   const k=i.data.substring(0,7); if(!mF[k])mF[k]={e:0,s:0}; mF[k].s+=i.valor; });
  let ac=0;
  const fluxo=Object.keys(mF).sort().map(k=>{
    ac+=mF[k].e-mF[k].s;
    return {mes:fmtMes(k),e:mF[k].e,s:mF[k].s,saldo:ac};
  });
  const tE=entradas.reduce((a,i)=>a+i.valor,0);
  const tS=saidas.reduce((a,i)=>a+i.valor,0);
  return {fluxo,tE,tS,saldo:tE-tS,aReceber:S.dados.projeto.orcamentoTotal-tE};
}

// ══════════════════════════════════════════════
// UTILITÁRIOS
// ══════════════════════════════════════════════
function parseD(s){ return new Date(s+'T00:00:00'); }
function isoHoje(){ const d=new Date(); return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`; }
function p2(n){ return String(n).padStart(2,'0'); }
function addDias(s,n){ const d=parseD(s); d.setDate(d.getDate()+Math.round(n)); return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`; }
function fmtD(s){ if(!s)return''; const d=parseD(s); return `${p2(d.getDate())}/${p2(d.getMonth()+1)}/${d.getFullYear()}`; }
function fmtMes(ym){ const [a,m]=ym.split('-'); const ns=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez']; return `${ns[+m-1]}/${a}`; }
function fmtR(v){ return new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v||0); }
function fmtP(v){ return `${(v||0).toFixed(1)}%`; }
function diasAte(s){ return Math.ceil((parseD(s)-new Date())/86400000); }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

function toast(msg,tipo='ok'){
  const el=document.getElementById('toast');
  el.className=`toast ${tipo}`;
  el.innerHTML=`<span>${tipo==='ok'?'✓':'✕'}</span> ${msg}`;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),3000);
}

function renderTarefas(){
  const ts=S.dados.tarefas;
  return `<div class="ph">
    <div class="ph-title"><h1>Tarefas</h1><p class="ph-sub">Adicionar, editar, excluir e atualizar progresso</p></div>
    <button class="btn btn-primary" onclick="novaT()">+ Nova Tarefa</button>
  </div>
  <div class="tbl-wrap"><table>
    <thead><tr><th>ID</th><th>Tarefa</th><th>Grupo</th><th>Dur.</th><th>Custo</th><th>Predecessoras</th><th style="width:200px">Progresso</th><th>Ações</th></tr></thead>
    <tbody id="tTbody">
      ${ts.map(t=>`<tr id="tr_${t.id}">
        <td class="mono" style="color:var(--text3)">${t.id}</td>
        <td><strong style="color:var(--text)">${t.nome}</strong></td>
        <td><span class="badge badge-info">${t.grupo}</span></td>
        <td class="mono">${t.dur}d</td>
        <td class="mono">${fmtR(t.custo)}</td>
        <td style="font-size:11px;color:var(--text3)">${t.preds.map(p=>`${p.id}(${p.t})`).join(', ')||'—'}</td>
        <td>
          <div class="flex items-center gap-2">
            <input type="range" min="0" max="100" value="${t.prog}" style="flex:1;min-width:80px"
              oninput="updProg('${t.id}',this.value)" onchange="updProg('${t.id}',this.value)">
            <input type="number" class="prog-input" min="0" max="100" value="${t.prog}"
              onchange="updProg('${t.id}',this.value)">
          </div>
        </td>
        <td>
          <div class="flex gap-2">
            <button class="btn btn-secondary btn-xs" onclick="editarT('${t.id}')">✏️</button>
            <button class="btn btn-danger btn-xs" onclick="excluirT('${t.id}')">🗑️</button>
          </div>
        </td>
      </tr>`).join('')}
    </tbody>
  </table></div>`;
}

function updProg(id, val){
  const pct = Math.min(100, Math.max(0, Math.round(+val)));
  const t = S.dados.tarefas.find(t=>t.id===id);
  if(!t) return;
  t.prog = pct;
  S.cpmCache=null;
  salvar();
  // Atualizar só a linha sem re-render
  const row=document.getElementById(`tr_${id}`);
  if(row){
    const inputs=row.querySelectorAll('input');
    inputs[0].value=pct; inputs[1].value=pct;
  }
}

function novaT(){
  modal('Nova Tarefa', formTarefa(null), true);
}
function editarT(id){
  const t=S.dados.tarefas.find(t=>t.id===id);
  modal('Editar Tarefa', formTarefa(t));
}
function formTarefa(t){
  const ids=S.dados.tarefas.map(tt=>tt.id).filter(i=>!t||i!==t.id);
  const predsStr=t?t.preds.map(p=>`${p.id}:${p.t}:${p.lag}`).join(','):'';
  return `
    <div class="form-row">
      <div class="form-group"><label class="form-label">ID da Tarefa</label><input id="tId" class="form-input" value="${t?t.id:''}" placeholder="Ex: T24"></div>
      <div class="form-group"><label class="form-label">Grupo</label>
        <select id="tGrupo" class="form-select">${CFG.GRUPOS_TAREFA.map(g=>`<option ${t&&t.grupo===g?'selected':''}>${g}</option>`).join('')}</select>
      </div>
    </div>
    <div class="form-group"><label class="form-label">Nome da Tarefa</label><input id="tNome" class="form-input" value="${t?t.nome:''}" placeholder="Ex: Impermeabilização"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Duração (dias)</label><input id="tDur" type="number" class="form-input" value="${t?t.dur:1}" min="1"></div>
      <div class="form-group"><label class="form-label">Custo (R$)</label><input id="tCusto" type="number" class="form-input" value="${t?t.custo:0}" step="0.01"></div>
    </div>
    <div class="form-group"><label class="form-label">Progresso atual (%)</label>
      <div class="slider-wrap"><input type="range" id="tProgSlider" min="0" max="100" value="${t?t.prog:0}" oninput="document.getElementById('tProg').value=this.value">
      <input type="number" id="tProg" class="prog-input" min="0" max="100" value="${t?t.prog:0}" oninput="document.getElementById('tProgSlider').value=this.value"></div>
    </div>
    <div class="form-group">
      <label class="form-label">Predecessoras (formato: ID:TIPO:LAG, separadas por vírgula)</label>
      <input id="tPreds" class="form-input" value="${predsStr}" placeholder="Ex: T1:FS:0, T3:SS:2">
      <div style="font-size:10px;color:var(--text3);margin-top:4px">Tipos: FS, SS, FF, SF | IDs disponíveis: ${ids.join(', ')}</div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-primary" style="flex:1" onclick="salvarT('${t?t.id:''}')">💾 Salvar</button>
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
    </div>`;
}
function salvarT(idAntigo){
  const id=v('tId').trim().toUpperCase();
  const nome=v('tNome').trim();
  const grupo=v('tGrupo');
  const dur=+v('tDur');
  const custo=+v('tCusto');
  const prog=Math.min(100,Math.max(0,+v('tProg')));
  if(!id||!nome||dur<1){ toast('Preencha ID, nome e duração.','err'); return; }
  if(!idAntigo&&S.dados.tarefas.find(t=>t.id===id)){ toast('ID já existe!','err'); return; }

  const predsRaw=v('tPreds').trim();
  const preds=predsRaw?predsRaw.split(',').map(s=>{
    const [pid,pt='FS',plag='0']=s.trim().split(':');
    return {id:pid.trim().toUpperCase(),t:pt.trim().toUpperCase(),lag:+plag||0};
  }).filter(p=>p.id):[];

  if(idAntigo){
    const idx=S.dados.tarefas.findIndex(t=>t.id===idAntigo);
    if(idx>=0) S.dados.tarefas[idx]={id,nome,grupo,dur,custo,preds,prog};
  } else {
    S.dados.tarefas.push({id,nome,grupo,dur,custo,preds,prog});
  }
  S.cpmCache=null; salvar(); closeModal(); toast('Tarefa salva!'); nav('tarefas');
}
function excluirT(id){
  if(!confirm(`Excluir a tarefa ${id}?`)) return;
  S.dados.tarefas=S.dados.tarefas.filter(t=>t.id!==id);
  // Remover referências como predecessora
  S.dados.tarefas.forEach(t=>{ t.preds=t.preds.filter(p=>p.id!==id); });
  S.cpmCache=null; salvar(); toast('Tarefa excluída.'); nav('tarefas');
}

function renderCronograma(){

    <div class="flex gap-2"><span class="badge badge-ok">Folga &gt; 0</span><span class="badge badge-danger">Crítico</span></div>
  </div>
  <div class="card mb-4">
    <div class="grid-4">
      <div><div class="metric-label">Início</div><div style="font-weight:600">${fmtD(S.dados.projeto.dataInicio)}</div></div>
      <div><div class="metric-label">Término Previsto</div><div style="font-weight:600;color:var(--accent3)">${fmtD(cpm.fim)}</div></div>
      <div><div class="metric-label">Duração Total</div><div style="font-weight:600">${cpm.dur} dias</div></div>
      <div><div class="metric-label">Tarefas Críticas</div><div style="font-weight:600;color:var(--accent4)">${cpm.ts.filter(t=>t.critico).length} / ${cpm.ts.length}</div></div>
    </div>
  </div>
  <div class="gantt-wrap">
    <div class="gantt-head">
      <div class="gc">Tarefa</div><div class="gc">ES</div><div class="gc">EF</div>
      <div class="gc">Folga</div><div class="gc">Custo</div>
      <div class="gc" style="flex:1">Timeline (${cpm.dur}d)</div>
      <div class="gc">%</div>
    </div>
    ${cpm.ts.map(t=>{
      const cor=CFG.CORES_GRUPOS[t.grupo]||'#888';
      const l=t.es*esc, w=Math.max(t.dur*esc,0.5);
      return `<div class="gantt-row ${t.critico?'crit':''}">
        <div class="gc"><div><div class="task-name">${t.nome}</div><div class="task-sub">${t.grupo}</div></div></div>
        <div class="gc mono" style="font-size:11px">${t.es}</div>
        <div class="gc mono" style="font-size:11px">${t.ef}</div>
        <div class="gc">${t.critico?'<span class="badge badge-danger">0d</span>':`<span style="color:var(--accent3);font-size:12px">${t.folga}d</span>`}</div>
        <div class="gc mono" style="font-size:10px">${fmtR(t.custo)}</div>
        <div class="gc" style="padding:0;position:relative">
          <div class="bar-area" style="width:100%">
            ${todayLine(cpm.dur)}
            <div class="gantt-bar ${t.critico?'crit':''}" style="left:${l}%;width:${w}%;background:${cor}22" title="${t.nome}: D${t.es}→D${t.ef} | ${t.prog}%">
              <div class="bar-fill" style="width:${t.prog}%;background:${cor}"></div>
            </div>
          </div>
        </div>
        <div class="gc mono" style="font-size:11px">${t.prog}%</div>
      </div>`;
    }).join('')}
  </div>`;
}

function todayLine(dur){
  const d=Math.floor((new Date()-parseD(S.dados.projeto.dataInicio))/86400000);
  if(d<0||d>dur) return '';
  return `<div class="today-line" style="left:${(d/dur)*100}%" title="Hoje — Dia ${d}"></div>`;
}

function lancItem(i, tipo){
  return `<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)">
    <div>
      <div style="font-size:13px;color:var(--text);font-weight:500">${i.desc}</div>
      <div style="font-size:11px;color:var(--text3)">${fmtD(i.data)} · ${i.cat}${i.nf?` · NF ${i.nf}`:''}</div>
    </div>
    <div class="flex items-center gap-2">
      <span class="mono" style="font-size:13px;font-weight:600;color:${tipo==='entrada'?'var(--accent3)':'var(--accent4)'}">${tipo==='entrada'?'+':'-'}${fmtR(i.valor)}</span>
      <button class="btn btn-secondary btn-xs" onclick="editarLanc('${tipo}','${i.id}')">✏️</button>
      <button class="btn btn-danger btn-xs"    onclick="excluirLanc('${tipo}','${i.id}')">🗑️</button>
    </div>
  </div>`;
}

function novoLanc(tipo){
  modal((tipo==='entrada'?'Nova Receita':'Nova Despesa'), formLanc(tipo, null));
}
function editarLanc(tipo, id){
  const arr=tipo==='entrada'?S.dados.financeiro.entradas:S.dados.financeiro.saidas;
  const item=arr.find(i=>i.id===id);
  modal((tipo==='entrada'?'Editar Receita':'Editar Despesa'), formLanc(tipo, item));
}
function formLanc(tipo, i){
  const cats=tipo==='entrada'?CFG.CATEGORIAS_ENTRADA:CFG.CATEGORIAS_SAIDA;
  return `
    <input type="hidden" id="lTipo" value="${tipo}">
    <input type="hidden" id="lId"   value="${i?i.id:''}">
    <div class="form-group"><label class="form-label">Descrição</label><input id="lDesc" class="form-input" value="${i?i.desc:''}" placeholder="Ex: Material hidráulico"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Valor (R$)</label><input id="lValor" type="number" class="form-input" value="${i?i.valor:''}" step="0.01" min="0"></div>
      <div class="form-group"><label class="form-label">Data</label><input id="lData" type="date" class="form-input" value="${i?i.data:isoHoje()}"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Categoria</label>
        <select id="lCat" class="form-select">${cats.map(c=>`<option ${i&&i.cat===c?'selected':''}>${c}</option>`).join('')}</select>
      </div>
      <div class="form-group"><label class="form-label">Nota Fiscal (opcional)</label><input id="lNF" class="form-input" value="${i&&i.nf?i.nf:''}" placeholder="Nº da NF"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-primary" style="flex:1" onclick="salvarLanc()">💾 Salvar</button>
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
    </div>`;
}
function salvarLanc(){
  const tipo=v('lTipo'), id=v('lId');
  const desc=v('lDesc').trim(), valor=+v('lValor'), data=v('lData'), cat=v('lCat'), nf=v('lNF').trim();
  if(!desc||!valor||!data){ toast('Preencha descrição, valor e data.','err'); return; }
  const item={id:id||uid(),data,desc,valor,cat};
  if(nf) item.nf=nf;
  const arr=tipo==='entrada'?S.dados.financeiro.entradas:S.dados.financeiro.saidas;
  const idx=arr.findIndex(i=>i.id===id);
  if(idx>=0) arr[idx]=item; else arr.push(item);
  salvar(); closeModal(); toast('Lançamento salvo!'); nav('financeiro');
}
function excluirLanc(tipo,id){
  if(!confirm('Excluir este lançamento?')) return;
  if(tipo==='entrada') S.dados.financeiro.entradas=S.dados.financeiro.entradas.filter(i=>i.id!==id);
  else                 S.dados.financeiro.saidas  =S.dados.financeiro.saidas.filter(i=>i.id!==id);
  salvar(); toast('Lançamento excluído.'); nav('financeiro');
}

// Buffer para fotos em processo de upload
let _fotosBuffer = [];

function handleFiles(files){
  _fotosBuffer = [];
  const prev = document.getElementById('previewArea');
  const meta = document.getElementById('metaArea');
  if(!files.length) return;
  prev.innerHTML = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;margin-bottom:12px"></div>';
  const grid = prev.querySelector('div');
  let loaded = 0;
  Array.from(files).forEach((file, idx) => {
    const reader = new FileReader();
    reader.onload = e => {
      _fotosBuffer.push({ idx, src: e.target.result, name: file.name });
      const img = document.createElement('div');
      img.style.cssText = 'border-radius:6px;overflow:hidden;border:1px solid var(--border)';
      img.innerHTML = `<img src="${e.target.result}" style="width:100%;height:80px;object-fit:cover">`;
      grid.appendChild(img);
      if(++loaded === files.length) meta.style.display = 'block';
    };
    reader.readAsDataURL(file);
  });
}

function salvarFotos(){
  if(!_fotosBuffer.length){ toast('Selecione ao menos uma foto.','err'); return; }
  const leg = v('fLegenda').trim()||'Foto da obra';
  const data = v('fData')||isoHoje();
  const etapa = v('fEtapa');
  _fotosBuffer.forEach(f => {
    S.dados.galeria.push({ id:uid(), src:f.src, legenda:leg, data, etapa, nome:f.name });
  });
  _fotosBuffer = [];
  salvar(); closeModal(); toast(`${S.dados.galeria.length>1?'Fotos adicionadas':'Foto adicionada'}!`); nav('galeria');
}

function excluirFoto(id){
  if(!confirm('Excluir esta foto?')) return;

function renderCharts(){
  if(!window.Chart){ setTimeout(renderCharts,500); return; }
  renderCurvaS(); renderFluxoChart();
}

function renderCurvaS(){
  const c=document.getElementById('curvaS');
  if(!c) return;
  if(c._ch) c._ch.destroy();
  const {ts,dur}=calcCPM(), BAC=S.dados.projeto.orcamentoTotal;
  const ini=parseD(S.dados.projeto.dataInicio);
  const dAtual=Math.min(Math.max(0,Math.floor((new Date()-ini)/86400000)),dur);
  const labels=[],pvA=[],evA=[];
  for(let d=0;d<=dur;d++){
    labels.push(`D${d}`);
    let pv=0,ev=0;
    ts.forEach(t=>{ const vv=t.custo||0; if(d>=t.es) pv+=vv*Math.min(1,(d-t.es)/t.dur); ev+=vv*(t.prog/100); });
    pvA.push((pv/BAC)*100); evA.push((ev/BAC)*100);
  }
  c._ch=new Chart(c,{type:'line',data:{labels,datasets:[
    {label:'PV (Planejado)',data:pvA,borderColor:'#3b82f6',backgroundColor:'rgba(59,130,246,.06)',tension:.4,pointRadius:0,borderWidth:2},
    {label:'EV (Realizado)',data:evA,borderColor:'#e8a020',backgroundColor:'rgba(232,160,32,.08)',tension:.4,pointRadius:0,borderWidth:2,borderDash:[5,3]}
  ]},options:{responsive:true,maintainAspectRatio:false,
    plugins:{legend:{labels:{color:'#8892a4',font:{size:11}}}},
    scales:{x:{ticks:{color:'#4a5568',font:{size:9},maxTicksLimit:8},grid:{color:'rgba(45,51,68,.5)'}},
            y:{ticks:{color:'#4a5568',font:{size:9},callback:vv=>`${vv.toFixed(0)}%`},grid:{color:'rgba(45,51,68,.5)'},min:0,max:100}}}});
}

function renderFluxoChart(){
  const c=document.getElementById('fluxoChart');
  if(!c) return;
  if(c._ch) c._ch.destroy();
  const fl=calcFluxo();
  c._ch=new Chart(c,{type:'bar',data:{labels:fl.fluxo.map(f=>f.mes),datasets:[
    {label:'Entradas',data:fl.fluxo.map(f=>f.e),backgroundColor:'rgba(16,185,129,.6)',borderColor:'#10b981',borderWidth:1,borderRadius:4},
    {label:'Saídas',  data:fl.fluxo.map(f=>f.s),backgroundColor:'rgba(244,63,94,.6)', borderColor:'#f43f5e',borderWidth:1,borderRadius:4},
    {label:'Saldo',   data:fl.fluxo.map(f=>f.saldo),type:'line',borderColor:'#e8a020',backgroundColor:'rgba(232,160,32,.08)',tension:.4,pointRadius:4,yAxisID:'y2',borderWidth:2}
  ]},options:{responsive:true,maintainAspectRatio:false,
    plugins:{legend:{labels:{color:'#8892a4',font:{size:11}}}},
    scales:{x:{ticks:{color:'#4a5568',font:{size:10}},grid:{color:'rgba(45,51,68,.4)'}},
            y:{ticks:{color:'#4a5568',font:{size:9},callback:vv=>fmtR(vv)},grid:{color:'rgba(45,51,68,.4)'}},
            y2:{position:'right',ticks:{color:'#e8a020',font:{size:9},callback:vv=>fmtR(vv)},grid:{display:false}}}}});
}

// EXPORTAR XLSX
// ══════════════════════════════════════════════
function exportarXLSX(){
  if(typeof XLSX==='undefined'){ toast('Aguarde XLSX carregar.','err'); return; }
  const cpm=calcCPM(), evm=calcEVM(), fl=calcFluxo();
  const wb=XLSX.utils.book_new();
  const cronRows=[['ID','Tarefa','Grupo','ES','EF','Dur','Folga','Crítico','Prog%','Custo']];
  cpm.ts.forEach(t=>cronRows.push([t.id,t.nome,t.grupo,t.es,t.ef,t.dur,t.folga,t.critico?'SIM':'NÃO',t.prog,t.custo]));
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(cronRows),'Cronograma');
  const evmR=[['Métrica','Valor'],['BAC',evm.BAC],['PV',evm.PV],['EV',evm.EV],['AC',evm.AC],
    ['SV',evm.SV],['CV',evm.CV],['SPI',evm.SPI],['CPI',evm.CPI],['EAC',evm.EAC],['VAC',evm.VAC]];
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(evmR),'EVM');
  const finR=[['Tipo','Data','Descrição','Categoria','NF','Valor']];
  S.dados.financeiro.entradas.forEach(i=>finR.push(['ENTRADA',i.data,i.desc,i.cat,i.nf||'',i.valor]));
  S.dados.financeiro.saidas.forEach(i  =>finR.push(['SAÍDA',  i.data,i.desc,i.cat,i.nf||'',i.valor]));
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(finR),'Financeiro');
  XLSX.writeFile(wb,`TorreLiris_${isoHoje()}.xlsx`);
  toast('Relatório exportado!');
}
