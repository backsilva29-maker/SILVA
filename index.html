<style>
:root {
    --bg: #0d0f14;
    --surface: #13161e;
    --surface2: #1a1e2a;
    --border: #252a38;
    --accent: #e8a020;
    --accent2: #3b82f6;
    --accent3: #10b981;
    --accent4: #f43f5e;
    --text: #e8eaf0;
    --text2: #8892a4;
    --text3: #4a5468;
    --gantt-h: 44px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { 
    background: var(--bg); 
    color: var(--text); 
    font-family: 'Inter', sans-serif; 
    font-size: 13px; 
    min-height: 100vh; 
    overflow-x: hidden; 
}
.login-modal { 
    position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
    background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); 
    display: flex; justify-content: center; align-items: center; 
    z-index: 1000; 
}
.login-content { 
    background: var(--surface); border: 1px solid var(--border); 
    border-radius: 48px; padding: 40px; width: 90%; max-width: 380px; 
    text-align: center; 
}
.login-input { 
    width: 100%; padding: 16px; margin: 15px 0; 
    background: var(--bg); border: 1px solid var(--border); 
    border-radius: 40px; color: var(--text); font-size: 16px; 
    outline: none;
}
.login-btn { 
    width: 100%; padding: 16px; margin: 8px 0; border: none; 
    border-radius: 40px; font-size: 16px; font-weight: 600; cursor: pointer; 
}
.btn-admin { background: var(--accent); color: #000; }
.btn-client { background: var(--accent2); color: white; }
.topbar { 
    display: flex; align-items: center; justify-content: space-between; 
    padding: 0 24px; height: 56px; background: var(--surface); 
    border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; 
}
.logo { 
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: 17px; 
    display: flex; align-items: center; gap: 10px; 
}
.logo-badge { 
    width: 28px; height: 28px; background: var(--accent); border-radius: 6px; 
    display: flex; align-items: center; justify-content: center; 
    font-size: 13px; color: #000; font-weight: 800; 
}
.btn { 
    padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; 
    font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500; 
    transition: all .15s; display: inline-flex; align-items: center; gap: 6px; 
}
.btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text2); }
.btn-ghost:hover { border-color: var(--text2); color: var(--text); }
.btn-primary { background: var(--accent); color: #000; font-weight: 600; }
.btn-primary:hover { background: #f5ae30; }
.btn-danger { background: var(--accent4); color: white; }
.btn-success { background: var(--accent3); color: white; }
.layout { display: flex; height: calc(100vh - 56px); }
.sidebar { 
    width: 240px; min-width: 240px; background: var(--surface); 
    border-right: 1px solid var(--border); padding: 16px 0; overflow-y: auto; 
}
.sidebar-section { margin-bottom: 24px; }
.sidebar-label { 
    font-family: 'IBM Plex Mono', monospace; font-size: 9px; 
    letter-spacing: 1.5px; color: var(--text3); text-transform: uppercase; 
    padding: 0 16px; margin-bottom: 6px; 
}
.sidebar-item { 
    display: flex; align-items: center; gap: 10px; padding: 10px 16px; 
    color: var(--text2); cursor: pointer; border-left: 2px solid transparent; 
    transition: all 0.2s; 
}
.sidebar-item:hover { background: var(--surface2); color: var(--text); transform: translateX(4px); }
.sidebar-item.active { 
    color: var(--accent); border-left-color: var(--accent); 
    background: rgba(232,160,32,.06); 
}
.main { flex: 1; overflow: auto; padding: 20px 24px; }
.page-header { 
    display: flex; align-items: center; justify-content: space-between; 
    margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border); 
}
.page-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 22px; }
.page-sub { color: var(--text2); font-size: 12px; margin-top: 4px; }
.save-bar { 
    background: var(--surface2); border: 1px solid var(--border); 
    border-radius: 10px; padding: 12px 16px; margin-bottom: 20px; 
    display: flex; align-items: center; justify-content: space-between; 
}
.save-status { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text2); }
.save-indicator { width: 8px; height: 8px; border-radius: 50%; background: var(--text3); }
.save-indicator.saved { background: var(--accent3); }
.save-indicator.pending { background: var(--accent); animation: pulse 1s infinite; }

    border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 20px; 
}

.client-data-item { display: flex; flex-direction: column; gap: 6px; }
.client-data-label {

}
.client-data-value { font-size: 14px; color: var(--text); font-weight: 500; }
.client-data-input { 
    background: var(--bg); border: 1px solid var(--border); border-radius: 6px; 
    padding: 8px 12px; color: var(--text); font-size: 13px; width: 100%; 
    outline: none;
}
.client-data-input:focus { border-color: var(--accent); }

/* DATA PICKER */
.data-picker-box {
    background: var(--bg);
    border: 1px solid var(--accent);
    border-radius: 12px;
    padding: 16px 20px;
    display: flex;
    align-items: flex-end;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 4px;
}
.data-part {
    display: flex;
    flex-direction: column;
    gap: 5px;
    align-items: center;
}
.data-part label {
    font-size: 9px;
    color: var(--text3);
    text-transform: uppercase;
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 1px;
}
.data-part input {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 8px;
    color: var(--text);
    font-size: 22px;
    font-weight: 700;
    font-family: 'Syne', sans-serif;
    text-align: center;
    outline: none;
    transition: border-color .15s;
}
.data-part input:focus { border-color: var(--accent); }
.data-sep {
    font-size: 24px;
    color: var(--text3);
    padding-bottom: 10px;
    user-select: none;
}
.data-preview {
    margin-left: 12px;
    padding-bottom: 10px;
    font-size: 12px;
    color: var(--accent);
    display: flex;
    flex-direction: column;
    gap: 3px;
}

.gantt-wrap { 
    border: 1px solid var(--border); border-radius: 10px; overflow: hidden; 
    background: var(--surface); margin-bottom: 20px; 
}
.gantt-header { 
    display: grid; grid-template-columns: 280px 100px 100px 80px 100px 1fr; 
    background: var(--surface2); border-bottom: 1px solid var(--border); 
    font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text3); 
    text-transform: uppercase; 
}
.gh-cell { padding: 12px; border-right: 1px solid var(--border); }
.gantt-group { border-bottom: 1px solid var(--border); }
.gantt-group-header { 
    display: grid; grid-template-columns: 280px 100px 100px 80px 100px 1fr; 
    background: rgba(232,160,32,.08); cursor: pointer; padding: 12px; align-items: center; 
}
.gantt-row { 
    display: grid; grid-template-columns: 280px 100px 100px 80px 100px 1fr; 
    border-bottom: 1px solid rgba(37,42,56,.6); align-items: center; 
}
.gantt-row:hover { background: var(--surface2); }
.gc { 
    padding: 0 12px; height: var(--gantt-h); display: flex; align-items: center; 
    border-right: 1px solid var(--border); font-size: 12px; 
}
.gc-name { font-weight: 500; }
.gc-edit { 
    background: transparent; border: 1px solid var(--border); border-radius: 4px; 
    padding: 4px 8px; color: var(--text); font-size: 11px; width: 100%; 
    outline: none;
}
.gc-edit:focus { border-color: var(--accent); }
.dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 8px; flex-shrink:0; }
.bar-area { position: relative; height: var(--gantt-h); min-width: 100%; overflow-x: auto; }
.gantt-bar { 
    position: absolute; top: 50%; transform: translateY(-50%); height: 20px; 
    border-radius: 5px; display: flex; align-items: center; overflow: hidden; 
    cursor: pointer; transition: all 0.3s; 
}
.gantt-bar:hover { transform: translateY(-50%) scale(1.02); }
.gantt-bar-fill { 
    height: 100%; border-radius: 5px 0 0 5px; opacity: .95; 
    transition: width 0.5s ease-out; 
}
.today-line { 
    position: absolute; top: 0; bottom: 0; width: 2px; background: var(--accent4); 
    opacity: .7; z-index: 5; 
}
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
@keyframes slideInLeft { 
    from { opacity: 0; transform: translateX(-20px); } 
    to { opacity: 1; transform: translateX(0); } 
}
.animated-progress { position: relative; overflow: hidden; }
.animated-progress::after {
    content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
    animation: shimmer 2s infinite;
}
@keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
.crud-container { display: grid; gap: 12px; }
.crud-card { 
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px; 
    padding: 16px; display: grid; grid-template-columns: 1fr 100px 100px 120px;

.crud-card-header { 
    background: var(--surface2); font-weight: 600; font-size: 11px; color: var(--text3);

.crud-input:focus { border-color: var(--accent); }
.photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }

.photo-card:hover { transform: translateY(-4px); }
.photo-card img { width: 100%; aspect-ratio: 4/3; object-fit: cover; }
.photo-card-info { padding: 12px; }
.photo-card-ambiente { font-size: 11px; color: var(--accent); text-transform: uppercase; margin-bottom: 4px; }
.photo-card-data { font-size: 10px; color: var(--text3); }
.stats-row { 
    display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
    gap: 16px; margin-bottom: 20px; 
}
.stat-card { 
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;

}
.stat-card:hover { transform: translateY(-4px); }
.stat-label {

}
.stat-value { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 22px; }
.stat-bar-bg { height: 4px; background: var(--border); border-radius: 2px; margin-top: 10px; overflow: hidden; }
.stat-bar-fill { height: 100%; background: var(--accent3); border-radius: 2px; transition: width 0.5s ease-out; }
.modal { 
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
    background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 1000; 
    align-items: center; justify-content: center; 
}
.modal.open { display: flex; }
.modal-content { 
    background: var(--surface); border: 1px solid var(--border); border-radius: 24px; 
    padding: 30px; width: 90%; max-width: 500px; 
}
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.modal-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 18px; }
.modal-close { background: none; border: none; color: var(--text2); font-size: 24px; cursor: pointer; }
.modal-close:hover { color: var(--text); }
.notification { 
    position: fixed; bottom: 20px; right: 20px; background: var(--surface); 
    border: 1px solid var(--border); border-radius: 10px; padding: 14px 20px; 
    display: flex; align-items: center; gap: 12px; z-index: 999; 
    transform: translateY(100px); opacity: 0; transition: all 0.3s; 
}
.notification.show { transform: translateY(0); opacity: 1; }
.notification.success { border-color: var(--accent3); }
.ambientes-tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
.ambiente-tab { 
    padding: 8px 16px; background: var(--surface); border: 1px solid var(--border); 
    border-radius: 20px; cursor: pointer; font-size: 12px; color: var(--text2); 
}
.ambiente-tab.active { background: var(--accent); color: #000; border-color: var(--accent); }
.client-timeline { 
    position: relative; padding-left: 30px; border-left: 3px solid var(--border); 
    margin: 30px 0; 
}
.client-item { 
    position: relative; padding-left: 20px; margin-bottom: 25px; 
    opacity: 0; animation: slideInLeft 0.5s ease forwards; 
    transition: all 0.3s ease; 
}
.client-item:hover { 
    transform: translateX(10px); background: var(--surface); 
    border-radius: 12px; padding: 15px; margin-left: -15px; 
}
.client-item::before { 
    content: ''; position: absolute; left: -26px; top: 5px; 
    width: 12px; height: 12px; border-radius: 50%; background: var(--border); 
    transition: all 0.3s; 
}
.client-item.done::before { background: var(--accent3); }
.client-item.active::before { background: var(--accent); animation: pulse 1.5s infinite; }
.client-item:nth-child(1) { animation-delay: 0.1s; }
.client-item:nth-child(2) { animation-delay: 0.2s; }
.client-item:nth-child(3) { animation-delay: 0.3s; }
.client-item:nth-child(4) { animation-delay: 0.4s; }
.client-item:nth-child(5) { animation-delay: 0.5s; }
.client-item:nth-child(6) { animation-delay: 0.6s; }
.client-item:nth-child(7) { animation-delay: 0.7s; }
.client-item:nth-child(8) { animation-delay: 0.8s; }
.client-status { 
    font-size: 11px; padding: 4px 8px; border-radius: 4px; 
    display: inline-block; margin-top: 5px; 
}
.status-pendente { background: rgba(74,84,104,0.1); color: var(--text2); }
.status-em-andamento { background: rgba(232,160,32,0.1); color: var(--accent); }
.status-concluido { background: rgba(16,185,129,0.1); color: var(--accent3); }
/* botões inline do gantt */
.btn-crud {
    height: 22px; padding: 0 7px; border-radius: 4px; border: none;
    cursor: pointer; font-size: 10px; font-weight: 600;
    font-family: 'Inter', sans-serif;
    display: inline-flex; align-items: center; justify-content: center;

.btn-crud-del { background: rgba(244,63,94,.2); color: #fb7185; border: 1px solid rgba(244,63,94,.3); }
.btn-crud-del:hover { background: rgba(244,63,94,.4); }
.btn-crud-edit { background: rgba(59,130,246,.2); color: #60a5fa; border: 1px solid rgba(59,130,246,.3); }
.btn-crud-edit:hover { background: rgba(59,130,246,.4); }
</style>

<script>

const GEMINI_KEY = "AIzaSyAWsj-jQp-xEa2A67q4lrr1oQHxMNqCCtA";
const GEMINI_URL = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=";

async function consultarGemini(prompt) {
    if (!GEMINI_KEY || GEMINI_KEY === "cole_sua_chave_aqui") {
        return "Chave da IA nao configurada. Abra o arquivo HTML, localize GEMINI_KEY e cole sua chave.";
    }
    try {
        const resp = await fetch(GEMINI_URL + GEMINI_KEY, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                contents: [{ parts: [{ text: prompt }] }],
                generationConfig: { temperature: 0.7, maxOutputTokens: 1500 }
            })
        });
        const data = await resp.json();
        if (data.error) return "Erro da IA: " + data.error.message;
        return data.candidates?.[0]?.content?.parts?.[0]?.text || "Sem resposta.";
    } catch(e) {
        return "Erro de conexao com a IA: " + e.message;
    }
}

        ).join("\n");
        return "  " + g.nome + " (" + p + "% concluido, inicio S" + g.inicio + ", duracao " + g.duracao + " sem.):\n" + tarefas;
    }).join("\n");

        { id: 'o2', grupo: 'Serviços Preliminares', descricao: 'Administração da Obra', valor: 38139.75 }
    ],

// ==================== FUNÇÕES DE DATA ====================
// ► CORREÇÃO PRINCIPAL: parse local para evitar bug de fuso UTC (problema que
//   fazia a data aparecer 1 dia antes — ex: 09/03 virava 08/03)
function getDataInicio() {
    const p = dados.dataInicio.split('-');
    return new Date(parseInt(p[0]), parseInt(p[1]) - 1, parseInt(p[2]));
}

function fmtData(d) {
    return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' });
}

function fmtSemana(s) {
    const d = new Date(getDataInicio().getTime() + s * 7 * 24 * 3600 * 1000);
    return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });
}

function calcularPrevisao() {
    const end = new Date(getDataInicio().getTime() + (dados.duracaoTotal || 20) * 7 * 24 * 3600 * 1000);
    return end.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' });
}

function getSemanaAtual() {
    return Math.round((new Date() - getDataInicio()) / (7 * 24 * 3600 * 1000));
}

// ► Extrai partes da data armazenada (sem depender de Date para evitar bugs)
function getPartes() {
    const p = dados.dataInicio.split('-');
    return { ano: p[0], mes: p[1], dia: p[2] };
}

// ==================== FUNÇÕES DE PROGRESSO ====================
function calcularProgressoGrupo(g) {
    if (!g.tarefas || g.tarefas.length === 0) return 0;
    return Math.round(g.tarefas.reduce((acc, t) => acc + (t.progresso || 0), 0) / g.tarefas.length);
}
function calcularProgressoGeral() {
    let total = 0, soma = 0;
    dados.grupos.forEach(g => g.tarefas.forEach(t => { total++; soma += t.progresso || 0; }));
    return total > 0 ? Math.round(soma / total) : 0;
}

// ==================== ATUALIZAÇÃO DE DATA ====================
// ► Esta é a função MANDANTE — chamada pelos campos DIA/MÊS/ANO em
//   Dados do Cliente e propaga para Cronograma Admin + área do Cliente
function atualizarDataPartes() {
    const diaEl = document.getElementById('inputDia');
    const mesEl = document.getElementById('inputMes');
    const anoEl = document.getElementById('inputAno');
    if (!diaEl || !mesEl || !anoEl) return;

    let dia = parseInt(diaEl.value) || 9;
    let mes = parseInt(mesEl.value) || 3;
    let ano = parseInt(anoEl.value) || 2026;

    // Validação básica
    dia = Math.min(Math.max(dia, 1), 31);
    mes = Math.min(Math.max(mes, 1), 12);
    ano = Math.min(Math.max(ano, 2020), 2040);

    dados.dataInicio = String(ano) + '-' + String(mes).padStart(2, '0') + '-' + String(dia).padStart(2, '0');
    marcarAlterado();

    // Atualiza preview sem re-renderizar tudo
    const prev = document.getElementById('dataPreview');
    if (prev) {
        prev.innerHTML =
            '<span>📅 ' + fmtData(getDataInicio()) + '</span>' +
            '<span style="color:var(--text2)">Término: ' + calcularPrevisao() + '</span>';
    }
    // Atualiza legenda do cronograma se estiver visível
    const cronSub = document.getElementById('cronSub');
    if (cronSub) cronSub.textContent = dados.endereco + ' · Início: ' + fmtData(getDataInicio()) + ' · Término: ' + calcularPrevisao();

    mostrarNotificacao('Data atualizada: ' + fmtData(getDataInicio()), 'success');
}

// ── Garante que tarefas antigas (sem campo inicio) recebam um valor padrão ──
function normalizarTarefas() {
    dados.grupos.forEach(g => {
        let cursor = g.inicio; // acumula o início sequencial
        g.tarefas.forEach(t => {
            if (t.inicio === undefined || t.inicio === null) {
                t.inicio = cursor;
            }
            cursor = t.inicio + (t.duracao || 1);
        });
    });
}

// ── Recalcula inicio e duracao do GRUPO com base nas tarefas filhas ──
function recalcularGrupo(g) {
    if (!g.tarefas || g.tarefas.length === 0) return;
    const iMin = Math.min(...g.tarefas.map(t => t.inicio));
    const iMax = Math.max(...g.tarefas.map(t => t.inicio + (t.duracao || 1)));
    g.inicio   = iMin;
    g.duracao  = iMax - iMin;
}

function renderizarGantt() {
    normalizarTarefas(); // compatibilidade com dados antigos
    const body = document.getElementById('ganttBody');
    if (!body) return;
    body.innerHTML = '';
    const semanaAtual = getSemanaAtual();

    dados.grupos.forEach((g, gIndex) => {
        recalcularGrupo(g); // grupo espelha suas tarefas
        const progGrupo = calcularProgressoGrupo(g);
        const grupoDiv = document.createElement('div');
        grupoDiv.className = 'gantt-group';

        // ── CABEÇALHO DO GRUPO (barra engloba todas as tarefas) ──
        const grupoHeader = document.createElement('div');
        grupoHeader.className = 'gantt-group-header';
        grupoHeader.innerHTML = `
            <div class="gc">
                <div class="dot" style="background:${g.cor}; cursor:pointer" title="Alterar cor"
                    onclick="alterarCorGrupo(${gIndex})"></div>
                <input class="gc-edit" value="${g.nome}"
                    onchange="dados.grupos[${gIndex}].nome=this.value; marcarAlterado();">
            </div>
            <div class="gc" style="font-size:11px; color:var(--text2)">${fmtSemana(g.inicio)}</div>
            <div class="gc" style="font-size:11px; color:var(--text2)">${fmtSemana(g.inicio + g.duracao)}</div>
            <div class="gc" style="font-size:11px; color:var(--text3)">${g.duracao} sem.</div>
            <div class="gc">
                <span style="color:var(--accent); font-weight:600">${progGrupo}%</span>
            </div>
            <div class="gc" style="padding:0; overflow:hidden">
                <div class="bar-area">
                    <div class="today-line" style="left:${semanaAtual * SEMANA_PX}px"></div>
                    <div class="gantt-bar" style="left:${g.inicio*SEMANA_PX}px; width:${g.duracao*SEMANA_PX}px;
                        background:${g.cor}33; border:1px solid ${g.cor}">
                        <div class="gantt-bar-fill" style="width:${progGrupo}%; background:${g.cor}"></div>
                    </div>
                </div>
            </div>`;
        grupoDiv.appendChild(grupoHeader);

        // ── TAREFAS — cada uma com seu próprio início e duração ──
        g.tarefas.forEach((t, tIndex) => {
            // segurança: garante que t.inicio existe
            if (t.inicio === undefined) t.inicio = g.inicio;
            const tFim = t.inicio + (t.duracao || 1);

            const row = document.createElement('div');
            row.className = 'gantt-row';
            row.innerHTML = `
                <div class="gc" style="padding-left:36px; gap:4px">
                    <input class="gc-edit" value="${t.nome}"
                        onchange="dados.grupos[${gIndex}].tarefas[${tIndex}].nome=this.value; marcarAlterado();">

                <div class="gc" style="font-size:11px; color:var(--text2)">${fmtSemana(tFim)}</div>
                <div class="gc">
                    <input class="gc-edit" type="number" min="1" value="${t.duracao}"
                        onchange="dados.grupos[${gIndex}].tarefas[${tIndex}].duracao=parseInt(this.value)||1;
                                  marcarAlterado(); renderizarGantt();">
                </div>
                <div class="gc" style="gap:6px">
                    <input type="range" min="0" max="100" value="${t.progresso}"
                        style="width:70px; accent-color:${g.cor}"
                        oninput="dados.grupos[${gIndex}].tarefas[${tIndex}].progresso=parseInt(this.value);
                                 marcarAlterado(); this.nextElementSibling.textContent=this.value+'%';">

                </div>

                    <div class="bar-area">
                        <div class="today-line" style="left:${semanaAtual * SEMANA_PX}px"></div>
                        <div class="gantt-bar"
                            style="left:${t.inicio*SEMANA_PX}px; width:${(t.duracao||1)*SEMANA_PX}px;
                                   background:${g.cor}22; border:1px solid ${g.cor}55">

function abrirModalTarefa(gIndex, tIndex) {
    const novo = tIndex === null;
    const g = dados.grupos[gIndex];
    // inicio sugerido = fim da ultima tarefa do grupo
    let inicioSug = g.inicio || 0;
    if (g.tarefas.length > 0) {
        const ul = g.tarefas[g.tarefas.length - 1];
        inicioSug = (ul.inicio !== undefined ? ul.inicio : g.inicio) + (ul.duracao || 1);
    }
    const t = novo
        ? { nome: '', inicio: inicioSug, duracao: 2, responsavel: g.responsavel || 'Equipe', progresso: 0 }
        : g.tarefas[tIndex];
    const tIni = t.inicio !== undefined ? t.inicio : inicioSug;
    abrirModal(novo ? 'Nova Tarefa' : 'Editar Tarefa', `
        <div style="margin-bottom:8px; font-size:11px; color:var(--text2)">

                    <label style="font-size:11px; color:var(--text2); display:block; margin-bottom:4px">

                    <input id="mt-inicio" class="crud-input" type="number" min="0" value="${tIni}"
                        oninput="atualizarPreviewTarefa()">
                </div>
                <div>
                    <label style="font-size:11px; color:var(--text2); display:block; margin-bottom:4px">Duracao (semanas)</label>
                    <input id="mt-dur" class="crud-input" type="number" min="1" value="${t.duracao}"
                        oninput="atualizarPreviewTarefa()">
                </div>
            </div>
            <div style="background:var(--bg); border:1px solid var(--border); border-radius:6px;
                        padding:8px 12px; font-size:11px; color:var(--accent)" id="mt-preview">
                Periodo: ${fmtSemana(tIni)} ate ${fmtSemana(tIni + t.duracao)}
            </div>
            <div>
                <label style="font-size:11px; color:var(--text2); display:block; margin-bottom:4px">Responsavel</label>
                <input id="mt-resp" class="crud-input" value="${t.responsavel}" placeholder="Nome ou equipe">
            </div>

                    Progresso: <strong id="mt-pct-lbl" style="color:${g.cor}">${t.progresso}%</strong>
                </label>
                <input id="mt-prog" type="range" min="0" max="100" value="${t.progresso}"
                    style="width:100%; accent-color:${g.cor}"
                    oninput="document.getElementById('mt-pct-lbl').textContent=this.value+'%'">
            </div>
            <div style="display:flex; gap:8px; justify-content:flex-end; margin-top:4px">
                <button class="btn btn-ghost" onclick="fecharModal()">Cancelar</button>
                <button class="btn btn-primary" onclick="salvarTarefa(${gIndex}, ${novo ? 'null' : tIndex})">

function atualizarPreviewTarefa() {
    const ini = parseInt(document.getElementById('mt-inicio').value) || 0;
    const dur = parseInt(document.getElementById('mt-dur').value)    || 1;
    const el  = document.getElementById('mt-preview');
    if (el) el.textContent = 'Periodo: ' + fmtSemana(ini) + ' ate ' + fmtSemana(ini + dur);

function salvarTarefa(gIndex, tIndex) {
    const nome = document.getElementById('mt-nome').value.trim();
    if (!nome) { mostrarNotificacao('Informe o nome da tarefa!', 'erro'); return; }
    const obj = {
        nome,
        inicio:      parseInt(document.getElementById('mt-inicio').value) || 0,
        duracao:     parseInt(document.getElementById('mt-dur').value)    || 2,
        responsavel: document.getElementById('mt-resp').value.trim()      || 'Equipe',
        progresso:   parseInt(document.getElementById('mt-prog').value)   || 0
    };
    if (tIndex === null) {
        dados.grupos[gIndex].tarefas.push(obj);
        mostrarNotificacao('Tarefa "' + obj.nome + '" adicionada!', 'success');
    } else {
        Object.assign(dados.grupos[gIndex].tarefas[tIndex], obj);
        mostrarNotificacao('Tarefa atualizada!', 'success');
    }
    marcarAlterado();
    fecharModal();
    renderizarGantt();

function exportarCronograma() {
    const linhas = [];
    dados.grupos.forEach(g => {
        linhas.push({ Grupo: g.nome, Tarefa: '', Inicio: fmtSemana(g.inicio), Fim: fmtSemana(g.inicio + g.duracao), Duracao: g.duracao, Progresso: calcularProgressoGrupo(g) + '%' });
        g.tarefas.forEach(t => {
            linhas.push({ Grupo: g.nome, Tarefa: t.nome, Inicio: fmtSemana(g.inicio), Fim: fmtSemana(g.inicio + t.duracao), Duracao: t.duracao, Progresso: t.progresso + '%' });
        });
    });
    const ws = XLSX.utils.json_to_sheet(linhas);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Cronograma');
    XLSX.writeFile(wb, 'cronograma-torre-liris.xlsx');
    mostrarNotificacao('Cronograma exportado!');
}

async function acaoIA(tipo) {
    const chave = getChaveAtiva();
    let prompt = "";
    if (tipo === "relatorio") {
        prompt = "Voce e um assistente de gestao de obra. Com base nos dados abaixo, escreva um relatorio semanal " +
            "profissional e cordial para enviar ao cliente via WhatsApp. Use linguagem simples, destaque o que foi " +
            "concluido, o que esta em andamento e a previsao proxima. Maximo 200 palavras.\n\n" + contextoObra();
    } else if (tipo === "alertas") {
        prompt = "Voce e um especialista em gestao de obras. Analise o cronograma abaixo e identifique: " +
            "1) Tarefas que parecem atrasadas (progresso baixo vs semana atual), " +
            "2) Possiveis conflitos de sequencia entre tarefas, " +
            "3) Grupos com risco de nao cumprir o prazo. Seja objetivo e pratico.\n\n" + contextoObra();
    } else if (tipo === "materiais") {
        prompt = "Voce e um mestre de obras experiente. Com base nas etapas e tarefas do cronograma abaixo, " +
            "gere uma lista resumida de materiais e servicos de mao de obra necessarios, agrupados por etapa. " +
            "Inclua unidade de medida sugerida (m², m, un, kg, etc). Seja pratico.\n\n" + contextoObra();
    } else if (tipo === "prazo") {
        prompt = "Voce e um consultor de obras. Analise o progresso atual vs a semana em que estamos e diga: " +
            "1) O prazo final e realista? " +
            "2) Qual o percentual esperado de conclusao para esta semana? " +
            "3) Se houver desvio, quanto tempo de atraso esta acumulando? " +
            "Seja direto e use os dados reais.\n\n" + contextoObra();
    }
    await enviarParaChat(prompt, tipo);
}

async function enviarPerguntaIA() {
    const input = document.getElementById('ia-pergunta');
    const pergunta = input.value.trim();
    if (!pergunta) return;
    input.value = '';
    const prompt = "Voce e um assistente especialista em gestao de obras. Responda a pergunta abaixo com base " +
        "nos dados da obra. Seja objetivo e pratico.\n\nDADOS DA OBRA:\n" + contextoObra() +
        "\n\nPERGUNTA DO USUARIO:\n" + pergunta;
    await enviarParaChat(prompt, 'usuario', pergunta);
}

async function enviarParaChat(prompt, tipo, textoUsuario) {
    const chat = document.getElementById('ia-chat');
    if (!chat) return;

    // Mostra mensagem do usuario se for chat livre
    if (textoUsuario) {
        const msgUser = document.createElement('div');
        msgUser.style.cssText = "background:rgba(232,160,32,.1); border-radius:8px; padding:10px 12px; " +
            "font-size:12px; color:var(--text); border-left:3px solid var(--accent); align-self:flex-end";
        msgUser.textContent = textoUsuario;
        chat.appendChild(msgUser);
    }

    // Loader
    const loader = document.createElement('div');
    loader.style.cssText = "background:var(--surface2); border-radius:8px; padding:12px; " +
        "font-size:12px; color:var(--text2); border-left:3px solid var(--accent2)";
    loader.innerHTML = '<span style="animation:pulse 1s infinite;display:inline-block">Analisando com IA...</span>';
    chat.appendChild(loader);
    chat.scrollTop = chat.scrollHeight;

    // Usa chave salva localmente se não tiver no arquivo
    const chave = getChaveAtiva();
    let resposta;
    if (!chave) {
        resposta = "Chave nao configurada. Cole sua chave Gemini no campo acima e clique em Salvar Chave.";
    } else {
        // Chama Gemini com a chave ativa
        try {
            const url = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=" + chave;
            const resp = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: { temperature: 0.7, maxOutputTokens: 1500 }
                })
            });
            const data = await resp.json();
            if (data.error) resposta = "Erro: " + data.error.message;
            else resposta = data.candidates?.[0]?.content?.parts?.[0]?.text || "Sem resposta.";
        } catch(e) {
            resposta = "Erro de conexao: " + e.message;
        }
    }

    // Remove loader e mostra resposta
    chat.removeChild(loader);
    const msgIA = document.createElement('div');
    msgIA.style.cssText = "background:var(--surface2); border-radius:8px; padding:12px; " +
        "font-size:12px; color:var(--text); border-left:3px solid var(--accent2); white-space:pre-wrap; line-height:1.6";
    msgIA.textContent = resposta;
    chat.appendChild(msgIA);
    chat.scrollTop = chat.scrollHeight;
}

// ==================== ÁREA DO CLIENTE ====================
// ► A data exibida aqui vem diretamente de dados.dataInicio,
//   que é atualizado pela função atualizarDataPartes() em Dados do Cliente
function renderizarCliente() {
    const progGeral = calcularProgressoGeral();
    document.getElementById('app').innerHTML = `
    <div class="topbar">
        <div class="logo"><div class="logo-badge">C</div> ${dados.titulo}</div>
        <button class="btn btn-ghost" onclick="location.reload()">🔐 Sair</button>
    </div>
    <div class="main">
        <!-- CARD INFORMAÇÕES -->
        <div class="client-data-card">
            <div class="client-data-grid">
                <div class="client-data-item">
                    <div class="client-data-label">Cliente</div>
                    <div class="client-data-value" style="color:var(--accent)">${dados.cliente.nome}</div>
                </div>
                <div class="client-data-item">
                    <div class="client-data-label">Contato</div>
                    <div class="client-data-value">${dados.cliente.telefone}</div>
                </div>
                <div class="client-data-item">
                    <div class="client-data-label">Arquiteto</div>
                    <div class="client-data-value">${dados.obra.arquiteto}</div>
                </div>
                <div class="client-data-item">
                    <div class="client-data-label">Início da Obra</div>
                    <div class="client-data-value" style="color:var(--accent3)">${fmtData(getDataInicio())}</div>
                </div>
                <div class="client-data-item">
                    <div class="client-data-label">Previsão de Término</div>
                    <div class="client-data-value" style="color:var(--accent)">${calcularPrevisao()}</div>
                </div>
                <div class="client-data-item">
                    <div class="client-data-label">Duração</div>
                    <div class="client-data-value">${dados.duracaoTotal} semanas</div>
                </div>
            </div>
        </div>

        <!-- PROGRESSO GERAL -->
        <div class="stat-card" style="margin-bottom:20px">
            <div class="stat-label">Progresso Geral da Obra</div>
            <div style="display:flex; justify-content:space-between; align-items:center">
                <div class="stat-value" style="color:var(--accent3)">${progGeral}%</div>
                <div style="font-size:12px; color:var(--text2)">${dados.grupos.reduce((s,g)=>s+g.tarefas.length,0)} tarefas</div>
            </div>
            <div class="stat-bar-bg">
                <div class="stat-bar-fill animated-progress" style="width:${progGeral}%"></div>
            </div>
        </div>

        <!-- TIMELINE DAS ETAPAS -->
        <div class="client-timeline">
            ${dados.grupos.map((g, i) => {
                const prog = calcularProgressoGrupo(g);
                const cls = prog >= 100 ? 'done' : prog > 0 ? 'active' : '';
                return `
                <div class="client-item ${cls}" style="animation-delay:${i*0.1}s">
                    <div style="display:flex; align-items:center; gap:10px; margin-bottom:8px">
                        <div class="dot" style="background:${g.cor}; width:10px; height:10px"></div>
                        <span style="font-weight:600; font-size:14px">${g.nome}</span>
                        <span style="color:${g.cor}; font-weight:700">${prog}%</span>
                        <span style="color:var(--text3); font-size:11px">
                            ${fmtSemana(g.inicio)} → ${fmtSemana(g.inicio + g.duracao)}
                        </span>
                    </div>
                    ${g.tarefas.map(t => `
                        <div style="margin-left:22px; margin-bottom:4px; font-size:11px; color:var(--text2); display:flex; align-items:center; gap:6px">
                            <span style="color:var(--text3)">•</span>
                            ${t.nome}
                            <span style="color:${g.cor}">${t.progresso}%</span>
                        </div>`).join('')}
                    <div class="stat-bar-bg" style="margin-top:8px; margin-left:22px">
                        <div class="stat-bar-fill" style="width:${prog}%; background:${g.cor}"></div>
                    </div>
                </div>`;
            }).join('')}
        </div>

        <!-- FOTOS -->
        ${dados.fotos.length > 0 ? `
        <div class="page-header">
            <div class="page-title">📸 Fotos da Obra</div>
        </div>
        <div class="photo-grid">
            ${dados.fotos.map(foto => `
            <div class="photo-card" onclick="abrirModal('📸 ${foto.ambiente}', '<img src=\\'${foto.url}\\' style=\\'width:100%; border-radius:12px\\'>')">
                <img src="${foto.url}" alt="${foto.ambiente}">
                <div class="photo-card-info">
                    <div class="photo-card-ambiente">${foto.ambiente}</div>
                    <div class="photo-card-data">${foto.data}</div>
                </div>
            </div>`).join('')}
        </div>` : ''}
    </div>`;
}

// ==================== INIT ====================
carregarDados();
</script>
</body>
