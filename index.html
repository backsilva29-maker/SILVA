<style>
:root {
--bg: #0d0f14; --surface: #13161e; --surface2: #1a1e2a;
--border: #252a38; --accent: #e8a020; --accent2: #3b82f6;
--accent3: #10b981; --accent4: #f43f5e; --text: #e8eaf0;
--text2: #8892a4; --text3: #4a5468; --gantt-h: 50px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 13px; min-height: 100vh; overflow-x: hidden; }

/* LOGIN */
.login-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); display: flex; justify-content: center; align-items: center; z-index: 1000; animation: fadeIn 0.3s ease; }
.login-content { background: var(--surface); border: 1px solid var(--border); border-radius: 48px; padding: 40px; width: 90%; max-width: 380px; text-align: center; animation: slideUp 0.4s ease; }
.login-input { width: 100%; padding: 16px; margin: 15px 0; background: var(--bg); border: 1px solid var(--border); border-radius: 40px; color: var(--text); font-size: 16px; }
.login-btn { width: 100%; padding: 16px; margin: 8px 0; border: none; border-radius: 40px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.btn-admin { background: var(--accent); color: #000; }
.btn-admin:hover { background: #f5ae30; transform: scale(1.02); }
.btn-client { background: var(--accent2); color: white; }
.btn-client:hover { background: #4a90f6; transform: scale(1.02); }

/* TOPBAR */
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 0 16px; height: 56px; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
.logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 15px; display: flex; align-items: center; gap: 10px; }
.logo-badge { width: 28px; height: 28px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 13px; color: #000; font-weight: 800; }
.btn { padding: 8px 14px; border-radius: 8px; border: none; cursor: pointer; font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500; transition: all .15s; display: inline-flex; align-items: center; gap: 6px; }
.btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text2); }
.btn-ghost:hover { border-color: var(--text2); color: var(--text); }
.btn-primary { background: var(--accent); color: #000; font-weight: 600; }
.btn-primary:hover { background: #f5ae30; }
.btn-danger { background: var(--accent4); color: white; }
.btn-success { background: var(--accent3); color: white; }
.btn-small { padding: 4px 10px; font-size: 11px; }

/* LAYOUT */
.layout { display: flex; height: calc(100vh - 56px); }
.sidebar { width: 220px; min-width: 220px; background: var(--surface); border-right: 1px solid var(--border); padding: 16px 0; overflow-y: auto; }
.sidebar-section { margin-bottom: 24px; }
.sidebar-label { font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 1.5px; color: var(--text3); text-transform: uppercase; padding: 0 16px; margin-bottom: 6px; }
.sidebar-item { display: flex; align-items: center; gap: 10px; padding: 10px 16px; color: var(--text2); cursor: pointer; border-left: 2px solid transparent; transition: all 0.2s; }
.sidebar-item:hover { background: var(--surface2); color: var(--text); transform: translateX(4px); }
.sidebar-item.active { color: var(--accent); border-left-color: var(--accent); background: rgba(232,160,32,.06); }

/* MAIN */
.main { flex: 1; overflow: auto; padding: 16px; animation: fadeIn 0.4s ease; }
.page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 10px; }
.page-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 18px; }
.page-sub { color: var(--text2); font-size: 11px; margin-top: 4px; }

/* SAVE BAR */
.save-bar { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
.save-status { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--text2); }
.save-indicator { width: 8px; height: 8px; border-radius: 50%; background: var(--text3); transition: background 0.3s; }
.save-indicator.saved { background: var(--accent3); }
.save-indicator.pending { background: var(--accent); animation: pulse 1s infinite; }

/* CLIENT DATA CARD */
.client-data-card { background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%); border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin-bottom: 16px; }
.client-data-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; }
.client-data-item { display: flex; flex-direction: column; gap: 4px; }
.client-data-label { font-size: 9px; color: var(--text3); text-transform: uppercase; font-family: 'IBM Plex Mono', monospace; }
.client-data-value { font-size: 13px; color: var(--text); font-weight: 500; }
.client-data-input { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; color: var(--text); font-size: 12px; width: 100%; }
.client-data-input:focus { outline: none; border-color: var(--accent); }

/* GANTT */
.gantt-wrap { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; background: var(--surface); margin-bottom: 16px; }
.gantt-header { display: grid; grid-template-columns: 180px 70px 70px 60px 80px 1fr; background: var(--surface2); border-bottom: 1px solid var(--border); font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: var(--text3); text-transform: uppercase; }
.gh-cell { padding: 10px; border-right: 1px solid var(--border); }
.gantt-group { border-bottom: 1px solid var(--border); }
.gantt-group-header { display: grid; grid-template-columns: 180px 70px 70px 60px 80px 1fr; background: rgba(232,160,32,.08); padding: 10px; align-items: center; }
.gantt-row { display: grid; grid-template-columns: 180px 70px 70px 60px 80px 1fr; border-bottom: 1px solid rgba(37,42,56,.6); align-items: center; }
.gantt-row:hover { background: var(--surface2); }
.gc { padding: 0 10px; height: var(--gantt-h); display: flex; align-items: center; border-right: 1px solid var(--border); font-size: 11px; }
.gc-edit { background: transparent; border: 1px solid var(--border); border-radius: 4px; padding: 4px 6px; color: var(--text); font-size: 10px; width: 100%; }
.gc-edit:focus { outline: none; border-color: var(--accent); }
.dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 8px; }
.bar-area { position: relative; height: var(--gantt-h); min-width: 100%; overflow-x: auto; }
.gantt-bar { position: absolute; top: 50%; transform: translateY(-50%); height: 18px; border-radius: 4px; display: flex; align-items: center; overflow: hidden; }
.gantt-bar-fill { height: 100%; border-radius: 4px 0 0 4px; opacity: .95; transition: width 0.5s ease-out; }
.today-line { position: absolute; top: 0; bottom: 0; width: 2px; background: var(--accent4); opacity: .7; z-index: 5; }

/* ANIMATED WORKER */
.worker-container { position: absolute; top: 50%; transform: translateY(-50%); height: 24px; width: 24px; z-index: 10; transition: left 1s ease-in-out; }
.worker-emoji { font-size: 18px; animation: walk 0.5s ease-in-out infinite alternate; }
@keyframes walk { from { transform: rotate(-5deg); } to { transform: rotate(5deg); } }

/* ANIMATED PROGRESS */
.animated-progress { position: relative; overflow: hidden; }
.animated-progress::after {
    content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    animation: shimmer 2s infinite;
}
.progress-pulse { animation: pulse 2s infinite; }

/* CRUD */
.crud-container { display: grid; gap: 10px; }
.crud-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px; display: grid; grid-template-columns: 1fr 80px 80px 100px; gap: 10px; align-items: center; }
.crud-card-header { background: var(--surface2); font-weight: 600; font-size: 10px; color: var(--text3); text-transform: uppercase; padding: 10px 12px; border-radius: 10px 10px 0 0; }
.crud-input { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; color: var(--text); font-size: 11px; width: 100%; }
.crud-input:focus { outline: none; border-color: var(--accent); }
.crud-actions { display: flex; gap: 4px; }

/* PHOTOS */
.photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
.photo-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.photo-card img { width: 100%; aspect-ratio: 4/3; object-fit: cover; }
.photo-card-info { padding: 8px; }
.photo-card-ambiente { font-size: 10px; color: var(--accent); text-transform: uppercase; margin-bottom: 2px; }
.photo-card-data { font-size: 9px; color: var(--text3); }

/* STATS */
.stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 16px; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px; }
.stat-label { font-size: 9px; color: var(--text3); text-transform: uppercase; font-family: 'IBM Plex Mono', monospace; margin-bottom: 6px; }
.stat-value { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 18px; }
.stat-bar-bg { height: 4px; background: var(--border); border-radius: 2px; margin-top: 8px; overflow: hidden; }
.stat-bar-fill { height: 100%; background: var(--accent3); border-radius: 2px; transition: width 0.5s ease-out; }

/* MODAL */
.modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 1000; align-items: center; justify-content: center; }
.modal.open { display: flex; animation: fadeIn 0.3s ease; }
.modal-content { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 24px; width: 90%; max-width: 450px; max-height: 80vh; overflow-y: auto; }
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.modal-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px; }
.modal-close { background: none; border: none; color: var(--text2); font-size: 24px; cursor: pointer; }

/* NOTIFICATION */
.notification { position: fixed; bottom: 16px; right: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; display: flex; align-items: center; gap: 10px; z-index: 999; transform: translateY(100px); opacity: 0; transition: all 0.3s; max-width: 300px; }
.notification.show { transform: translateY(0); opacity: 1; }
.notification.success { border-color: var(--accent3); }
.notification.error { border-color: var(--accent4); }

/* AMBIENTES TABS */
.ambientes-tabs { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
.ambiente-tab { padding: 6px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; cursor: pointer; font-size: 11px; color: var(--text2); }
.ambiente-tab.active { background: var(--accent); color: #000; border-color: var(--accent); }

/* CLIENT TIMELINE ANIMATED */
.client-timeline { position: relative; padding-left: 16px; border-left: 2px solid var(--border); margin: 16px 0; }
.client-timeline::before {
    content: ''; position: absolute; left: -2px; top: 0; width: 2px; height: 0;
    background: linear-gradient(to bottom, var(--accent3), var(--accent));
    animation: growLine 1.5s ease-out forwards;
}
.client-item { position: relative; padding-left: 16px; margin-bottom: 20px; opacity: 0; animation: slideInLeft 0.4s ease forwards; }
.client-item::before { content: ''; position: absolute; left: -22px; top: 5px; width: 10px; height: 10px; border-radius: 50%; background: var(--border); transition: all 0.3s; }
.client-item.done::before { background: var(--accent3); box-shadow: 0 0 10px var(--accent3); }
.client-item.active::before { background: var(--accent); box-shadow: 0 0 15px var(--accent); animation: pulse 1.5s infinite; }
.client-item:nth-child(1) { animation-delay: 0.1s; }
.client-item:nth-child(2) { animation-delay: 0.2s; }
.client-item:nth-child(3) { animation-delay: 0.3s; }
.client-item:nth-child(4) { animation-delay: 0.4s; }
.client-item:nth-child(5) { animation-delay: 0.5s; }
.client-item:nth-child(6) { animation-delay: 0.6s; }
.client-item:nth-child(7) { animation-delay: 0.7s; }
.client-item:nth-child(8) { animation-delay: 0.8s; }
.client-status { font-size: 10px; padding: 3px 8px; border-radius: 4px; display: inline-block; margin-top: 4px; }
.status-pendente { background: rgba(136,146,164,0.1); color: var(--text2); }
.status-em-andamento { background: rgba(232,160,32,0.1); color: var(--accent); }
.status-concluido { background: rgba(16,185,129,0.1); color: var(--accent3); }
.client-dates { font-size: 10px; color: var(--text3); margin-top: 4px; }

/* ANIMATIONS */
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes slideInLeft { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
@keyframes growLine { from { height: 0; } to { height: 100%; } }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
@keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

/* RESPONSIVE MOBILE */
@media (max-width: 768px) {
    .sidebar { display: none; }
    .gantt-header, .gantt-row { grid-template-columns: 120px 1fr; }
    .gh-cell:nth-child(n+2), .gc:nth-child(n+2) { display: none; }
    .crud-card { grid-template-columns: 1fr; }
    .page-header { flex-direction: column; align-items: flex-start; }
    .stats-row { grid-template-columns: 1fr; }
    .client-data-grid { grid-template-columns: 1fr; }
}
</style>

// ==================== DATAS (CALCULADAS AUTOMATICAMENTE) ====================
const SEMANA_PX = 35;

function fmtDataCompleta(d) {
    return new Date(d).toLocaleDateString('pt-BR');
}

function fmtDataSemana(semana) {
    const start = new Date(dados.dataInicio);
    const d = new Date(start.getTime() + semana * 7 * 24 * 3600 * 1000);
    return d.toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit'});
}

function fmtMesAno() {
    return new Date(dados.dataInicio).toLocaleDateString('pt-BR', {month:'long', year:'numeric'});
}

function calcularPrevisao() {
    const start = new Date(dados.dataInicio);
    const semanas = dados.duracaoTotal || 20;
    const end = new Date(start.getTime() + semanas * 7 * 24 * 3600 * 1000);
    return end.toLocaleDateString('pt-BR', {month:'short', year:'numeric'});
}

function getDataInicioEtapa(etapaIndex) {
    const start = new Date(dados.dataInicio);
    const semana = dados.grupos[etapaIndex]?.inicio || 0;
    return new Date(start.getTime() + semana * 7 * 24 * 3600 * 1000).toLocaleDateString('pt-BR');
}

function getDataFimEtapa(etapaIndex) {
    const start = new Date(dados.dataInicio);
    const grupo = dados.grupos[etapaIndex];
    const semana = (grupo?.inicio || 0) + (grupo?.duracao || 0);
    return new Date(start.getTime() + semana * 7 * 24 * 3600 * 1000).toLocaleDateString('pt-BR');
}

const semanaAtual = Math.round((new Date() - new Date(dados.dataInicio)) / (7*24*3600*1000));

function mostrarNotificacao(mensagem, tipo = 'success') {

    document.getElementById('notifMsg').textContent = mensagem;

}

function renderizarGantt() {
    const body = document.getElementById('ganttBody');
    if (!body) return;
    body.innerHTML = '';
    dados.grupos.forEach((g, gI) => {
        const grupoDiv = document.createElement('div');
        grupoDiv.className = 'gantt-group';
        grupoDiv.innerHTML = `<div class="gantt-group-header">
            <div class="gc"><div class="dot" style="background:${g.cor}"></div><input class="gc-edit" value="${g.nome}" onchange="editarGrupoNome(${gI},this.value)"></div>
            <div class="gc">${fmtDataSemana(g.inicio)}</div>
            <div class="gc">${fmtDataSemana(g.inicio+g.duracao)}</div>
            <div class="gc"><input type="number" class="gc-edit" value="${g.duracao}" onchange="editarGrupoDuracao(${gI},this.value)" style="width:40px"></div>
            <div class="gc"><input class="gc-edit" value="${g.responsavel}" onchange="editarGrupoResp(${gI},this.value)"></div>
            <div class="gc"><div class="bar-area"><div class="today-line" style="left:${semanaAtual*SEMANA_PX}px"></div><div class="gantt-bar" style="left:${g.inicio*SEMANA_PX}px;width:${g.duracao*SEMANA_PX}px;background:${g.cor}33;border:1px solid ${g.cor}"><div class="gantt-bar-fill" style="width:50%;background:${g.cor}"></div></div></div></div>
        </div>`;
        g.tarefas.forEach((t, tI) => {
            const row = document.createElement('div');
            row.className = 'gantt-row';
            row.innerHTML = `<div class="gc" style="padding-left:24px"><input class="gc-edit" value="${t.nome}" onchange="editarTarefaNome(${gI},${tI},this.value)"></div>
                <div class="gc">${fmtDataSemana(g.inicio)}</div><div class="gc">${fmtDataSemana(g.inicio+t.duracao)}</div>
                <div class="gc"><input type="number" class="gc-edit" value="${t.duracao}" onchange="editarTarefaDuracao(${gI},${tI},this.value)" style="width:40px"></div>
                <div class="gc"><input type="range" min="0" max="100" value="${t.progresso}" style="width:60px" onchange="editarTarefaProgresso(${gI},${tI},this.value)"><span>${t.progresso}%</span></div>
                <div class="gc"><div class="bar-area"><div class="gantt-bar" style="width:${t.duracao*SEMANA_PX}px;background:${g.cor}33;border:1px solid ${g.cor}"><div class="gantt-bar-fill" style="width:${t.progresso}%;background:${g.cor}"></div></div></div></div>`;
            grupoDiv.appendChild(row);
            const btnRow = document.createElement('div');
            btnRow.className = 'gantt-row';
            btnRow.innerHTML = `<div class="gc" style="padding-left:24px"><button class="btn btn-danger btn-small" onclick="excluirTarefa(${gI},${tI})">🗑️</button></div><div class="gc"></div><div class="gc"></div><div class="gc"></div><div class="gc"></div><div class="gc"></div>`;
            grupoDiv.appendChild(btnRow);
        });
        const addRow = document.createElement('div');
        addRow.className = 'gantt-row';
        addRow.innerHTML = `<div class="gc"><button class="btn btn-primary btn-small" onclick="adicionarTarefa(${gI})">+ Tarefa</button><button class="btn btn-danger btn-small" onclick="excluirGrupo(${gI})">🗑️ Grupo</button></div><div class="gc"></div><div class="gc"></div><div class="gc"></div><div class="gc"></div><div class="gc"></div>`;
        grupoDiv.appendChild(addRow);
        body.appendChild(grupoDiv);
    });
}

// FUNÇÕES CRONOGRAMA
function editarGrupoNome(i,v){dados.grupos[i].nome=v;marcarAlterado();}
function editarGrupoDuracao(i,v){dados.grupos[i].duracao=parseInt(v);marcarAlterado();renderizarGantt();}
function editarGrupoResp(i,v){dados.grupos[i].responsavel=v;marcarAlterado();}
function editarTarefaNome(g,t,v){dados.grupos[g].tarefas[t].nome=v;marcarAlterado();}
function editarTarefaDuracao(g,t,v){dados.grupos[g].tarefas[t].duracao=parseInt(v);marcarAlterado();renderizarGantt();}
function editarTarefaProgresso(g,t,v){dados.grupos[g].tarefas[t].progresso=parseInt(v);marcarAlterado();}
function adicionarGrupo(){dados.grupos.push({id:'g'+Date.now(),nome:'Novo Grupo',cor:'#'+Math.floor(Math.random()*16777215).toString(16),inicio:dados.grupos.length*2,duracao:2,responsavel:'Equipe',tarefas:[]});marcarAlterado();renderizarGantt();}
function adicionarTarefa(g){dados.grupos[g].tarefas.push({id:'t'+Date.now(),nome:'Nova Tarefa',duracao:2,responsavel:'Equipe',progresso:0});marcarAlterado();renderizarGantt();}
function excluirTarefa(g,t){if(confirm('Excluir?')){dados.grupos[g].tarefas.splice(t,1);marcarAlterado();renderizarGantt();mostrarNotificacao('Excluído!');}}
function excluirGrupo(g){if(confirm('Excluir grupo?')){dados.grupos.splice(g,1);marcarAlterado();renderizarGantt();mostrarNotificacao('Excluído!');}}
function importarExcel(){abrirModal('Importar Excel','<div class="import-drop" onclick="document.getElementById(\'fileInput\').click()"><p>📂 Clique para selecionar</p><input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none" onchange="processarExcel(this.files[0])"></div>');}
function processarExcel(file){if(!file)return;const r=new FileReader();r.onload=e=>{const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1});rows.slice(1).forEach(row=>{if(row[0])dados.orcamento.push({id:'o'+Date.now(),grupo:'Importado',descricao:row[0],valor:parseFloat(row[3])||0});});marcarAlterado();fecharModal();renderizarOrcamentoAdmin();mostrarNotificacao('Importado!');};r.readAsArrayBuffer(file);}
function exportarCronograma(){const ws=XLSX.utils.json_to_sheet(dados.grupos);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Cronograma');XLSX.writeFile(wb,'cronograma.xlsx');mostrarNotificacao('Exportado!');}

    const m=t?Math.round(p/t):0;
    return `<div class="stats-row">
        <div class="stat-card"><div class="stat-label">Progresso</div><div class="stat-value" style="color:var(--accent3)">${m}%</div><div class="stat-bar-bg"><div class="stat-bar-fill animated-progress" style="width:${m}%"></div></div></div>
        <div class="stat-card"><div class="stat-label">Previsão</div><div class="stat-value">${calcularPrevisao()}</div></div>
        <div class="stat-card"><div class="stat-label">Etapas</div><div class="stat-value">${dados.grupos.length}</div></div>
    </div>`;
}

function renderizarCronogramaAnimadoCliente(){
    return `<div class="page-header"><div class="page-title">📅 Cronograma</div></div>
    <div class="client-timeline">
        ${dados.grupos.map((g,i)=>{
            const prog=g.tarefas.reduce((a,t)=>a+t.progresso,0)/g.tarefas.length;
            const status=prog>=100?'Concluído':prog>0?'Em andamento':'Pendente';
            const cls=prog>=100?'concluido':prog>0?'em-andamento':'pendente';
            const dataIni=getDataInicioEtapa(i);
            const dataFim=getDataFimEtapa(i);
            return `<div class="client-item ${cls}">
                <div style="display:flex;justify-content:space-between;align-items:center">
                    <span style="font-weight:600">${g.nome}</span>
                    <span style="color:${g.cor};font-weight:700">${Math.round(prog)}%</span>
                </div>
                <div class="client-dates">📅 ${dataIni} → ${dataFim}</div>
                <div class="client-status status-${cls}">${status}</div>
                <div class="stat-bar-bg" style="margin-top:6px">
                    <div class="stat-bar-fill animated-progress progress-pulse" style="width:${prog}%;background:${g.cor}"></div>
                </div>
                ${prog>0&&prog<100?`<div class="worker-container" style="left:${prog}%"><span class="worker-emoji">👷</span></div>`:''}
            </div>`;
        }).join('')}
    </div>`;
}

function renderizarFotosCliente(){
    return `<div class="page-header"><div class="page-title">📸 Galeria</div></div>
    <div class="photo-grid">
        ${dados.fotos.slice(0,8).map((f,x)=>`
            <div class="photo-card" style="animation:slideUp 0.4s ${x*0.1}s forwards;opacity:0">
                <img src="${f.url}">
                <div class="photo-card-info"><div class="photo-card-ambiente">${f.ambiente}</div></div>
            </div>
        `).join('')}
    </div>`;
}

// ==================== INICIALIZAÇÃO ====================
carregarDados();
</script>
</body>
</html>
