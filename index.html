<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>🏗️ Sistema Inteligente - Torre L'iris</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        body { background: #f1f5f9; padding: 16px; padding-bottom: 90px; }
        
        .header {
            background: linear-gradient(145deg, #0f172a, #1e293b);
            color: white; padding: 24px; border-radius: 32px; margin-bottom: 20px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
            position: relative;
        }
        
        .imagem-ap {
            width: 70px; height: 70px; border-radius: 20px; background: rgba(255,255,255,0.1);
            position: absolute; right: 20px; top: 20px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            border: 2px dashed rgba(255,255,255,0.2); overflow: hidden;
        }
        
        .input-transparent {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 30px;
            padding: 10px 18px;
            color: white;
            font-size: 15px;
            width: 100%;
            margin: 6px 0;
        }
        
        .tabs {
            display: flex; background: white; padding: 6px; border-radius: 40px; margin-bottom: 24px;
            gap: 4px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            flex-wrap: wrap;
        }
        
        .tab {
            flex: 1; text-align: center; padding: 14px 0; font-size: 14px; font-weight: 600;
            border-radius: 34px; color: #64748b; cursor: pointer;
            min-width: 90px;
        }
        .tab.active { background: #0f172a; color: white; }
        
        .card {
            background: white; border-radius: 28px; padding: 24px; margin-bottom: 24px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #e2e8f0;
        }
        
        .card-title {
            font-size: 20px; font-weight: 700; color: #0f172a; margin-bottom: 20px;
            border-bottom: 2px solid #e2e8f0; padding-bottom: 16px;
        }
        
        .dashboard-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px;
        }
        .dashboard-card {
            background: linear-gradient(145deg, #f8fafc, #f1f5f9);
            padding: 20px; border-radius: 24px; border: 1px solid #e2e8f0;
        }
        .dashboard-valor { font-size: 28px; font-weight: 800; color: #0f172a; }
        .dashboard-label { font-size: 13px; color: #64748b; margin-top: 4px; }
        
        .progresso-container {
            width: 100%; height: 10px; background: #e2e8f0; border-radius: 30px; margin: 12px 0; overflow: hidden;
        }
        .progresso-bar {
            height: 100%; background: linear-gradient(90deg, #3b82f6, #8b5cf6); border-radius: 30px;
            transition: width 0.3s;
        }
        
        .ambiente-item {
            background: #f8fafc; border-radius: 24px; padding: 20px; margin-bottom: 16px;
            border: 1px solid #e2e8f0;
        }
        .ambiente-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .ambiente-nome { font-weight: 700; font-size: 16px; }
        .ambiente-area { background: #e2e8f0; padding: 4px 12px; border-radius: 30px; font-size: 12px; }
        
        .subtarefa-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 16px; background: white; border-radius: 20px; margin: 8px 0;
            border: 1px solid #e2e8f0;
        }
        
        .funcionario-card {
            background: #f8fafc; border-radius: 24px; padding: 20px; margin: 20px 0;
            border: 1px solid #e2e8f0;
        }
        .ponto-grid {
            display: flex; gap: 10px; flex-wrap: wrap; margin: 15px 0;
        }
        .ponto-dia {
            background: white; padding: 12px; border-radius: 16px; text-align: center; min-width: 90px;
            border: 1px solid #e2e8f0;
        }
        
        .tabela-container {
            overflow-x: auto; border-radius: 20px; border: 1px solid #e2e8f0; margin: 20px 0;
        }
        .tabela {
            width: 100%; border-collapse: collapse; font-size: 14px; min-width: 1200px;
        }
        .tabela th {
            background: #f8fafc; color: #1e293b; font-weight: 600; padding: 16px 12px;
            border-bottom: 2px solid #cbd5e1;
        }
        .tabela td {
            padding: 14px 12px; border-bottom: 1px solid #e2e8f0;
        }
        
        .input-tabela {
            width: 100%; padding: 8px 12px; border: 1px solid #cbd5e1; border-radius: 16px;
            font-size: 13px;
        }
        
        .btn {
            padding: 10px 20px; border: none; border-radius: 30px; font-weight: 600;
            font-size: 13px; cursor: pointer;
        }
        .btn-primary { background: #0f172a; color: white; }
        .btn-success { background: #10b981; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-sm { padding: 6px 12px; font-size: 12px; }
        
        .fixed-buttons {
            position: fixed; bottom: 0; left: 0; right: 0; padding: 16px;
            background: white; border-top: 1px solid #e2e8f0; display: flex; gap: 8px;
            background: rgba(255,255,255,0.95);
            flex-wrap: wrap;
        }
        
        .fixed-btn {
            flex: 1; padding: 16px; border: none; border-radius: 30px; font-weight: 700;
            font-size: 14px; cursor: pointer; min-width: 100px;
        }
        .btn-edit { background: #0f172a; color: white; }
        .btn-add { background: #8b5cf6; color: white; }
        
        .badge {
            padding: 4px 10px; border-radius: 30px; font-size: 11px; font-weight: 600;
        }
        .badge-success { background: #d1fae5; color: #065f46; }
        .badge-warning { background: #fef3c7; color: #92400e; }
        .badge-info { background: #dbeafe; color: #1e40af; }
    </style>
</head>
<body>
    <div class="header">
        <div class="imagem-ap" onclick="uploadImagemAp()" id="containerImagemAp">🏢</div>
        
        <input type="text" id="tituloObra" class="input-transparent" value="Torre L'iris Residence" style="font-size: 24px; font-weight: bold;" onchange="dados.titulo=this.value">
        <input type="text" id="enderecoObra" class="input-transparent" value="Av. Conselheiro Furtado, 1044" onchange="dados.endereco=this.value">
        
        <div style="display: flex; gap: 10px; margin: 10px 0;">
            <input type="text" class="input-transparent" value="Seu Aldebaner" placeholder="Proprietário" onchange="dados.proprietario=this.value">
            <input type="text" class="input-transparent" value="Isabela Kalume" placeholder="Arquiteto" onchange="dados.arquiteta=this.value">
        </div>
        
        <div style="margin: 15px 0;">
            <label style="font-size: 13px;">📅 Data de início:</label>
            <input type="date" id="dataInicio" class="input-transparent" value="2026-03-02" onchange="dados.dataInicio=this.value; renderizarConteudo()">
        </div>
        
        <div style="display: flex; gap: 8px; flex-wrap: wrap;">
            <span style="background: rgba(255,255,255,0.15); padding: 6px 16px; border-radius: 30px;" id="periodoDisplay">📅 Mar/2026 - Jul/2026</span>
            <span style="background: rgba(255,255,255,0.15); padding: 6px 16px; border-radius: 30px;">💰 R$ <span id="totalOrcamentoHeader">234.943,54</span></span>
        </div>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="mudarAba('dashboard')">📊 Dashboard</div>
        <div class="tab" onclick="mudarAba('ambientes')">🏠 Ambientes</div>
        <div class="tab" onclick="mudarAba('orcamento')">💰 Orçamento</div>
        <div class="tab" onclick="mudarAba('materiais')">📦 Materiais</div>
        <div class="tab" onclick="mudarAba('maoobra')">👷 Mão de Obra</div>
        <div class="tab" onclick="mudarAba('fotos')">📸 Fotos</div>
    </div>

    <div id="conteudo"></div>

    <div class="fixed-buttons">
        <button class="fixed-btn btn-edit" onclick="modoEdicao = !modoEdicao; renderizarConteudo()">✏️ Editar</button>
        <button class="fixed-btn btn-add" onclick="adicionarItem()">➕ Adicionar</button>
        <button class="fixed-btn btn-edit" onclick="exportarDados()">📥 Exportar</button>
    </div>

    <script>
        // ============================================
        // DADOS COMPLETOS
        // ============================================
        let dados = {
            titulo: "Torre L'iris Residence",
            endereco: "Av. Conselheiro Furtado, 1044",
            proprietario: "Seu Aldebaner",
            arquiteta: "Isabela Kalume",
            dataInicio: "2026-03-02",
            
            bdi: { geral: 25.5, maoObra: 32.0 },
            
            // AMBIENTES COM TAREFAS REAIS
            ambientes: [
                { 
                    id: 1, nome: "BHO Andrey", area: "3,66m²", 
                    tarefas: [
                        { nome: "Chapisco", concluido: false, tipo: "revestimento" },
                        { nome: "Reboco", concluido: false, tipo: "revestimento" },
                        { nome: "Revestimento", concluido: false, tipo: "revestimento" },
                        { nome: "Metais", concluido: false, tipo: "instalacao" }
                    ]
                },
                { 
                    id: 2, nome: "BHO Delbanor", area: "4,29m²",
                    tarefas: [
                        { nome: "Chapisco", concluido: false, tipo: "revestimento" },
                        { nome: "Reboco", concluido: false, tipo: "revestimento" },
                        { nome: "Revestimento", concluido: false, tipo: "revestimento" },
                        { nome: "Bancada", concluido: false, tipo: "acabamento" }
                    ]
                },
                { 
                    id: 3, nome: "BHO Isabel", area: "4,22m²",
                    tarefas: [
                        { nome: "Chapisco", concluido: false, tipo: "revestimento" },
                        { nome: "Reboco", concluido: false, tipo: "revestimento" },
                        { nome: "Revestimento", concluido: false, tipo: "revestimento" },
                        { nome: "Metais", concluido: false, tipo: "instalacao" }
                    ]
                },
                { 
                    id: 4, nome: "BHO Maria", area: "4,03m²",
                    tarefas: [
                        { nome: "Chapisco", concluido: false, tipo: "revestimento" },
                        { nome: "Reboco", concluido: false, tipo: "revestimento" },
                        { nome: "Revestimento", concluido: false, tipo: "revestimento" },
                        { nome: "Metais", concluido: false, tipo: "instalacao" }
                    ]
                },
                { 
                    id: 5, nome: "BHO Vitor", area: "5,03m²",
                    tarefas: [
                        { nome: "Chapisco", concluido: false, tipo: "revestimento" },
                        { nome: "Reboco", concluido: false, tipo: "revestimento" },
                        { nome: "Revestimento", concluido: false, tipo: "revestimento" },
                        { nome: "Bancada", concluido: false, tipo: "acabamento" }
                    ]
                },
                { 
                    id: 6, nome: "Suíte Vitor", area: "22,19m²",
                    tarefas: [
                        { nome: "Chapisco", concluido: false, tipo: "revestimento" },
                        { nome: "Reboco", concluido: false, tipo: "revestimento" },
                        { nome: "Pintura", concluido: false, tipo: "pintura" },
                        { nome: "Closet", concluido: false, tipo: "marcenaria" }
                    ]
                },
                { 
                    id: 7, nome: "Suíte Maria", area: "16,16m²",
                    tarefas: [
                        { nome: "Chapisco", concluido: false, tipo: "revestimento" },
                        { nome: "Reboco", concluido: false, tipo: "revestimento" },
                        { nome: "Pintura", concluido: false, tipo: "pintura" }
                    ]
                }
            ],

            // ORÇAMENTO
            orcamento: [
                { codigo: "001", categoria: "SERVIÇOS PRELIMINARES", descricao: "Placa de obra", un: "m²", quant: 35, unitario: 46.35, total: 1639.05 },
                { codigo: "002", categoria: "SERVIÇOS PRELIMINARES", descricao: "Administração", un: "meses", quant: 5, unitario: 7627.95, total: 38139.75 }
            ],

            // MATERIAIS
            materiais: [
                { codigo: "MAT001", descricao: "Cimento CP-II", un: "sc", quant: 450, unitario: 32.50, total: 14625.00,
                  fornecedor: "Cemex", contato: "(11) 1234-5678", dataCompra: "15/02/2026", dataPrevista: "20/02/2026",
                  status: "entregue", notaFiscal: "NF-12345" }
            ],

            // MÃO DE OBRA
            maoObra: {
                funcionarios: [
                    {
                        id: 1, nome: "João Silva", funcao: "Pedreiro", valorHora: 25.00,
                        ponto: [
                            { data: "02/03/2026", presente: true, horas: 8 },
                            { data: "03/03/2026", presente: true, horas: 8 },
                            { data: "04/03/2026", presente: false, horas: 0 }
                        ],
                        pagamentos: [
                            { data: "05/03/2026", valor: 400.00, status: "pago" }
                        ]
                    },
                    {
                        id: 2, nome: "Maria Santos", funcao: "Servente", valorHora: 15.00,
                        ponto: [
                            { data: "02/03/2026", presente: true, horas: 8 },
                            { data: "03/03/2026", presente: true, horas: 8 },
                            { data: "04/03/2026", presente: true, horas: 8 }
                        ],
                        pagamentos: [
                            { data: "05/03/2026", valor: 360.00, status: "pago" }
                        ]
                    }
                ]
            },

            fotos: []
        };

        // ============================================
        // FUNÇÕES INTELIGENTES
        // ============================================
        
        function calcularProgressoAmbiente(ambiente) {
            let total = ambiente.tarefas.length;
            let concluidas = ambiente.tarefas.filter(t => t.concluido).length;
            return total > 0 ? Math.round((concluidas / total) * 100) : 0;
        }

        // FUNÇÃO CORRIGIDA - Agora calcula baseado nas tarefas REAIS
        function calcularProgressoPorTipo(tipo) {
            let totalTarefas = 0;
            let tarefasConcluidas = 0;
            
            dados.ambientes.forEach(amb => {
                amb.tarefas.forEach(tarefa => {
                    if (tarefa.tipo === tipo) {
                        totalTarefas++;
                        if (tarefa.concluido) {
                            tarefasConcluidas++;
                        }
                    }
                });
            });
            
            return totalTarefas > 0 ? Math.round((tarefasConcluidas / totalTarefas) * 100) : 0;
        }

        function gerarCronogramaInteligente() {
            let meses = ["Março", "Abril", "Maio", "Junho", "Julho"];
            let cronograma = [];
            
            meses.forEach((mes, idx) => {
                let progressoMes = 0;
                let tarefasMes = [];
                
                dados.ambientes.forEach(amb => {
                    amb.tarefas.forEach((tarefa, tIdx) => {
                        if (tIdx === idx) {
                            tarefasMes.push({
                                nome: `${amb.nome} - ${tarefa.nome}`,
                                concluido: tarefa.concluido
                            });
                        }
                    });
                });
                
                cronograma.push({
                    mes: mes,
                    tarefas: tarefasMes,
                    progresso: Math.round(tarefasMes.filter(t => t.concluido).length / tarefasMes.length * 100) || 0
                });
            });
            
            return cronograma;
        }

        // ============================================
        // ESTADO DA APLICAÇÃO
        // ============================================
        let abaAtual = 'dashboard';
        let modoEdicao = false;

        function mudarAba(aba) {
            abaAtual = aba;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            renderizarConteudo();
        }

        // ============================================
        // RENDERIZAÇÃO (COM GRÁFICOS CORRETOS)
        // ============================================
        function renderizarConteudo() {
            let html = '';
            
            let totalOrcamento = dados.orcamento.reduce((acc, i) => acc + i.total, 0);
            let totalMateriais = dados.materiais.reduce((acc, i) => acc + i.total, 0);
            let totalMaoObra = dados.maoObra.funcionarios.reduce((acc, f) => 
                acc + f.pagamentos.reduce((pacc, p) => pacc + p.valor, 0), 0);
            
            // Calcula progresso por tipo usando a função corrigida
            let progressoRevestimento = calcularProgressoPorTipo('revestimento');
            let progressoPintura = calcularProgressoPorTipo('pintura');
            let progressoInstalacao = calcularProgressoPorTipo('instalacao');
            let progressoAcabamento = calcularProgressoPorTipo('acabamento');
            let progressoMarcenaria = calcularProgressoPorTipo('marcenaria');
            
            let cronograma = gerarCronogramaInteligente();

            if (abaAtual === 'dashboard') {
                html = `
                <div class="card">
                    <div class="card-title">📊 DASHBOARD INTELIGENTE</div>
                    
                    <div class="dashboard-grid">
                        <div class="dashboard-card">
                            <div class="dashboard-valor">${Math.round(dados.ambientes.reduce((acc, amb) => acc + calcularProgressoAmbiente(amb), 0) / dados.ambientes.length)}%</div>
                            <div class="dashboard-label">Progresso Geral</div>
                        </div>
                        <div class="dashboard-card">
                            <div class="dashboard-valor">R$ ${(totalOrcamento + totalMateriais + totalMaoObra).toFixed(2).replace('.',',')}</div>
                            <div class="dashboard-label">Custo Total</div>
                        </div>
                        <div class="dashboard-card">
                            <div class="dashboard-valor">${dados.ambientes.length}</div>
                            <div class="dashboard-label">Ambientes</div>
                        </div>
                        <div class="dashboard-card">
                            <div class="dashboard-valor">${dados.maoObra.funcionarios.length}</div>
                            <div class="dashboard-label">Funcionários</div>
                        </div>
                    </div>

                    <h3 style="margin: 20px 0 10px;">📈 Progresso por Tipo de Serviço</h3>
                    
                    <div style="margin: 15px 0;">
                        <div style="display: flex; justify-content: space-between;">
                            <span>🧱 Revestimento</span>
                            <span><strong>${progressoRevestimento}%</strong></span>
                        </div>
                        <div class="progresso-container">
                            <div class="progresso-bar" style="width: ${progressoRevestimento}%;"></div>
                        </div>
                        <div style="font-size: 12px; color: #64748b; margin-top: 4px;">
                            Baseado em ${dados.ambientes.reduce((acc, amb) => acc + amb.tarefas.filter(t => t.tipo === 'revestimento').length, 0)} tarefas
                        </div>
                    </div>
                    
                    <div style="margin: 15px 0;">
                        <div style="display: flex; justify-content: space-between;">
                            <span>🎨 Pintura</span>
                            <span><strong>${progressoPintura}%</strong></span>
                        </div>
                        <div class="progresso-container">
                            <div class="progresso-bar" style="width: ${progressoPintura}%;"></div>
                        </div>
                        <div style="font-size: 12px; color: #64748b; margin-top: 4px;">
                            Baseado em ${dados.ambientes.reduce((acc, amb) => acc + amb.tarefas.filter(t => t.tipo === 'pintura').length, 0)} tarefas
                        </div>
                    </div>
                    
                    <div style="margin: 15px 0;">
                        <div style="display: flex; justify-content: space-between;">
                            <span>🔧 Instalações</span>
                            <span><strong>${progressoInstalacao}%</strong></span>
                        </div>
                        <div class="progresso-container">
                            <div class="progresso-bar" style="width: ${progressoInstalacao}%;"></div>
                        </div>
                        <div style="font-size: 12px; color: #64748b; margin-top: 4px;">
                            Baseado em ${dados.ambientes.reduce((acc, amb) => acc + amb.tarefas.filter(t => t.tipo === 'instalacao').length, 0)} tarefas
                        </div>
                    </div>
                    
                    <div style="margin: 15px 0;">
                        <div style="display: flex; justify-content: space-between;">
                            <span>🪚 Acabamento</span>
                            <span><strong>${progressoAcabamento}%</strong></span>
                        </div>
                        <div class="progresso-container">
                            <div class="progresso-bar" style="width: ${progressoAcabamento}%;"></div>
                        </div>
                        <div style="font-size: 12px; color: #64748b; margin-top: 4px;">
                            Baseado em ${dados.ambientes.reduce((acc, amb) => acc + amb.tarefas.filter(t => t.tipo === 'acabamento').length, 0)} tarefas
                        </div>
                    </div>
                    
                    <div style="margin: 15px 0;">
                        <div style="display: flex; justify-content: space-between;">
                            <span>🪑 Marcenaria</span>
                            <span><strong>${progressoMarcenaria}%</strong></span>
                        </div>
                        <div class="progresso-container">
                            <div class="progresso-bar" style="width: ${progressoMarcenaria}%;"></div>
                        </div>
                        <div style="font-size: 12px; color: #64748b; margin-top: 4px;">
                            Baseado em ${dados.ambientes.reduce((acc, amb) => acc + amb.tarefas.filter(t => t.tipo === 'marcenaria').length, 0)} tarefas
                        </div>
                    </div>

                    <h3 style="margin: 30px 0 20px;">📅 Cronograma da Obra</h3>
                    
                    ${cronograma.map(item => `
                        <div style="margin-bottom: 20px; padding: 15px; background: #f8fafc; border-radius: 20px;">
                            <h4 style="margin-bottom: 10px;">${item.mes}/2026</h4>
                            <div class="progresso-container">
                                <div class="progresso-bar" style="width: ${item.progresso}%;"></div>
                            </div>
                            <p style="margin: 10px 0; color: #64748b;">Progresso: ${item.progresso}%</p>
                            <details style="margin-top: 10px;">
                                <summary style="cursor: pointer; color: #3b82f6;">Ver tarefas do mês</summary>
                                ${item.tarefas.map(t => `
                                    <div style="display: flex; justify-content: space-between; margin: 8px 0; padding: 8px; background: white; border-radius: 12px;">
                                        <span>${t.nome}</span>
                                        <span class="badge ${t.concluido ? 'badge-success' : 'badge-warning'}">${t.concluido ? '✅' : '⏳'}</span>
                                    </div>
                                `).join('')}
                            </details>
                        </div>
                    `).join('')}
                </div>`;
            }

            else if (abaAtual === 'ambientes') {
                html = '<div class="card">';
                html += `<div class="card-title">🏠 Ambientes</div>`;
                
                dados.ambientes.forEach(amb => {
                    let progresso = calcularProgressoAmbiente(amb);
                    
                    html += `<div class="ambiente-item">
                        <div class="ambiente-header">
                            <span class="ambiente-nome">${amb.nome}</span>
                            <span class="ambiente-area">${amb.area}</span>
                        </div>
                        
                        <div class="progresso-container">
                            <div class="progresso-bar" style="width: ${progresso}%;"></div>
                        </div>
                        
                        <p style="text-align: right; margin: 5px 0;">${progresso}% concluído</p>`;
                    
                    amb.tarefas.forEach((tarefa, idx) => {
                        html += `<div class="subtarefa-item">
                            <span>${tarefa.nome}</span>
                            ${modoEdicao ? 
                                `<input type="checkbox" ${tarefa.concluido ? 'checked' : ''} onchange="toggleTarefa(${amb.id}, ${idx})">` :
                                `<span class="badge ${tarefa.concluido ? 'badge-success' : 'badge-warning'}">${tarefa.concluido ? '✅' : '⏳'}</span>`
                            }
                        </div>`;
                    });
                    
                    html += '</div>';
                });
                
                html += '</div>';
            }

            else if (abaAtual === 'orcamento') {
                html = `<div class="card">
                    <div class="card-title">💰 Orçamento</div>
                    
                    <div class="dashboard-grid">
                        <div class="dashboard-card">
                            <div class="dashboard-valor">R$ ${totalOrcamento.toFixed(2).replace('.',',')}</div>
                            <div class="dashboard-label">Total Orçado</div>
                        </div>
                    </div>
                    
                    <div class="tabela-container">
                        <table class="tabela">
                            <thead><tr><th>Cód</th><th>Categoria</th><th>Descrição</th><th>Un</th><th>Quant</th><th>R$ Unit</th><th>R$ Total</th>${modoEdicao?'<th>Ações</th>':''}</tr></thead>
                            <tbody>`;
                
                dados.orcamento.forEach((item, idx) => {
                    html += `<tr>
                        <td>${modoEdicao ? `<input class="input-tabela" value="${item.codigo}" onchange="atualizarOrcamento(${idx}, 'codigo', this.value)">` : item.codigo}</td>
                        <td>${modoEdicao ? `<input class="input-tabela" value="${item.categoria}" onchange="atualizarOrcamento(${idx}, 'categoria', this.value)">` : item.categoria}</td>
                        <td>${modoEdicao ? `<input class="input-tabela" value="${item.descricao}" onchange="atualizarOrcamento(${idx}, 'descricao', this.value)">` : item.descricao}</td>
                        <td>${modoEdicao ? `<input class="input-tabela" value="${item.un}" style="width:60px;" onchange="atualizarOrcamento(${idx}, 'un', this.value)">` : item.un}</td>
                        <td>${modoEdicao ? `<input class="input-tabela" type="number" value="${item.quant}" style="width:70px;" onchange="atualizarOrcamento(${idx}, 'quant', this.value)">` : item.quant}</td>
                        <td>${modoEdicao ? `<input class="input-tabela" type="number" value="${item.unitario}" style="width:80px;" onchange="atualizarOrcamento(${idx}, 'unitario', this.value)">` : 'R$ '+item.unitario.toFixed(2)}</td>
                        <td><strong>R$ ${item.total.toFixed(2)}</strong></td>
                        ${modoEdicao ? `<td><button class="btn btn-danger btn-sm" onclick="excluirOrcamento(${idx})">🗑️</button></td>` : ''}
                    </tr>`;
                });
                
                html += `</tbody></table></div>`;
                html += `</div>`;
            }

            else if (abaAtual === 'materiais') {
                html = `<div class="card">
                    <div class="card-title">📦 Materiais</div>
                    
                    <div class="dashboard-grid">
                        <div class="dashboard-card">
                            <div class="dashboard-valor">${dados.materiais.length}</div>
                            <div class="dashboard-label">Itens</div>
                        </div>
                        <div class="dashboard-card">
                            <div class="dashboard-valor">R$ ${totalMateriais.toFixed(2).replace('.',',')}</div>
                            <div class="dashboard-label">Total</div>
                        </div>
                    </div>
                    
                    <div class="tabela-container">
                        <table class="tabela">
                            <thead><tr>
                                <th>Cód</th><th>Material</th><th>Un</th><th>Quant</th><th>R$ Unit</th><th>R$ Total</th>
                                <th>Fornecedor</th><th>Contato</th><th>Data Compra</th><th>Status</th>
                                ${modoEdicao?'<th>Ações</th>':''}
                            </tr></thead>
                            <tbody>`;
                
                dados.materiais.forEach((item, idx) => {
                    let statusClass = item.status === 'entregue' ? 'badge-success' : 
                                     item.status === 'transporte' ? 'badge-warning' : 'badge-danger';
                    
                    html += `<tr>
                        <td>${modoEdicao ? `<input class="input-tabela" value="${item.codigo}" onchange="atualizarMaterial(${idx}, 'codigo', this.value)">` : item.codigo}</td>
                        <td>${modoEdicao ? `<input class="input-tabela" value="${item.descricao}" onchange="atualizarMaterial(${idx}, 'descricao', this.value)">` : item.descricao}</td>
                        <td>${modoEdicao ? `<input class="input-tabela" value="${item.un}" style="width:50px;" onchange="atualizarMaterial(${idx}, 'un', this.value)">` : item.un}</td>
                        <td>${modoEdicao ? `<input class="input-tabela" type="number" value="${item.quant}" style="width:70px;" onchange="atualizarMaterial(${idx}, 'quant', this.value)">` : item.quant}</td>
                        <td>${modoEdicao ? `<input class="input-tabela" type="number" value="${item.unitario}" style="width:70px;" onchange="atualizarMaterial(${idx}, 'unitario', this.value)">` : 'R$ '+item.unitario.toFixed(2)}</td>
                        <td><strong>R$ ${item.total.toFixed(2)}</strong></td>
                        <td>${modoEdicao ? `<input class="input-tabela" value="${item.fornecedor}" onchange="atualizarMaterial(${idx}, 'fornecedor', this.value)">` : item.fornecedor}</td>
                        <td>${modoEdicao ? `<input class="input-tabela" value="${item.contato}" onchange="atualizarMaterial(${idx}, 'contato', this.value)">` : item.contato}</td>
                        <td>${modoEdicao ? `<input class="input-tabela" value="${item.dataCompra}" onchange="atualizarMaterial(${idx}, 'dataCompra', this.value)">` : item.dataCompra}</td>
                        <td>${modoEdicao ? 
                            `<select class="input-tabela" onchange="atualizarMaterial(${idx}, 'status', this.value)">
                                <option ${item.status === 'pendente' ? 'selected' : ''} value="pendente">⏱️ Pendente</option>
                                <option ${item.status === 'transporte' ? 'selected' : ''} value="transporte">🚚 Transporte</option>
                                <option ${item.status === 'entregue' ? 'selected' : ''} value="entregue">✅ Entregue</option>
                            </select>` : 
                            `<span class="badge ${statusClass}">${item.status}</span>`}
                        </td>
                        ${modoEdicao ? `<td><button class="btn btn-danger btn-sm" onclick="excluirMaterial(${idx})">🗑️</button></td>` : ''}
                    </tr>`;
                });
                
                html += `</tbody></table></div>`;
                html += `</div>`;
            }

            else if (abaAtual === 'maoobra') {
                html = `<div class="card">
                    <div class="card-title">👷 Mão de Obra</div>`;
                
                dados.maoObra.funcionarios.forEach((func, idx) => {
                    let totalHoras = func.ponto.filter(p => p.presente).reduce((acc, p) => acc + p.horas, 0);
                    let totalPagamentos = func.pagamentos.reduce((acc, p) => acc + p.valor, 0);
                    
                    html += `<div class="funcionario-card">
                        <h3 style="margin-bottom: 15px;">${func.nome} - ${func.funcao}</h3>
                        
                        <div style="display: flex; gap: 20px; margin-bottom: 15px;">
                            <span class="badge badge-info">💰 R$ ${func.valorHora}/h</span>
                            <span class="badge badge-info">💰 R$ ${totalPagamentos.toFixed(2)} pagos</span>
                        </div>
                        
                        <h4>📅 Ponto</h4>
                        <div class="ponto-grid">
                            ${func.ponto.map((p, pIdx) => `
                                <div class="ponto-dia">
                                    <div>${p.data}</div>
                                    <div>${p.presente ? '✅' : '❌'}</div>
                                    <div>${p.horas}h</div>
                                    ${modoEdicao ? `
                                        <button class="btn btn-sm" style="margin-top:5px;" onclick="togglePonto(${idx}, ${pIdx})">↻</button>
                                    ` : ''}
                                </div>
                            `).join('')}
                        </div>
                        
                        <h4 style="margin-top: 20px;">💰 Pagamentos</h4>
                        ${func.pagamentos.map(p => `
                            <div style="display: flex; justify-content: space-between; background: white; padding: 12px; border-radius: 16px; margin: 5px 0;">
                                <span>${p.data}</span>
                                <span><strong>R$ ${p.valor.toFixed(2)}</strong></span>
                                <span class="badge ${p.status === 'pago' ? 'badge-success' : 'badge-warning'}">${p.status}</span>
                            </div>
                        `).join('')}
                        
                        ${modoEdicao ? `
                            <div style="display: flex; gap: 10px; margin-top: 15px;">
                                <button class="btn btn-primary btn-sm" onclick="adicionarPagamento(${idx})">➕ Pagamento</button>
                                <button class="btn btn-danger btn-sm" onclick="excluirFuncionario(${idx})">🗑️ Excluir</button>
                            </div>
                        ` : ''}
                    </div>`;
                });
                
                html += `</div>`;
            }

            else if (abaAtual === 'fotos') {
                html = `<div class="card">
                    <div class="card-title">📸 Fotos</div>
                    <button class="btn btn-primary" onclick="adicionarFoto()">📸 Adicionar fotos</button>
                    <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-top:20px;">`;
                
                if (dados.fotos.length === 0) {
                    html += `<div style="grid-column:span4; text-align:center; padding:40px;">Nenhuma foto</div>`;
                } else {
                    dados.fotos.forEach(foto => {
                        html += `<div style="aspect-ratio:1; background:#f1f5f9; border-radius:16px; overflow:hidden;">
                            <img src="${foto.url}" style="width:100%;height:100%;object-fit:cover;">
                        </div>`;
                    });
                }
                
                html += `</div></div>`;
            }

            document.getElementById('conteudo').innerHTML = html;
        }

        // ============================================
        // FUNÇÕES DE AÇÃO
        // ============================================
        
        function toggleTarefa(ambienteId, tarefaIdx) {
            let amb = dados.ambientes.find(a => a.id === ambienteId);
            if (amb) {
                amb.tarefas[tarefaIdx].concluido = !amb.tarefas[tarefaIdx].concluido;
                renderizarConteudo();
            }
        }

        function atualizarMaterial(idx, campo, valor) {
            if (campo === 'quant' || campo === 'unitario') {
                dados.materiais[idx][campo] = parseFloat(valor) || 0;
                dados.materiais[idx].total = dados.materiais[idx].quant * dados.materiais[idx].unitario;
            } else {
                dados.materiais[idx][campo] = valor;
            }
            renderizarConteudo();
        }

        function excluirMaterial(idx) {
            if (confirm("Excluir material?")) {
                dados.materiais.splice(idx, 1);
                renderizarConteudo();
            }
        }

        function atualizarOrcamento(idx, campo, valor) {
            if (campo === 'quant' || campo === 'unitario') {
                dados.orcamento[idx][campo] = parseFloat(valor) || 0;
                dados.orcamento[idx].total = dados.orcamento[idx].quant * dados.orcamento[idx].unitario;
            } else {
                dados.orcamento[idx][campo] = valor;
            }
            renderizarConteudo();
        }

        function excluirOrcamento(idx) {
            if (confirm("Excluir item do orçamento?")) {
                dados.orcamento.splice(idx, 1);
                renderizarConteudo();
            }
        }

        function togglePonto(funcIdx, pontoIdx) {
            let ponto = dados.maoObra.funcionarios[funcIdx].ponto[pontoIdx];
            ponto.presente = !ponto.presente;
            ponto.horas = ponto.presente ? 8 : 0;
            renderizarConteudo();
        }

        function adicionarPagamento(funcIdx) {
            let valor = prompt("Valor do pagamento:");
            if (!valor) return;
            
            dados.maoObra.funcionarios[funcIdx].pagamentos.push({
                data: new Date().toLocaleDateString('pt-BR'),
                valor: parseFloat(valor),
                status: "pago"
            });
            renderizarConteudo();
        }

        function excluirFuncionario(idx) {
            if (confirm("Excluir funcionário?")) {
                dados.maoObra.funcionarios.splice(idx, 1);
                renderizarConteudo();
            }
        }

        function adicionarItem() {
            if (abaAtual === 'ambientes') {
                let nome = prompt("Nome do ambiente:");
                if (!nome) return;
                dados.ambientes.push({
                    id: dados.ambientes.length + 1,
                    nome: nome,
                    area: "0m²",
                    tarefas: [{ nome: "Chapisco", concluido: false, tipo: "revestimento" }]
                });
            }
            else if (abaAtual === 'orcamento') {
                dados.orcamento.push({
                    codigo: String(dados.orcamento.length + 1).padStart(3, '0'),
                    categoria: "NOVA CATEGORIA",
                    descricao: "Novo serviço",
                    un: "un",
                    quant: 1,
                    unitario: 0,
                    total: 0
                });
            }
            else if (abaAtual === 'materiais') {
                dados.materiais.push({
                    codigo: "MAT" + String(dados.materiais.length + 1).padStart(3, '0'),
                    descricao: "Novo material",
                    un: "un",
                    quant: 1,
                    unitario: 0,
                    total: 0,
                    fornecedor: "",
                    contato: "",
                    dataCompra: new Date().toLocaleDateString('pt-BR'),
                    status: "pendente"
                });
            }
            else if (abaAtual === 'maoobra') {
                let nome = prompt("Nome do funcionário:");
                if (!nome) return;
                dados.maoObra.funcionarios.push({
                    id: dados.maoObra.funcionarios.length + 1,
                    nome: nome,
                    funcao: "Servente",
                    valorHora: 15.00,
                    ponto: [],
                    pagamentos: []
                });
            }
            renderizarConteudo();
        }

        function adicionarFoto() {
            let input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.multiple = true;
            input.onchange = function(e) {
                for (let file of e.target.files) {
                    let reader = new FileReader();
                    reader.onload = function(e) {
                        dados.fotos.push({
                            url: e.target.result,
                            nome: file.name,
                            data: new Date().toLocaleDateString('pt-BR')
                        });
                        renderizarConteudo();
                    };
                    reader.readAsDataURL(file);
                }
            };
            input.click();
        }

        function exportarDados() {
            let blob = new Blob([JSON.stringify(dados, null, 2)], { type: 'application/json' });
            let link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'dados_obra.json';
            link.click();
        }

        function uploadImagemAp() {
            let input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = function(e) {
                let file = e.target.files[0];
                let reader = new FileReader();
                reader.onload = function(e) {
                    dados.imagemAp = e.target.result;
                    document.getElementById('containerImagemAp').innerHTML = `<img src="${e.target.result}" style="width:100%;height:100%;object-fit:cover;">`;
                };
                reader.readAsDataURL(file);
            };
            input.click();
        }

        // Inicializar
        renderizarConteudo();
    </script>
</body>
</html>
