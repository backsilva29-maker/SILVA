.btn-danger { background: var(--accent4); color: white; }
.btn-success { background: var(--accent3); color: white; }

.sidebar-item:hover { background: var(--surface2); color: var(--text); transform: translateX(4px); }
.sidebar-item.active { color: var(--accent); border-left-color: var(--accent); background: rgba(232,160,32,.06); }
.main { flex: 1; overflow: auto; padding: 20px 24px; }
.page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
.page-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 22px; }
.page-sub { color: var(--text2); font-size: 12px; margin-top: 4px; }

.save-indicator.saved { background: var(--accent3); }

.data-picker-box { background: var(--bg); border: 1px solid var(--accent); border-radius: 12px; padding: 16px 20px; display: flex; align-items: flex-end; gap: 6px; flex-wrap: wrap; margin-top: 4px; }

.data-preview { margin-left: 12px; padding-bottom: 10px; font-size: 12px; color: var(--accent); display: flex; flex-direction: column; gap: 3px; }

.gantt-header { display: grid; grid-template-columns: 280px 100px 100px 80px 100px 1fr; background: var(--surface2); border-bottom: 1px solid var(--border); font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text3); text-transform: uppercase; }

.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; transition: transform 0.2s; }

.modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 1000; align-items: center; justify-content: center; }

.modal-close { background: none; border: none; color: var(--text2); font-size: 24px; cursor: pointer; }

.notification { position: fixed; bottom: 20px; right: 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 20px; display: flex; align-items: center; gap: 12px; z-index: 999; transform: translateY(100px); opacity: 0; transition: all 0.3s; }

.notification.success { border-color: var(--accent3); }

/* CLIENT ANIMATIONS */
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
@keyframes slideInLeft { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
@keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
@keyframes fadeSlideDown { from { opacity:0; transform:translateY(-16px); } to { opacity:1; transform:translateY(0); } }
@keyframes bobbing { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-4px); } }
@keyframes operarioCaminha { 0% { transform:scaleX(1); } 50% { transform:scaleX(-1); } 100% { transform:scaleX(1); } }

.animated-progress { position: relative; overflow: hidden; }
.animated-progress::after { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent); animation: shimmer 2s infinite; }

/* CLIENT TIMELINE */
.client-timeline { position: relative; padding-left: 30px; border-left: 3px solid var(--border); margin: 30px 0; }
.client-item { position: relative; padding-left: 20px; margin-bottom: 25px; opacity: 0; animation: slideInLeft 0.5s ease forwards; }
.client-item::before { content: ''; position: absolute; left: -26px; top: 5px; width: 12px; height: 12px; border-radius: 50%; background: var(--border); }
.client-item.done::before { background: var(--accent3); }
.client-item.active::before { background: var(--accent); animation: pulse 1.5s infinite; }
.client-status { font-size: 11px; padding: 4px 8px; border-radius: 4px; display: inline-block; margin-top: 5px; }
.status-pendente { background: rgba(74,84,104,0.1); color: var(--text2); }
.status-em-andamento { background: rgba(232,160,32,0.1); color: var(--accent); }
.status-concluido { background: rgba(16,185,129,0.1); color: var(--accent3); }

.btn-crud { height: 22px; padding: 0 7px; border-radius: 4px; border: none; cursor: pointer; font-size: 10px; font-weight: 600; font-family: 'Inter', sans-serif; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }

.btn-crud-edit { background: rgba(59,130,246,.2); color: #60a5fa; border: 1px solid rgba(59,130,246,.3); }

/* RESPONSIVE */
@media (max-width: 768px) {
    .sidebar { display: none; }
    .gantt-header, .gantt-row { grid-template-columns: 150px 1fr; }
    .gh-cell:nth-child(n+2), .gc:nth-child(n+2) { display: none; }
    .crud-card { grid-template-columns: 1fr; }
}
</style>

function getDataInicio() {
    const p = dados.dataInicio.split('-');
    return new Date(parseInt(p[0]), parseInt(p[1]) - 1, parseInt(p[2]));
}
function fmtData(d) { return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' }); }
function fmtSemana(s) {
    const d = new Date(getDataInicio().getTime() + s * 7 * 24 * 3600 * 1000);
    return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });
}
function calcularPrevisao() {
    const end = new Date(getDataInicio().getTime() + (dados.duracaoTotal || 20) * 7 * 24 * 3600 * 1000);
    return end.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' });
}
function getSemanaAtual() { return Math.round((new Date() - getDataInicio()) / (7 * 24 * 3600 * 1000)); }
function getPartes() { const p = dados.dataInicio.split('-'); return { ano: p[0], mes: p[1], dia: p[2] }; }

// ==================== FUNÇÕES DE PROGRESSO ====================
function calcularProgressoGrupo(g) {
    if (!g.tarefas || g.tarefas.length === 0) return 0;
    return Math.round(g.tarefas.reduce((acc, t) => acc + (t.progresso || 0), 0) / g.tarefas.length);
}
function calcularProgressoGeral() {
    let total = 0, soma = 0;
    dados.grupos.forEach(g => g.tarefas.forEach(t => { total++; soma += t.progresso || 0; }));
    return total > 0 ? Math.round(soma / total) : 0;
}

// ==================== PERSISTÊNCIA ====================
function salvarDados() {
    localStorage.setItem('obraLiris_final', JSON.stringify(dados));
    dadosAlterados = false;
    atualizarIndicadorSave();
    mostrarNotificacao('Dados salvos!', 'success');
}
function carregarDados() {
    const salvos = localStorage.getItem('obraLiris_final');
    if (salvos) { try { dados = JSON.parse(salvos); } catch(e) {} }
}
function marcarAlterado() { dadosAlterados = true; atualizarIndicadorSave(); }
function atualizarIndicadorSave() {
    const el = document.getElementById('saveIndicator');
    if (el) el.className = 'save-indicator ' + (dadosAlterados ? 'pending' : 'saved');
}

// ==================== LOGIN ====================

        admin = true;
        document.getElementById('loginModal').style.display = 'none';

// ==================== NOTIFICAÇÕES ====================
function mostrarNotificacao(mensagem, tipo = 'success') {
    const notif = document.getElementById('notification');
    document.getElementById('notifIcon').textContent = tipo === 'success' ? '✅' : '⚠️';
    document.getElementById('notifMsg').textContent = mensagem;
    notif.className = 'notification show ' + tipo;
    setTimeout(() => { notif.className = 'notification'; }, 3000);
}

// ==================== MODAL ====================
function abrirModal(titulo, conteudo) {
    document.getElementById('modalTitulo').textContent = titulo;
    document.getElementById('modalConteudo').innerHTML = conteudo;
    document.getElementById('modalGenerico').classList.add('open');
}
function fecharModal() { document.getElementById('modalGenerico').classList.remove('open'); }

// ==================== ATUALIZAÇÃO DE DATA ====================
function atualizarDataPartes() {
    const diaEl = document.getElementById('inputDia');
    const mesEl = document.getElementById('inputMes');
    const anoEl = document.getElementById('inputAno');
    if (!diaEl || !mesEl || !anoEl) return;
    let dia = parseInt(diaEl.value) || 9;
    let mes = parseInt(mesEl.value) || 3;
    let ano = parseInt(anoEl.value) || 2026;
    dia = Math.min(Math.max(dia, 1), 31);
    mes = Math.min(Math.max(mes, 1), 12);
    ano = Math.min(Math.max(ano, 2020), 2040);
    dados.dataInicio = String(ano) + '-' + String(mes).padStart(2, '0') + '-' + String(dia).padStart(2, '0');
    marcarAlterado();
    const prev = document.getElementById('dataPreview');
    if (prev) {
        prev.innerHTML = '<span>📅 ' + fmtData(getDataInicio()) + '</span><span style="color:var(--text2)">Término: ' + calcularPrevisao() + '</span>';
    }
    const cronSub = document.getElementById('cronSub');
    if (cronSub) cronSub.textContent = dados.endereco + ' · Início: ' + fmtData(getDataInicio()) + ' · Término: ' + calcularPrevisao();
    mostrarNotificacao('Data atualizada!', 'success');
}

function renderizarGantt() {
    const body = document.getElementById('ganttBody');
    if (!body) return;
    body.innerHTML = '';
    const semanaAtual = getSemanaAtual();
    dados.grupos.forEach((g, gIndex) => {
        const progGrupo = calcularProgressoGrupo(g);
        const grupoDiv = document.createElement('div');
        grupoDiv.className = 'gantt-group';
        const grupoHeader = document.createElement('div');
        grupoHeader.className = 'gantt-group-header';
        grupoHeader.innerHTML = `
            <div class="gc"><div class="dot" style="background:${g.cor}; cursor:pointer" onclick="alterarCorGrupo(${gIndex})"></div>
            <input class="gc-edit" value="${g.nome}" onchange="dados.grupos[${gIndex}].nome=this.value; marcarAlterado();"></div>
            <div class="gc" style="font-size:11px; color:var(--text2)">${fmtSemana(g.inicio)}</div>
            <div class="gc" style="font-size:11px; color:var(--text2)">${fmtSemana(g.inicio + g.duracao)}</div>
            <div class="gc"><input class="gc-edit" type="number" min="1" value="${g.duracao}" onchange="dados.grupos[${gIndex}].duracao=parseInt(this.value)||1; marcarAlterado(); renderizarGantt();"></div>
            <div class="gc"><span style="color:var(--accent); font-weight:600">${progGrupo}%</span></div>
            <div class="gc" style="padding:0; overflow:hidden"><div class="bar-area">
                <div class="today-line" style="left:${semanaAtual * SEMANA_PX}px"></div>
                <div class="gantt-bar" style="left:${g.inicio*SEMANA_PX}px; width:${g.duracao*SEMANA_PX}px; background:${g.cor}33; border:1px solid ${g.cor}">
                    <div class="gantt-bar-fill" style="width:${progGrupo}%; background:${g.cor}"></div></div>
            </div></div>`;
        grupoDiv.appendChild(grupoHeader);
        g.tarefas.forEach((t, tIndex) => {
            const row = document.createElement('div');
            row.className = 'gantt-row';
            row.innerHTML = `
                <div class="gc" style="padding-left:36px; gap:4px">
                    <input class="gc-edit" value="${t.nome}" onchange="dados.grupos[${gIndex}].tarefas[${tIndex}].nome=this.value; marcarAlterado();">
                    <button class="btn-crud btn-crud-edit" onclick="abrirModalTarefa(${gIndex}, ${tIndex})">Edit</button>
                    <button class="btn-crud btn-crud-del" onclick="excluirTarefa(${gIndex},${tIndex})">Del</button>
                </div>
                <div class="gc" style="font-size:11px; color:var(--text2)">${fmtSemana(t.inicio)}</div>
                <div class="gc" style="font-size:11px; color:var(--text2)">${fmtSemana(t.inicio + t.duracao)}</div>
                <div class="gc"><input class="gc-edit" type="number" min="1" value="${t.duracao}" onchange="dados.grupos[${gIndex}].tarefas[${tIndex}].duracao=parseInt(this.value)||1; marcarAlterado(); renderizarGantt();"></div>
                <div class="gc" style="gap:6px">
                    <input type="range" min="0" max="100" value="${t.progresso}" style="width:70px; accent-color:${g.cor}" oninput="dados.grupos[${gIndex}].tarefas[${tIndex}].progresso=parseInt(this.value); marcarAlterado(); this.nextElementSibling.textContent=this.value+'%';">
                    <span style="min-width:32px; font-size:11px">${t.progresso}%</span>
                </div>
                <div class="gc" style="padding:0; overflow:hidden"><div class="bar-area">
                    <div class="today-line" style="left:${semanaAtual * SEMANA_PX}px"></div>
                    <div class="gantt-bar" style="left:${t.inicio*SEMANA_PX}px; width:${t.duracao*SEMANA_PX}px; background:${g.cor}22; border:1px solid ${g.cor}55">
                        <div class="gantt-bar-fill" style="width:${t.progresso}%; background:${g.cor}"></div></div>
                </div></div>`;
            grupoDiv.appendChild(row);
        });
        const actRow = document.createElement('div');
        actRow.className = 'gantt-row';
        actRow.innerHTML = `<div class="gc" style="padding-left:12px; gap:6px; flex-wrap:wrap">
            <button class="btn btn-primary" style="font-size:11px; padding:5px 10px" onclick="abrirModalTarefa(${gIndex}, null)">+ Tarefa</button>
            <button class="btn btn-ghost" style="font-size:11px; padding:5px 10px" onclick="abrirModalGrupo(${gIndex})">Editar Grupo</button>

        grupoDiv.appendChild(actRow);
        body.appendChild(grupoDiv);
    });
}

            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
                <div><label style="font-size:11px; color:var(--text2); display:block; margin-bottom:4px">Semana Início</label>
                <input id="mg-inicio" class="crud-input" type="number" min="0" value="${g.inicio}"></div>
                <div><label style="font-size:11px; color:var(--text2); display:block; margin-bottom:4px">Duração (sem)</label>
                <input id="mg-dur" class="crud-input" type="number" min="1" value="${g.duracao}"></div>

            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
                <div><label style="font-size:11px; color:var(--text2); display:block; margin-bottom:4px">Responsável</label>

                <div><label style="font-size:11px; color:var(--text2); display:block; margin-bottom:4px">Cor</label>
                <input id="mg-cor" type="color" value="${g.cor}" style="width:100%; height:38px; border-radius:6px; border:1px solid var(--border); background:var(--bg);"></div>
            </div>
            <div style="display:flex; gap:8px; justify-content:flex-end">
                <button class="btn btn-ghost" onclick="fecharModal()">Cancelar</button>
                <button class="btn btn-primary" onclick="salvarGrupo(${novo ? 'null' : gIndex})">${novo ? '+ Criar' : 'Salvar'}</button>
            </div>
        </div>`);
}
function salvarGrupo(gIndex) {
    const nome = document.getElementById('mg-nome').value.trim();
    if (!nome) { mostrarNotificacao('Informe o nome!', 'error'); return; }
    const obj = { nome, inicio: parseInt(document.getElementById('mg-inicio').value) || 0, duracao: parseInt(document.getElementById('mg-dur').value) || 2, responsavel: document.getElementById('mg-resp').value.trim() || 'Equipe', cor: document.getElementById('mg-cor').value };
    if (gIndex === null) { dados.grupos.push({ id: 'g' + Date.now(), tarefas: [], ...obj }); mostrarNotificacao('Grupo criado!', 'success'); }
    else { Object.assign(dados.grupos[gIndex], obj); mostrarNotificacao('Grupo atualizado!', 'success'); }
    marcarAlterado(); fecharModal(); renderizarGantt();
}
function alterarCorGrupo(gIndex) {
    const input = document.createElement('input'); input.type = 'color'; input.value = dados.grupos[gIndex].cor;
    input.onchange = () => { dados.grupos[gIndex].cor = input.value; marcarAlterado(); renderizarGantt(); };
    input.click();
}
function abrirModalTarefa(gIndex, tIndex) {
    const novo = tIndex === null;
    const g = dados.grupos[gIndex];
    let inicioSug = g.inicio || 0;
    if (g.tarefas.length > 0) { const ul = g.tarefas[g.tarefas.length - 1]; inicioSug = ul.inicio + ul.duracao; }
    const t = novo ? { nome: '', inicio: inicioSug, duracao: 2, responsavel: g.responsavel || 'Equipe', progresso: 0 } : g.tarefas[tIndex];
    abrirModal(novo ? 'Nova Tarefa' : 'Editar Tarefa', `
        <div style="margin-bottom:8px; font-size:11px; color:var(--text2)">Grupo: <strong style="color:var(--accent)">${g.nome}</strong></div>
        <div style="display:grid; gap:12px">
            <div><label style="font-size:11px; color:var(--text2); display:block; margin-bottom:4px">Nome *</label>
            <input id="mt-nome" class="crud-input" value="${t.nome}"></div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
                <div><label style="font-size:11px; color:var(--text2); display:block; margin-bottom:4px">Semana Início</label>
                <input id="mt-inicio" class="crud-input" type="number" min="0" value="${t.inicio}"></div>
                <div><label style="font-size:11px; color:var(--text2); display:block; margin-bottom:4px">Duração (sem)</label>
                <input id="mt-dur" class="crud-input" type="number" min="1" value="${t.duracao}"></div>
            </div>
            <div><label style="font-size:11px; color:var(--text2); display:block; margin-bottom:4px">Responsável</label>
            <input id="mt-resp" class="crud-input" value="${t.responsavel}"></div>
            <div><label style="font-size:11px; color:var(--text2); display:block; margin-bottom:6px">Progresso: <strong id="mt-pct" style="color:${g.cor}">${t.progresso}%</strong></label>
            <input id="mt-prog" type="range" min="0" max="100" value="${t.progresso}" style="width:100%; accent-color:${g.cor}" oninput="document.getElementById('mt-pct').textContent=this.value+'%'"></div>
            <div style="display:flex; gap:8px; justify-content:flex-end">
                <button class="btn btn-ghost" onclick="fecharModal()">Cancelar</button>
                <button class="btn btn-primary" onclick="salvarTarefa(${gIndex}, ${novo ? 'null' : tIndex})">${novo ? '+ Adicionar' : 'Salvar'}</button>
            </div>
        </div>`);
}
function salvarTarefa(gIndex, tIndex) {
    const nome = document.getElementById('mt-nome').value.trim();
    if (!nome) { mostrarNotificacao('Informe o nome!', 'error'); return; }
    const obj = { nome, inicio: parseInt(document.getElementById('mt-inicio').value) || 0, duracao: parseInt(document.getElementById('mt-dur').value) || 2, responsavel: document.getElementById('mt-resp').value.trim() || 'Equipe', progresso: parseInt(document.getElementById('mt-prog').value) || 0 };
    if (tIndex === null) { dados.grupos[gIndex].tarefas.push(obj); mostrarNotificacao('Tarefa adicionada!', 'success'); }
    else { Object.assign(dados.grupos[gIndex].tarefas[tIndex], obj); mostrarNotificacao('Tarefa atualizada!', 'success'); }
    marcarAlterado(); fecharModal(); renderizarGantt();
}
function excluirTarefa(gIndex, tIndex) {
    if (confirm('Excluir tarefa?')) { dados.grupos[gIndex].tarefas.splice(tIndex, 1); marcarAlterado(); renderizarGantt(); mostrarNotificacao('Excluída!', 'success'); }
}
function adicionarGrupo() { abrirModalGrupo(null); }
function excluirGrupo(gIndex) {
    if (confirm('Excluir grupo?')) { dados.grupos.splice(gIndex, 1); marcarAlterado(); renderizarGantt(); mostrarNotificacao('Excluído!', 'success'); }
}
function exportarCronograma() {
    const linhas = [];
    dados.grupos.forEach(g => {
        linhas.push({ Grupo: g.nome, Tarefa: '', Inicio: fmtSemana(g.inicio), Fim: fmtSemana(g.inicio + g.duracao), Duracao: g.duracao, Progresso: calcularProgressoGrupo(g) + '%' });
        g.tarefas.forEach(t => { linhas.push({ Grupo: g.nome, Tarefa: t.nome, Inicio: fmtSemana(t.inicio), Fim: fmtSemana(t.inicio + t.duracao), Duracao: t.duracao, Progresso: t.progresso + '%' }); });
    });
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(linhas), 'Cronograma');
    XLSX.writeFile(wb, 'cronograma-torre-liris.xlsx');
    mostrarNotificacao('Exportado!', 'success');
}

// ==================== ORÇAMENTO ====================
function renderizarOrcamentoAdmin() {
    const total = dados.orcamento.reduce((acc, item) => acc + (item.valor || 0), 0);
    return `
    <div class="page-header">
        <div><div class="page-title">💰 Orçamento</div>
        <div class="page-sub">Total: R$ ${total.toLocaleString('pt-BR', {minimumFractionDigits:2})}</div></div>
        <button class="btn btn-primary" onclick="adicionarItemOrcamento()">+ Adicionar Item</button>
    </div>
    <div class="crud-container">
        ${dados.orcamento.map((item, i) => `
        <div class="crud-card">
            <input class="crud-input" value="${item.descricao}" onchange="dados.orcamento[${i}].descricao=this.value; marcarAlterado();">
            <input class="crud-input" type="number" value="${item.valor}" onchange="dados.orcamento[${i}].valor=parseFloat(this.value)||0; marcarAlterado();">
            <button class="btn btn-danger" onclick="excluirOrcamento(${i})">🗑️</button>
        </div>`).join('')}

}
function adicionarItemOrcamento() { dados.orcamento.push({ descricao: 'Novo Item', valor: 0 }); marcarAlterado(); renderizarAdmin(); }
function excluirOrcamento(i) { if (confirm('Excluir?')) { dados.orcamento.splice(i, 1); marcarAlterado(); renderizarAdmin(); mostrarNotificacao('Excluído!', 'success'); } }

// ==================== FOTOS ====================
function renderizarFotosAdmin() {
    return `
    <div class="page-header">
        <div><div class="page-title">📸 Fotos</div>
        <div class="page-sub">${dados.fotos.length} foto(s)</div></div>
        <button class="btn btn-primary" onclick="adicionarFoto()">+ Adicionar Foto</button>
    </div>
    <div class="photo-grid">
        ${dados.fotos.map((foto, i) => `
        <div class="photo-card">
            <img src="${foto.url}">
            <div class="photo-card-info">
                <div class="photo-card-ambiente">${foto.ambiente}</div>
                <div class="photo-card-data">${foto.data}</div>
                <button class="btn btn-danger" style="margin-top:8px" onclick="excluirFoto(${i})">🗑️</button>
            </div>
        </div>`).join('')}
    </div>`;
}
function adicionarFoto() {
    const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*';
    input.onchange = e => {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
            abrirModal('Adicionar Foto', `<div style="display:grid; gap:12px">
                <img src="${ev.target.result}" style="width:100%; border-radius:10px; max-height:300px; object-fit:cover">
                <select id="fotoAmb" class="crud-input">${dados.ambientes.map(a => `<option>${a}</option>`).join('')}</select>
                <button class="btn btn-primary" onclick="confirmarFoto('${ev.target.result}')">Salvar</button>
            </div>`);
        };
        reader.readAsDataURL(file);
    };
    input.click();
}
function confirmarFoto(url) {
    dados.fotos.push({ url, ambiente: document.getElementById('fotoAmb').value, data: fmtData(new Date()) });
    marcarAlterado(); fecharModal(); renderizarAdmin(); mostrarNotificacao('Foto adicionada!', 'success');
}
function excluirFoto(i) { if (confirm('Excluir?')) { dados.fotos.splice(i, 1); marcarAlterado(); renderizarAdmin(); mostrarNotificacao('Excluída!', 'success'); } }

// ==================== AMBIENTES ====================
function renderizarAmbientesAdmin() {
    return `
    <div class="page-header"><div class="page-title">🏠 Ambientes</div>
    <button class="btn btn-primary" onclick="adicionarAmbiente()">+ Adicionar</button></div>
    <div class="crud-container">
        ${dados.ambientes.map((a, i) => `
        <div class="crud-card">
            <input class="crud-input" value="${a}" onchange="dados.ambientes[${i}]=this.value; marcarAlterado();">
            <button class="btn btn-danger" onclick="excluirAmbiente(${i})">🗑️</button>
        </div>`).join('')}
    </div>`;
}
function adicionarAmbiente() { dados.ambientes.push('Novo Ambiente'); marcarAlterado(); renderizarAdmin(); mostrarNotificacao('Adicionado!', 'success'); }
function excluirAmbiente(i) { if (confirm('Excluir?')) { dados.ambientes.splice(i, 1); marcarAlterado(); renderizarAdmin(); mostrarNotificacao('Excluído!', 'success'); } }

            <div style="font-size:32px; margin-bottom:8px">${emB}</div>
            <div style="font-family:'Syne',sans-serif; font-weight:800; font-size:22px; margin-bottom:4px">Olá, ${dados.cliente.nome.split(' ')[0]}!</div>
            <div style="font-size:14px; color:var(--text2); margin-bottom:16px">${msgB}</div>
            <div style="display:flex; gap:20px; flex-wrap:wrap">
                <div><div style="font-size:10px; color:var(--text3); text-transform:uppercase; letter-spacing:1px">Arquiteto</div><div style="font-size:13px; font-weight:500">${dados.obra.arquiteto}</div></div>
                <div><div style="font-size:10px; color:var(--text3); text-transform:uppercase; letter-spacing:1px">Início</div><div style="font-size:13px; font-weight:500; color:var(--accent3)">${fmtData(getDataInicio())}</div></div>
                <div><div style="font-size:10px; color:var(--text3); text-transform:uppercase; letter-spacing:1px">Término</div><div style="font-size:13px; font-weight:500; color:var(--accent)">${calcularPrevisao()}</div></div>
                <div><div style="font-size:10px; color:var(--text3); text-transform:uppercase; letter-spacing:1px">Área</div><div style="font-size:13px; font-weight:500">${dados.obra.area}</div></div>
            </div>
        </div>
        <div style="background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:24px; animation:fadeSlideDown .7s ease forwards; opacity:0; animation-delay:.1s">
            <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:6px">
                <div style="font-family:'Syne',sans-serif; font-weight:700; font-size:16px">Andamento Geral</div>
                <div style="font-family:'Syne',sans-serif; font-weight:800; font-size:28px; color:var(--accent3)">${prog}%</div>
            </div>

            <div style="position:relative; height:48px; background:var(--surface2); border-radius:24px; overflow:visible; border:1px solid var(--border)">
                <div id="barra-prog" style="position:absolute; top:0; left:0; bottom:0; width:0%; background:linear-gradient(90deg,var(--accent3),var(--accent)); border-radius:24px; transition:width 1.5s cubic-bezier(.4,0,.2,1); box-shadow:0 0 20px rgba(232,160,32,.3)"></div>

        <div style="display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px; animation:fadeSlideDown .8s ease forwards; opacity:0; animation-delay:.2s">

        <div style="text-align:center; padding:20px 0; font-size:11px; color:var(--text3); animation:fadeSlideDown 1.1s ease forwards; opacity:0; animation-delay:.7s">
            ${dados.titulo} · ${dados.obra.tipo} · ${dados.obra.area}<br>Atualizado em ${new Date().toLocaleDateString('pt-BR')}
        </div>
    </div>`;
    setTimeout(() => {
        const barra = document.getElementById('barra-prog');
        const op = document.getElementById('op-wrap');
        if (barra) barra.style.width = prog + '%';
        if (op) op.style.left = 'calc(' + Math.max(2, Math.min(prog, 97)) + '% - 18px)';
    }, 300);
}
