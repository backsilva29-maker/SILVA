<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>🏗️ Gestão de Obras</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, sans-serif; }
        
        /* MODAL DE LOGIN */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(10px);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white; padding: 40px 30px; border-radius: 48px;
            width: 90%; max-width: 380px; text-align: center;
        }
        .modal-input {
            width: 100%; padding: 16px; margin: 15px 0;
            border: 2px solid #e2e8f0; border-radius: 40px;
            font-size: 16px;
        }
        .modal-btn {
            width: 100%; padding: 16px; margin: 8px 0;
            border: none; border-radius: 40px; font-size: 16px;
            font-weight: 600; cursor: pointer;
        }
        .btn-admin { background: #0f172a; color: white; }
        .btn-client { background: #3b82f6; color: white; }
        
        /* ============================================ */
        /* DASHBOARD DO CLIENTE (SÓ ISSO) */
        /* ============================================ */
        .cliente-container {
            background: linear-gradient(145deg, #0f172a, #1e293b);
            min-height: 100vh;
            padding: 20px;
        }
        
        .cliente-header {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 30px 20px;
            margin-bottom: 25px;
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .cliente-titulo {
            font-size: 28px; font-weight: 800; margin-bottom: 8px;
        }
        .cliente-info {
            font-size: 15px; opacity: 0.9; margin: 4px 0;
        }
        
        .cliente-cards {
            display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 15px; margin-bottom: 25px;
        }
        
        .cliente-card {
            background: white; border-radius: 30px; padding: 20px 15px;
            text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        
        .card-icone {
            width: 60px; height: 60px; background: #f1f5f9;
            border-radius: 30px; display: flex; align-items: center;
            justify-content: center; margin: 0 auto 12px;
            font-size: 28px;
        }
        
        .card-valor {
            font-size: 36px; font-weight: 800; color: #0f172a;
        }
        .card-label {
            font-size: 14px; color: #64748b; margin-top: 5px;
        }
        
        .cliente-graficos {
            background: white; border-radius: 40px; padding: 25px 20px;
            margin: 20px 0;
        }
        
        .grafico-item {
            margin: 20px 0;
        }
        .grafico-header {
            display: flex; justify-content: space-between;
            margin-bottom: 8px; font-weight: 600;
        }
        .grafico-barra {
            width: 100%; height: 12px; background: #e2e8f0;
            border-radius: 30px; overflow: hidden;
        }
        .grafico-preenchimento {
            height: 100%; background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            border-radius: 30px; transition: width 0.5s;
        }
        
        /* ============================================ */
        /* ADMIN (TUDO EDITÁVEL) */
        /* ============================================ */
        .admin-container {
            background: #f8fafc; min-height: 100vh; padding: 20px;
        }
        
        .admin-header {
            background: white; border-radius: 30px; padding: 25px 20px;
            margin-bottom: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        
        .admin-tabs {
            display: flex; background: white; padding: 6px;
            border-radius: 40px; margin: 25px 0; gap: 4px;
            flex-wrap: wrap;
        }
        
        .admin-tab {
            flex: 1; text-align: center; padding: 14px 0;
            font-size: 14px; font-weight: 600; border-radius: 34px;
            color: #64748b; cursor: pointer; min-width: 90px;
        }
        .admin-tab.active {
            background: #0f172a; color: white;
        }
        
        .admin-card {
            background: white; border-radius: 28px; padding: 24px;
            margin-bottom: 24px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        
        .admin-card-title {
            font-size: 20px; font-weight: 700; color: #0f172a;
            margin-bottom: 20px; border-bottom: 2px solid #e2e8f0;
            padding-bottom: 16px;
        }
        
        .input-admin {
            width: 100%; padding: 12px 16px; border: 1px solid #e2e8f0;
            border-radius: 30px; font-size: 14px; margin: 6px 0;
        }
        .input-admin:focus { outline: none; border-color: #3b82f6; }
        
        .btn {
            padding: 12px 24px; border: none; border-radius: 30px;
            font-weight: 600; font-size: 14px; cursor: pointer;
            margin: 5px; transition: transform 0.2s;
        }
        .btn:active { transform: scale(0.97); }
        .btn-primary { background: #0f172a; color: white; }
        .btn-success { background: #10b981; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-sm { padding: 8px 16px; font-size: 12px; }
        
        .foto-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 12px; margin: 20px 0;
        }
        .foto-item {
            aspect-ratio: 1; background: #f1f5f9; border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            border: 2px dashed #cbd5e1; color: #94a3b8;
            cursor: pointer; overflow: hidden;
        }
        .foto-item img { width: 100%; height: 100%; object-fit: cover; }
        
        .tabela-container { overflow-x: auto; border-radius: 20px; border: 1px solid #e2e8f0; }
        .tabela { width: 100%; border-collapse: collapse; font-size: 14px; min-width: 1000px; }
        .tabela th { background: #f8fafc; padding: 16px; text-align: left; }
        .tabela td { padding: 12px; border-bottom: 1px solid #e2e8f0; }
    </style>
</head>
<body>
    <!-- MODAL DE LOGIN -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <h2 style="margin-bottom: 20px;">🏗️ Acesso ao Sistema</h2>
            <input type="password" id="senhaInput" class="modal-input" placeholder="Senha de administrador">
            <button class="modal-btn btn-admin" onclick="verificarSenha()">Entrar como Admin</button>
            <button class="modal-btn btn-client" onclick="entrarComoCliente()">Entrar como Cliente</button>
        </div>
    </div>

    <div id="conteudo"></div>

    <script>
        // ============================================
        // CONFIGURAÇÕES E DADOS
        // ============================================
        const SENHA_ADMIN = "torre2026";
        let admin = false;
        let abaAdminAtual = 'ambientes';

        let dados = {
            // DADOS GERAIS (TUDO EDITÁVEL)
            titulo: "",
            endereco: "",
            proprietario: "",
            arquiteto: "",
            dataInicio: "",
            
            // AMBIENTES
            ambientes: [],
            
            // ORÇAMENTO
            orcamento: [],
            
            // MATERIAIS
            materiais: [],
            
            // MÃO DE OBRA
            maoObra: { funcionarios: [] },
            
            // FOTOS
            fotos: []
        };

        // ============================================
        // FUNÇÕES DE PERSISTÊNCIA
        // ============================================
        function salvarDados() {
            localStorage.setItem('dadosObra', JSON.stringify(dados));
        }

        function carregarDados() {
            let salvos = localStorage.getItem('dadosObra');
            if (salvos) {
                try {
                    dados = JSON.parse(salvos);
                } catch (e) {}
            }
        }

        // ============================================
        // FUNÇÕES DE LOGIN
        // ============================================
        function verificarSenha() {
            let senha = document.getElementById('senhaInput').value;
            if (senha === SENHA_ADMIN) {
                admin = true;
                document.getElementById('loginModal').style.display = 'none';
                carregarDados();
                renderizarAdmin();
            } else {
                alert('Senha incorreta!');
            }
        }

        function entrarComoCliente() {
            admin = false;
            document.getElementById('loginModal').style.display = 'none';
            carregarDados();
            renderizarCliente();
        }

        // ============================================
        // FUNÇÕES DE CÁLCULO
        // ============================================
        function calcularProgressoGeral() {
            let total = 0;
            let concluidas = 0;
            dados.ambientes.forEach(amb => {
                amb.tarefas?.forEach(t => {
                    total++;
                    if (t.concluido) concluidas++;
                });
            });
            return total > 0 ? Math.round((concluidas / total) * 100) : 0;
        }

        function calcularProgressoPorTipo(tipo) {
            let total = 0;
            let concluidas = 0;
            dados.ambientes.forEach(amb => {
                amb.tarefas?.forEach(t => {
                    if (t.tipo === tipo) {
                        total++;
                        if (t.concluido) concluidas++;
                    }
                });
            });
            return total > 0 ? Math.round((concluidas / total) * 100) : 0;
        }

        function listarTipos() {
            let tipos = [];
            dados.ambientes.forEach(amb => {
                amb.tarefas?.forEach(t => {
                    if (!tipos.includes(t.tipo)) tipos.push(t.tipo);
                });
            });
            return tipos;
        }

        // ============================================
        // DASHBOARD DO CLIENTE (SÓ ISSO - SEM ABAS)
        // ============================================
        function renderizarCliente() {
            let progresso = calcularProgressoGeral();
            let tipos = listarTipos();
            
            const nomes = {
                'revestimento': '🧱 Revestimento',
                'pintura': '🎨 Pintura',
                'instalacao': '🔧 Instalações',
                'acabamento': '🪚 Acabamento',
                'marcenaria': '🪑 Marcenaria'
            };

            let html = `
            <div class="cliente-container">
                <!-- CABEÇALHO -->
                <div class="cliente-header">
                    <div class="cliente-titulo">${dados.titulo || "Obra sem nome"}</div>
                    <div class="cliente-info">${dados.endereco || "Endereço não informado"}</div>
                    <div class="cliente-info">Proprietário: ${dados.proprietario || "Não informado"}</div>
                    <div class="cliente-info" style="margin-top: 10px;">Início: ${dados.dataInicio || "Não definido"}</div>
                </div>

                <!-- CARDS DE RESUMO -->
                <div class="cliente-cards">
                    <div class="cliente-card">
                        <div class="card-icone">📊</div>
                        <div class="card-valor">${progresso}%</div>
                        <div class="card-label">Progresso</div>
                    </div>
                    <div class="cliente-card">
                        <div class="card-icone">🏠</div>
                        <div class="card-valor">${dados.ambientes.length}</div>
                        <div class="card-label">Ambientes</div>
                    </div>
                    <div class="cliente-card">
                        <div class="card-icone">📦</div>
                        <div class="card-valor">${dados.materiais.length}</div>
                        <div class="card-label">Materiais</div>
                    </div>
                    <div class="cliente-card">
                        <div class="card-icone">👷</div>
                        <div class="card-valor">${dados.maoObra.funcionarios.length}</div>
                        <div class="card-label">Funcionários</div>
                    </div>
                </div>

                <!-- GRÁFICOS DE PROGRESSO -->
                <div class="cliente-graficos">
                    <h3 style="margin-bottom: 20px; text-align: center;">📈 Andamento da Obra</h3>`;

            if (tipos.length === 0) {
                html += `<p style="text-align: center; color: #94a3b8; padding: 20px;">Nenhuma tarefa cadastrada ainda</p>`;
            } else {
                tipos.forEach(tipo => {
                    let prog = calcularProgressoPorTipo(tipo);
                    html += `
                    <div class="grafico-item">
                        <div class="grafico-header">
                            <span>${nomes[tipo] || tipo}</span>
                            <span>${prog}%</span>
                        </div>
                        <div class="grafico-barra">
                            <div class="grafico-preenchimento" style="width: ${prog}%;"></div>
                        </div>
                    </div>`;
                });
            }

            html += `</div></div>`;
            document.getElementById('conteudo').innerHTML = html;
        }

        // ============================================
        // ADMIN (TUDO EDITÁVEL + FOTOS)
        // ============================================
        function renderizarAdmin() {
            let html = `
            <div class="admin-container">
                <!-- DADOS GERAIS -->
                <div class="admin-header">
                    <h2 style="margin-bottom: 15px;">📋 Dados da Obra</h2>
                    <input class="input-admin" placeholder="Nome da obra" value="${dados.titulo}" onchange="dados.titulo=this.value; salvarDados();">
                    <input class="input-admin" placeholder="Endereço completo" value="${dados.endereco}" onchange="dados.endereco=this.value; salvarDados();">
                    <input class="input-admin" placeholder="Proprietário" value="${dados.proprietario}" onchange="dados.proprietario=this.value; salvarDados();">
                    <input class="input-admin" placeholder="Arquiteto" value="${dados.arquiteto}" onchange="dados.arquiteto=this.value; salvarDados();">
                    <input class="input-admin" placeholder="Data de início" value="${dados.dataInicio}" onchange="dados.dataInicio=this.value; salvarDados();">
                </div>

                <!-- TABS -->
                <div class="admin-tabs">
                    <div class="admin-tab ${abaAdminAtual === 'ambientes' ? 'active' : ''}" onclick="mudarAbaAdmin('ambientes')">🏠 Ambientes</div>
                    <div class="admin-tab ${abaAdminAtual === 'orcamento' ? 'active' : ''}" onclick="mudarAbaAdmin('orcamento')">💰 Orçamento</div>
                    <div class="admin-tab ${abaAdminAtual === 'materiais' ? 'active' : ''}" onclick="mudarAbaAdmin('materiais')">📦 Materiais</div>
                    <div class="admin-tab ${abaAdminAtual === 'maoobra' ? 'active' : ''}" onclick="mudarAbaAdmin('maoobra')">👷 Mão de Obra</div>
                    <div class="admin-tab ${abaAdminAtual === 'fotos' ? 'active' : ''}" onclick="mudarAbaAdmin('fotos')">📸 Fotos</div>
                </div>`;

            // AMBIENTES
            if (abaAdminAtual === 'ambientes') {
                html += `<div class="admin-card">
                    <div class="admin-card-title">🏠 Ambientes</div>`;
                
                dados.ambientes.forEach((amb, idx) => {
                    html += `
                    <div style="background: #f8fafc; border-radius: 20px; padding: 20px; margin: 20px 0;">
                        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                            <input class="input-admin" style="flex:2;" placeholder="Nome" value="${amb.nome}" onchange="atualizarAmbiente(${amb.id}, 'nome', this.value)">
                            <input class="input-admin" style="flex:1;" placeholder="Área" value="${amb.area}" onchange="atualizarAmbiente(${amb.id}, 'area', this.value)">
                            <button class="btn btn-danger btn-sm" onclick="excluirAmbiente(${amb.id})">🗑️</button>
                        </div>`;
                    
                    amb.tarefas?.forEach((tarefa, tIdx) => {
                        html += `
                        <div style="display: flex; gap: 8px; margin: 10px 0; align-items: center;">
                            <input class="input-admin" style="flex:2;" value="${tarefa.nome}" onchange="atualizarTarefa(${amb.id}, ${tIdx}, 'nome', this.value)">
                            <select class="input-admin" style="flex:1;" onchange="atualizarTarefa(${amb.id}, ${tIdx}, 'tipo', this.value)">
                                <option value="revestimento" ${tarefa.tipo === 'revestimento' ? 'selected' : ''}>Revestimento</option>
                                <option value="pintura" ${tarefa.tipo === 'pintura' ? 'selected' : ''}>Pintura</option>
                                <option value="instalacao" ${tarefa.tipo === 'instalacao' ? 'selected' : ''}>Instalação</option>
                                <option value="acabamento" ${tarefa.tipo === 'acabamento' ? 'selected' : ''}>Acabamento</option>
                            </select>
                            <input type="checkbox" ${tarefa.concluido ? 'checked' : ''} onchange="toggleTarefa(${amb.id}, ${tIdx})" style="width:24px;height:24px;">
                            <button class="btn btn-danger btn-sm" onclick="excluirTarefa(${amb.id}, ${tIdx})">✕</button>
                        </div>`;
                    });
                    
                    html += `<button class="btn btn-success btn-sm" onclick="adicionarTarefa(${amb.id})">➕ Tarefa</button>`;
                    html += `</div>`;
                });
                
                html += `<button class="btn btn-primary" style="width:100%;" onclick="adicionarAmbiente()">➕ Adicionar Ambiente</button>`;
                html += `</div>`;
            }

            // ORÇAMENTO
            else if (abaAdminAtual === 'orcamento') {
                html += `<div class="admin-card">
                    <div class="admin-card-title">💰 Orçamento</div>
                    <button class="btn btn-success" onclick="adicionarItemOrcamento()">➕ Adicionar Item</button>
                    <div class="tabela-container">
                        <table class="tabela">
                            <thead><tr><th>Cód</th><th>Descrição</th><th>Un</th><th>Quant</th><th>R$ Unit</th><th>R$ Total</th><th>Ações</th></tr></thead>
                            <tbody>`;
                
                dados.orcamento.forEach((item, idx) => {
                    html += `<tr>
                        <td><input class="input-admin" value="${item.codigo}" onchange="atualizarOrcamento(${idx}, 'codigo', this.value)"></td>
                        <td><input class="input-admin" value="${item.descricao}" onchange="atualizarOrcamento(${idx}, 'descricao', this.value)"></td>
                        <td><input class="input-admin" value="${item.un}" style="width:60px;" onchange="atualizarOrcamento(${idx}, 'un', this.value)"></td>
                        <td><input class="input-admin" type="number" value="${item.quant}" style="width:80px;" onchange="atualizarOrcamento(${idx}, 'quant', this.value)"></td>
                        <td><input class="input-admin" type="number" value="${item.unitario}" style="width:100px;" onchange="atualizarOrcamento(${idx}, 'unitario', this.value)"></td>
                        <td>R$ ${(item.quant * item.unitario).toFixed(2)}</td>
                        <td><button class="btn btn-danger btn-sm" onclick="excluirOrcamento(${idx})">🗑️</button></td>
                    </tr>`;
                });
                
                html += `</tbody></table></div></div>`;
            }

            // MATERIAIS
            else if (abaAdminAtual === 'materiais') {
                html += `<div class="admin-card">
                    <div class="admin-card-title">📦 Materiais</div>
                    <button class="btn btn-success" onclick="adicionarMaterial()">➕ Adicionar Material</button>
                    <div class="tabela-container">
                        <table class="tabela">
                            <thead><tr><th>Cód</th><th>Material</th><th>Un</th><th>Quant</th><th>Fornecedor</th><th>Status</th><th>Ações</th></tr></thead>
                            <tbody>`;
                
                dados.materiais.forEach((item, idx) => {
                    html += `<tr>
                        <td><input class="input-admin" value="${item.codigo}" onchange="atualizarMaterial(${idx}, 'codigo', this.value)"></td>
                        <td><input class="input-admin" value="${item.descricao}" onchange="atualizarMaterial(${idx}, 'descricao', this.value)"></td>
                        <td><input class="input-admin" value="${item.un}" style="width:60px;" onchange="atualizarMaterial(${idx}, 'un', this.value)"></td>
                        <td><input class="input-admin" type="number" value="${item.quant}" style="width:80px;" onchange="atualizarMaterial(${idx}, 'quant', this.value)"></td>
                        <td><input class="input-admin" value="${item.fornecedor}" onchange="atualizarMaterial(${idx}, 'fornecedor', this.value)"></td>
                        <td>
                            <select class="input-admin" onchange="atualizarMaterial(${idx}, 'status', this.value)">
                                <option value="pendente" ${item.status === 'pendente' ? 'selected' : ''}>⏱️ Pendente</option>
                                <option value="transporte" ${item.status === 'transporte' ? 'selected' : ''}>🚚 Transporte</option>
                                <option value="entregue" ${item.status === 'entregue' ? 'selected' : ''}>✅ Entregue</option>
                            </select>
                        </td>
                        <td><button class="btn btn-danger btn-sm" onclick="excluirMaterial(${idx})">🗑️</button></td>
                    </tr>`;
                });
                
                html += `</tbody></table></div></div>`;
            }

            // MÃO DE OBRA
            else if (abaAdminAtual === 'maoobra') {
                html += `<div class="admin-card">
                    <div class="admin-card-title">👷 Mão de Obra</div>
                    <button class="btn btn-success" onclick="adicionarFuncionario()">➕ Adicionar Funcionário</button>`;
                
                dados.maoObra.funcionarios.forEach((func, idx) => {
                    html += `
                    <div style="background: #f8fafc; border-radius: 20px; padding: 20px; margin: 20px 0;">
                        <div style="display: flex; gap: 10px;">
                            <input class="input-admin" style="flex:2;" value="${func.nome}" placeholder="Nome" onchange="atualizarFuncionario(${idx}, 'nome', this.value)">
                            <input class="input-admin" style="flex:1;" value="${func.funcao}" placeholder="Função" onchange="atualizarFuncionario(${idx}, 'funcao', this.value)">
                            <input class="input-admin" style="flex:1;" type="number" value="${func.valorHora}" placeholder="R$/hora" onchange="atualizarFuncionario(${idx}, 'valorHora', this.value)">
                            <button class="btn btn-danger btn-sm" onclick="excluirFuncionario(${idx})">🗑️</button>
                        </div>
                    </div>`;
                });
                
                html += `</div>`;
            }

            // FOTOS
            else if (abaAdminAtual === 'fotos') {
                html += `<div class="admin-card">
                    <div class="admin-card-title">📸 Fotos da Obra</div>
                    <button class="btn btn-success" onclick="adicionarFoto()">➕ Adicionar Fotos</button>
                    <div class="foto-grid">`;
                
                if (dados.fotos.length === 0) {
                    html += `<div style="grid-column: span 3; text-align: center; padding: 40px; color: #94a3b8;">Nenhuma foto adicionada</div>`;
                } else {
                    dados.fotos.forEach((foto, idx) => {
                        html += `<div class="foto-item" onclick="verFoto(${idx})">
                            <img src="${foto.url}" alt="Foto ${idx+1}">
                        </div>`;
                    });
                }
                
                html += `</div></div>`;
            }

            html += `</div>`;
            document.getElementById('conteudo').innerHTML = html;
        }

        // ============================================
        // FUNÇÕES DE CRUD
        // ============================================
        function mudarAbaAdmin(aba) {
            abaAdminAtual = aba;
            renderizarAdmin();
        }

        // AMBIENTES
        function adicionarAmbiente() {
            let novoId = dados.ambientes.length > 0 ? Math.max(...dados.ambientes.map(a => a.id)) + 1 : 1;
            dados.ambientes.push({ id: novoId, nome: "Novo Ambiente", area: "0m²", tarefas: [] });
            salvarDados();
            renderizarAdmin();
        }

        function atualizarAmbiente(id, campo, valor) {
            let amb = dados.ambientes.find(a => a.id === id);
            if (amb) { amb[campo] = valor; salvarDados(); }
        }

        function excluirAmbiente(id) {
            if (confirm("Excluir ambiente?")) {
                dados.ambientes = dados.ambientes.filter(a => a.id !== id);
                salvarDados(); renderizarAdmin();
            }
        }

        function adicionarTarefa(ambienteId) {
            let amb = dados.ambientes.find(a => a.id === ambienteId);
            if (amb) {
                amb.tarefas = amb.tarefas || [];
                amb.tarefas.push({ nome: "Nova tarefa", concluido: false, tipo: "revestimento" });
                salvarDados(); renderizarAdmin();
            }
        }

        function atualizarTarefa(ambienteId, tarefaIdx, campo, valor) {
            let amb = dados.ambientes.find(a => a.id === ambienteId);
            if (amb && amb.tarefas[tarefaIdx]) {
                amb.tarefas[tarefaIdx][campo] = valor;
                salvarDados();
            }
        }

        function toggleTarefa(ambienteId, tarefaIdx) {
            let amb = dados.ambientes.find(a => a.id === ambienteId);
            if (amb && amb.tarefas[tarefaIdx]) {
                amb.tarefas[tarefaIdx].concluido = !amb.tarefas[tarefaIdx].concluido;
                salvarDados(); renderizarAdmin();
            }
        }

        function excluirTarefa(ambienteId, tarefaIdx) {
            let amb = dados.ambientes.find(a => a.id === ambienteId);
            if (amb) {
                amb.tarefas.splice(tarefaIdx, 1);
                salvarDados(); renderizarAdmin();
            }
        }

        // ORÇAMENTO
        function adicionarItemOrcamento() {
            dados.orcamento.push({ codigo: String(dados.orcamento.length + 1).padStart(3,'0'), descricao: "Novo item", un: "un", quant: 1, unitario: 0 });
            salvarDados(); renderizarAdmin();
        }

        function atualizarOrcamento(idx, campo, valor) {
            dados.orcamento[idx][campo] = campo === 'quant' || campo === 'unitario' ? parseFloat(valor) || 0 : valor;
            salvarDados();
        }

        function excluirOrcamento(idx) {
            dados.orcamento.splice(idx, 1);
            salvarDados(); renderizarAdmin();
        }

        // MATERIAIS
        function adicionarMaterial() {
            dados.materiais.push({ codigo: "MAT"+String(dados.materiais.length+1).padStart(3,'0'), descricao: "Novo material", un: "un", quant: 1, fornecedor: "", status: "pendente" });
            salvarDados(); renderizarAdmin();
        }

        function atualizarMaterial(idx, campo, valor) {
            dados.materiais[idx][campo] = campo === 'quant' ? parseFloat(valor) || 0 : valor;
            salvarDados();
        }

        function excluirMaterial(idx) {
            dados.materiais.splice(idx, 1);
            salvarDados(); renderizarAdmin();
        }

        // FUNCIONÁRIOS
        function adicionarFuncionario() {
            dados.maoObra.funcionarios.push({ id: dados.maoObra.funcionarios.length+1, nome: "Novo funcionário", funcao: "Servente", valorHora: 15, ponto: [], pagamentos: [] });
            salvarDados(); renderizarAdmin();
        }

        function atualizarFuncionario(idx, campo, valor) {
            dados.maoObra.funcionarios[idx][campo] = campo === 'valorHora' ? parseFloat(valor) || 0 : valor;
            salvarDados();
        }

        function excluirFuncionario(idx) {
            dados.maoObra.funcionarios.splice(idx, 1);
            salvarDados(); renderizarAdmin();
        }

        // FOTOS
        function adicionarFoto() {
            let input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.multiple = true;
            input.onchange = function(e) {
                for (let file of e.target.files) {
                    let reader = new FileReader();
                    reader.onload = function(e) {
                        dados.fotos.push({ url: e.target.result, nome: file.name, data: new Date().toLocaleDateString('pt-BR') });
                        salvarDados();
                        renderizarAdmin();
                    };
                    reader.readAsDataURL(file);
                }
            };
            input.click();
        }

        function verFoto(idx) {
            window.open(dados.fotos[idx].url, '_blank');
        }

        // INICIALIZAR
        carregarDados();
    </script>
</body>
</html>
