<style>
:root {
--bg: #0d0f14; --surface: #13161e; --surface2: #1a1e2a;
--border: #252a38; --accent: #e8a020; --accent2: #3b82f6;
--accent3: #10b981; --accent4: #f43f5e; --text: #e8eaf0;
--text2: #8892a4; --text3: #4a5468; --gantt-h: 50px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 13px; min-height: 100vh; }

/* LOGIN */
.login-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); display: flex; justify-content: center; align-items: center; z-index: 1000; }
.login-content { background: var(--surface); border: 1px solid var(--border); border-radius: 48px; padding: 40px; width: 90%; max-width: 380px; text-align: center; }
.login-input { width: 100%; padding: 16px; margin: 15px 0; background: var(--bg); border: 1px solid var(--border); border-radius: 40px; color: var(--text); font-size: 16px; }
.login-btn { width: 100%; padding: 16px; margin: 8px 0; border: none; border-radius: 40px; font-size: 16px; font-weight: 600; cursor: pointer; }
.btn-admin { background: var(--accent); color: #000; }
.btn-client { background: var(--accent2); color: white; }

/* TOPBAR */
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 0 16px; height: 56px; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
.logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 15px; display: flex; align-items: center; gap: 10px; }
.logo-badge { width: 28px; height: 28px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 13px; color: #000; font-weight: 800; }
.btn { padding: 8px 14px; border-radius: 8px; border: none; cursor: pointer; font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500; display: inline-flex; align-items: center; gap: 6px; }
.btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text2); }
.btn-primary { background: var(--accent); color: #000; font-weight: 600; }
.btn-danger { background: var(--accent4); color: white; }
.btn-success { background: var(--accent3); color: white; }
.btn-small { padding: 4px 10px; font-size: 11px; }

/* LAYOUT */
.layout { display: flex; height: calc(100vh - 56px); }
.sidebar { width: 220px; background: var(--surface); border-right: 1px solid var(--border); padding: 16px 0; }
.sidebar-item { display: flex; align-items: center; gap: 10px; padding: 10px 16px; color: var(--text2); cursor: pointer; border-left: 2px solid transparent; }
.sidebar-item:hover { background: var(--surface2); color: var(--text); }
.sidebar-item.active { color: var(--accent); border-left-color: var(--accent); background: rgba(232,160,32,.06); }

/* MAIN */
.main { flex: 1; overflow: auto; padding: 16px; }
.page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
.page-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 18px; }
.page-sub { color: var(--text2); font-size: 11px; margin-top: 4px; }

/* SAVE BAR */
.save-bar { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }
.save-status { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--text2); }
.save-indicator { width: 8px; height: 8px; border-radius: 50%; background: var(--text3); }
.save-indicator.saved { background: var(--accent3); }
.save-indicator.pending { background: var(--accent); }

/* CARDS */
.client-data-card { background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%); border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin-bottom: 16px; }
.client-data-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; }
.client-data-item { display: flex; flex-direction: column; gap: 4px; }
.client-data-label { font-size: 9px; color: var(--text3); text-transform: uppercase; }
.client-data-input { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; color: var(--text); font-size: 12px; width: 100%; }
.client-data-value { font-size: 13px; color: var(--text); font-weight: 500; }

/* GANTT */
.gantt-wrap { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; background: var(--surface); margin-bottom: 16px; }
.gantt-header { display: grid; grid-template-columns: 180px 90px 90px 60px 80px 1fr; background: var(--surface2); border-bottom: 1px solid var(--border); font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: var(--text3); text-transform: uppercase; }
.gh-cell { padding: 10px; border-right: 1px solid var(--border); }
.gantt-group { border-bottom: 1px solid var(--border); }
.gantt-group-header { display: grid; grid-template-columns: 180px 90px 90px 60px 80px 1fr; background: rgba(232,160,32,.08); padding: 10px; align-items: center; }
.gantt-row { display: grid; grid-template-columns: 180px 90px 90px 60px 80px 1fr; border-bottom: 1px solid rgba(37,42,56,.6); align-items: center; }
.gc { padding: 0 10px; height: var(--gantt-h); display: flex; align-items: center; border-right: 1px solid var(--border); font-size: 11px; }
.gc-edit { background: transparent; border: 1px solid var(--border); border-radius: 4px; padding: 4px 6px; color: var(--text); font-size: 10px; width: 100%; }
.dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 8px; }
.bar-area { position: relative; height: var(--gantt-h); min-width: 100%; overflow-x: auto; }
.gantt-bar { position: absolute; top: 50%; transform: translateY(-50%); height: 18px; border-radius: 4px; display: flex; align-items: center; overflow: hidden; }
.gantt-bar-fill { height: 100%; border-radius: 4px 0 0 4px; opacity: .95; transition: width 0.5s; }

/* CRUD */
.crud-container { display: grid; gap: 10px; }
.crud-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px; display: grid; grid-template-columns: 1fr 80px 80px 100px; gap: 10px; align-items: center; }
.crud-input { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; color: var(--text); font-size: 11px; width: 100%; }
.crud-actions { display: flex; gap: 4px; }

/* PHOTOS */
.photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
.photo-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.photo-card img { width: 100%; aspect-ratio: 4/3; object-fit: cover; }
.photo-card-info { padding: 8px; }
.photo-card-ambiente { font-size: 10px; color: var(--accent); text-transform: uppercase; }

/* STATS */
.stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 16px; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px; }
.stat-label { font-size: 9px; color: var(--text3); text-transform: uppercase; margin-bottom: 6px; }
.stat-value { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 18px; }
.stat-bar-bg { height: 4px; background: var(--border); border-radius: 2px; margin-top: 8px; overflow: hidden; }
.stat-bar-fill { height: 100%; background: var(--accent3); transition: width 0.5s; }

/* CLIENT TIMELINE */
.client-timeline { position: relative; padding-left: 16px; border-left: 2px solid var(--border); margin: 16px 0; }
.client-item { position: relative; padding-left: 16px; margin-bottom: 20px; }
.client-item::before { content: ''; position: absolute; left: -22px; top: 5px; width: 10px; height: 10px; border-radius: 50%; background: var(--border); }
.client-item.done::before { background: var(--accent3); }
.client-item.active::before { background: var(--accent); }
.client-status { font-size: 10px; padding: 3px 8px; border-radius: 4px; display: inline-block; margin-top: 4px; }
.status-pendente { background: rgba(136,146,164,0.1); color: var(--text2); }
.status-em-andamento { background: rgba(232,160,32,0.1); color: var(--accent); }
.status-concluido { background: rgba(16,185,129,0.1); color: var(--accent3); }
.client-dates { font-size: 10px; color: var(--text3); margin-top: 4px; }

/* ANIMATIONS */
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
@keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
@keyframes walk { from { transform: rotate(-5deg); } to { transform: rotate(5deg); } }

.animated-progress { position: relative; overflow: hidden; }
.animated-progress::after {
    content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    animation: shimmer 2s infinite;
}
.progress-pulse { animation: pulse 2s infinite; }
.worker-emoji { font-size: 18px; animation: walk 0.5s infinite alternate; }

/* NOTIFICATION */
.notification { position: fixed; bottom: 16px; right: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; z-index: 999; transform: translateY(100px); opacity: 0; transition: all 0.3s; }
.notification.show { transform: translateY(0); opacity: 1; }

/* RESPONSIVE */
@media (max-width: 768px) {
    .sidebar { display: none; }
    .gantt-header, .gantt-row { grid-template-columns: 120px 1fr; }
    .gh-cell:nth-child(n+2), .gc:nth-child(n+2) { display: none; }
    .crud-card { grid-template-columns: 1fr; }
}
</style>
</head>

// ==================== PERSISTÊNCIA (UMA CHAVE SÓ) ====================
function salvar() {
    localStorage.setItem('torreLiris_FINAL', JSON.stringify(dados));
    dadosAlterados = false;
    atualizarSave();
    mostrarNotificacao('Salvo!', 'success');
}

function carregar() {
    const s = localStorage.getItem('torreLiris_FINAL');
    if (s) dados = JSON.parse(s);
}

function marcarAlterado() { dadosAlterados = true; atualizarSave(); }

function atualizarSave() {
    const el = document.getElementById('saveIndicator');
    if (el) el.className = 'save-indicator ' + (dadosAlterados ? 'pending' : 'saved');
}

// ==================== ENTRAR (ADMIN OU CLIENTE) ====================
function entrar(tipo) {
    const senha = document.getElementById('senhaInput').value;
    if (tipo === 'admin' && senha !== SENHA_ADMIN) {
        alert('Senha incorreta');
        return;
    }
    modoAtual = tipo;
    document.getElementById('loginModal').style.display = 'none';
    carregar(); // CARREGA OS MESMOS DADOS PARA AMBOS
    renderizar();
}

// ==================== DATAS (TODAS DE dataInicio) ====================
function fmtData(d) { return new Date(d).toLocaleDateString('pt-BR'); }
function fmtSemana(s) {
    const d = new Date(dados.dataInicio);
    d.setDate(d.getDate() + s * 7);
    return d.toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit'});
}
function calcularPrevisao() {
    const d = new Date(dados.dataInicio);
    d.setDate(d.getDate() + dados.duracaoTotal * 7);
    return d.toLocaleDateString('pt-BR', {month:'short', year:'numeric'});
}
function getDataInicio(i) {
    const d = new Date(dados.dataInicio);
    d.setDate(d.getDate() + (dados.grupos[i]?.inicio || 0) * 7);
    return d.toLocaleDateString('pt-BR');
}
function getDataFim(i) {
    const d = new Date(dados.dataInicio);
    const g = dados.grupos[i];
    d.setDate(d.getDate() + ((g?.inicio || 0) + (g?.duracao || 0)) * 7);
    return d.toLocaleDateString('pt-BR');
}

// ==================== NOTIFICAÇÃO ====================
function mostrarNotificacao(msg, tipo='success') {
    const n = document.getElementById('notification');
    document.getElementById('notifIcon').textContent = tipo==='success'?'✅':'⚠️';
    document.getElementById('notifMsg').textContent = msg;
    n.className = 'notification show';
    setTimeout(() => n.className = 'notification', 3000);
}

    <div class="page-header">
        <div><div class="page-title">📅 Cronograma</div><div class="page-sub">Início: ${fmtData(dados.dataInicio)} · Previsão: ${calcularPrevisao()}</div></div>
        <button class="btn btn-primary btn-small" onclick="adicionarGrupo()">+ Grupo</button>
    </div>
    <div class="gantt-wrap"><div class="gantt-header">
        <div class="gh-cell">Tarefa</div><div class="gh-cell">Início</div><div class="gh-cell">Fim</div>
        <div class="gh-cell">Dur.</div><div class="gh-cell">Prog.</div><div class="gh-cell">Gantt</div>
    </div><div id="ganttBody"></div></div>`;
}

function renderizarDadosAdmin() {
    return `<div class="save-bar">
        <div class="save-status"><div id="saveIndicator" class="save-indicator saved"></div><span>${dadosAlterados?'Não salvo':'Salvo'}</span></div>
        <button class="btn btn-success btn-small" onclick="salvar()">💾 Salvar</button>
    </div>
    <div class="page-header"><div class="page-title">👤 Dados do Cliente</div></div>
    <div class="client-data-card"><div class="client-data-grid">
        <div class="client-data-item"><label class="client-data-label">Nome</label><input class="client-data-input" value="${dados.cliente.nome}" onchange="dados.cliente.nome=this.value;marcarAlterado()"></div>
        <div class="client-data-item"><label class="client-data-label">Email</label><input class="client-data-input" value="${dados.cliente.email}" onchange="dados.cliente.email=this.value;marcarAlterado()"></div>
        <div class="client-data-item"><label class="client-data-label">Telefone</label><input class="client-data-input" value="${dados.cliente.telefone}" onchange="dados.cliente.telefone=this.value;marcarAlterado()"></div>
    </div></div>
    <div class="client-data-card"><div class="client-data-grid">
        <div class="client-data-item"><label class="client-data-label">Arquiteto</label><input class="client-data-input" value="${dados.obra.arquiteto}" onchange="dados.obra.arquiteto=this.value;marcarAlterado()"></div>
        <div class="client-data-item"><label class="client-data-label">Área</label><input class="client-data-input" value="${dados.obra.area}" onchange="dados.obra.area=this.value;marcarAlterado()"></div>
        <div class="client-data-item"><label class="client-data-label">📅 Início</label><input class="client-data-input" type="date" value="${dados.dataInicio}" onchange="dados.dataInicio=this.value;marcarAlterado()"></div>
        <div class="client-data-item"><label class="client-data-label">⏱️ Duração (sem)</label><input class="client-data-input" type="number" value="${dados.duracaoTotal}" onchange="dados.duracaoTotal=parseInt(this.value);marcarAlterado()"></div>
        <div class="client-data-item"><label class="client-data-label">📆 Previsão</label><div class="client-data-value" style="color:var(--accent)">${calcularPrevisao()}</div></div>
    </div></div>`;
}

function renderizarOrcamentoAdmin() {
    const total = dados.orcamento.reduce((a,i)=>a+i.valor,0);
    return `<div class="save-bar">
        <div class="save-status"><div id="saveIndicator" class="save-indicator saved"></div><span>${dadosAlterados?'Não salvo':'Salvo'}</span></div>
        <button class="btn btn-success btn-small" onclick="salvar()">💾 Salvar</button>
    </div>
    <div class="page-header"><div class="page-title">💰 Orçamento</div><div class="page-sub">Total: R$ ${total.toLocaleString('pt-BR')}</div><button class="btn btn-primary btn-small" onclick="dados.orcamento.push({id:'o'+Date.now(),grupo:'Geral',descricao:'Novo',valor:0});marcarAlterado();renderizar()">+ Item</button></div>
    <div class="crud-container">${dados.orcamento.map((i,x)=>`<div class="crud-card">
        <input class="crud-input" value="${i.descricao}" onchange="dados.orcamento[${x}].descricao=this.value;marcarAlterado()">
        <input class="crud-input" value="${i.grupo}" onchange="dados.orcamento[${x}].grupo=this.value;marcarAlterado()">
        <input class="crud-input" type="number" value="${i.valor}" onchange="dados.orcamento[${x}].valor=parseFloat(this.value);marcarAlterado()">
        <div class="crud-actions"><button class="btn btn-danger btn-small" onclick="dados.orcamento.splice(${x},1);marcarAlterado();renderizar()">🗑️</button></div>
    </div>`).join('')}</div>`;
}

function renderizarFotosAdmin() {
    return `<div class="page-header"><div class="page-title">📸 Fotos</div><button class="btn btn-primary btn-small" onclick="adicionarFoto()">+ Foto</button></div>
    <div class="photo-grid">${dados.fotos.map((f,x)=>`<div class="photo-card"><img src="${f.url}"><div class="photo-card-info"><div class="photo-card-ambiente">${f.ambiente}</div><button class="btn btn-danger btn-small" style="width:100%" onclick="dados.fotos.splice(${x},1);marcarAlterado();renderizar()">🗑️</button></div></div>`).join('')}</div>`;
}

function renderizarAmbientesAdmin() {
    return `<div class="page-header"><div class="page-title">🏠 Ambientes</div><button class="btn btn-primary btn-small" onclick="dados.ambientes.push('Novo');marcarAlterado();renderizar()">+ Ambiente</button></div>
    <div class="crud-container">${dados.ambientes.map((a,x)=>`<div class="crud-card">
        <input class="crud-input" value="${a}" onchange="dados.ambientes[${x}]=this.value;marcarAlterado()">
        <div></div><div></div>
        <div class="crud-actions"><button class="btn btn-danger btn-small" onclick="dados.ambientes.splice(${x},1);marcarAlterado();renderizar()">🗑️</button></div>
    </div>`).join('')}</div>`;
}

function renderizarGantt() {
    const body = document.getElementById('ganttBody');
    if (!body) return;
    body.innerHTML = '';
    dados.grupos.forEach((g, gI) => {
        const div = document.createElement('div');
        div.className = 'gantt-group';
        div.innerHTML = `<div class="gantt-group-header">
            <div class="gc"><div class="dot" style="background:${g.cor}"></div><input class="gc-edit" value="${g.nome}" onchange="dados.grupos[${gI}].nome=this.value;marcarAlterado()"></div>
            <div class="gc">${fmtSemana(g.inicio)}</div>
            <div class="gc">${fmtSemana(g.inicio+g.duracao)}</div>
            <div class="gc"><input type="number" class="gc-edit" value="${g.duracao}" onchange="dados.grupos[${gI}].duracao=parseInt(this.value);marcarAlterado();renderizarGantt()" style="width:40px"></div>
            <div class="gc"><input class="gc-edit" value="${g.responsavel}" onchange="dados.grupos[${gI}].responsavel=this.value;marcarAlterado()"></div>
            <div class="gc"><div class="bar-area"><div class="gantt-bar" style="left:${g.inicio*35}px;width:${g.duracao*35}px;background:${g.cor}33;border:1px solid ${g.cor}"><div class="gantt-bar-fill" style="width:50%;background:${g.cor}"></div></div></div></div>
        </div>`;
        g.tarefas.forEach((t, tI) => {
            const row = document.createElement('div');
            row.className = 'gantt-row';
            row.innerHTML = `<div class="gc" style="padding-left:24px"><input class="gc-edit" value="${t.nome}" onchange="dados.grupos[${gI}].tarefas[${tI}].nome=this.value;marcarAlterado()"></div>
                <div class="gc">${fmtSemana(g.inicio)}</div><div class="gc">${fmtSemana(g.inicio+t.duracao)}</div>
                <div class="gc"><input type="number" class="gc-edit" value="${t.duracao}" onchange="dados.grupos[${gI}].tarefas[${tI}].duracao=parseInt(this.value);marcarAlterado();renderizarGantt()" style="width:40px"></div>
                <div class="gc"><input type="range" min="0" max="100" value="${t.progresso}" style="width:60px" onchange="dados.grupos[${gI}].tarefas[${tI}].progresso=parseInt(this.value);marcarAlterado()"><span>${t.progresso}%</span></div>
                <div class="gc"><div class="bar-area"><div class="gantt-bar" style="width:${t.duracao*35}px;background:${g.cor}33;border:1px solid ${g.cor}"><div class="gantt-bar-fill" style="width:${t.progresso}%;background:${g.cor}"></div></div></div></div>`;
            div.appendChild(row);
            const btn = document.createElement('div');
            btn.className = 'gantt-row';
            btn.innerHTML = `<div class="gc" style="padding-left:24px"><button class="btn btn-danger btn-small" onclick="dados.grupos[${gI}].tarefas.splice(${tI},1);marcarAlterado();renderizarGantt()">🗑️</button></div><div class="gc"></div><div class="gc"></div><div class="gc"></div><div class="gc"></div><div class="gc"></div>`;
            div.appendChild(btn);
        });
        const add = document.createElement('div');
        add.className = 'gantt-row';
        add.innerHTML = `<div class="gc"><button class="btn btn-primary btn-small" onclick="dados.grupos[${gI}].tarefas.push({id:'t'+Date.now(),nome:'Nova',duracao:2,progresso:0});marcarAlterado();renderizarGantt()">+ Tarefa</button><button class="btn btn-danger btn-small" onclick="dados.grupos.splice(${gI},1);marcarAlterado();renderizarGantt()">🗑️ Grupo</button></div><div class="gc"></div><div class="gc"></div><div class="gc"></div><div class="gc"></div><div class="gc"></div>`;
        div.appendChild(add);
        body.appendChild(div);
    });
}

function adicionarGrupo() {
    dados.grupos.push({id:'g'+Date.now(),nome:'Novo Grupo',cor:'#'+Math.floor(Math.random()*16777215).toString(16),inicio:dados.grupos.length*2,duracao:2,responsavel:'Equipe',tarefas:[]});
    marcarAlterado(); renderizarGantt();
}

function adicionarFoto() {
    const i = document.createElement('input');
    i.type = 'file'; i.accept = 'image/*';
    i.onchange = e => {
        const f = e.target.files[0];
        if (f) {
            const r = new FileReader();
            r.onload = e => { dados.fotos.push({id:'f'+Date.now(),url:e.target.result,ambiente:'Geral'}); marcarAlterado(); renderizar(); };
            r.readAsDataURL(f);
        }
    };
    i.click();
}

// ==================== CLIENTE (MESMOS DADOS) ====================
function renderizarCliente() {
    document.getElementById('app').innerHTML = `
    <div class="topbar">
        <div class="logo"><div class="logo-badge">C</div> ${dados.titulo}</div>
        <button class="btn btn-ghost btn-small" onclick="location.reload()">🔄 Sair</button>
    </div>
    <div class="main">
        <div class="client-data-card"><div class="client-data-grid">
            <div class="client-data-item"><div class="client-data-label">Cliente</div><div class="client-data-value" style="color:var(--accent)">👤 ${dados.cliente.nome}</div></div>
            <div class="client-data-item"><div class="client-data-label">Contato</div><div class="client-data-value">📞 ${dados.cliente.telefone}</div></div>
            <div class="client-data-item"><div class="client-data-label">Arquiteto</div><div class="client-data-value">📐 ${dados.obra.arquiteto}</div></div>
            <div class="client-data-item"><div class="client-data-label">Obra</div><div class="client-data-value">🏠 ${dados.obra.area}</div></div>
        </div></div>
        ${renderizarStatsCliente()}
        ${renderizarTimelineCliente()}
        ${renderizarFotosCliente()}
    </div>`;
}

function renderizarStatsCliente() {
    let t=0,p=0; dados.grupos.forEach(g=>g.tarefas.forEach(ta=>{t++;p+=ta.progresso;}));
    const m = t ? Math.round(p/t) : 0;
    return `<div class="stats-row">
        <div class="stat-card"><div class="stat-label">Progresso</div><div class="stat-value" style="color:var(--accent3)">${m}%</div><div class="stat-bar-bg"><div class="stat-bar-fill animated-progress" style="width:${m}%"></div></div></div>
        <div class="stat-card"><div class="stat-label">Previsão</div><div class="stat-value">${calcularPrevisao()}</div></div>
        <div class="stat-card"><div class="stat-label">Etapas</div><div class="stat-value">${dados.grupos.length}</div></div>
    </div>`;
}

function renderizarTimelineCliente() {
    return `<div class="page-header"><div class="page-title">📅 Cronograma</div></div>
    <div class="client-timeline">${dados.grupos.map((g,i)=>{
        const prog = g.tarefas.reduce((a,t)=>a+t.progresso,0)/g.tarefas.length;
        const status = prog>=100?'Concluído':prog>0?'Em andamento':'Pendente';
        const cls = prog>=100?'done':prog>0?'active':'';
        return `<div class="client-item ${cls}">
            <div style="display:flex;justify-content:space-between"><span style="font-weight:600">${g.nome}</span><span style="color:${g.cor};font-weight:700">${Math.round(prog)}%</span></div>
            <div class="client-dates">📅 ${getDataInicio(i)} → ${getDataFim(i)}</div>
            <div class="client-status status-${prog>=100?'concluido':prog>0?'em-andamento':'pendente'}">${status}</div>
            <div class="stat-bar-bg" style="margin-top:6px"><div class="stat-bar-fill animated-progress progress-pulse" style="width:${prog}%;background:${g.cor}"></div></div>
            ${prog>0&&prog<100?`<div style="position:absolute;right:0;top:50%;transform:translateY(-50%)"><span class="worker-emoji">👷</span></div>`:''}
        </div>`;
    }).join('')}</div>`;
}

function renderizarFotosCliente() {
    return `<div class="page-header"><div class="page-title">📸 Galeria</div></div>
    <div class="photo-grid">${dados.fotos.slice(0,8).map(f=>`<div class="photo-card"><img src="${f.url}"><div class="photo-card-info"><div class="photo-card-ambiente">${f.ambiente}</div></div></div>`).join('')}</div>`;
}

// ==================== INICIALIZAÇÃO ====================
carregar();
</script>
</body>
